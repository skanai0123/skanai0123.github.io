        stateDownEl.disabled = true;
        stateUpEl.disabled = true;
        stateRightEl.disabled = true;
        return;
      }
      const idx = Math.max(0, Math.min(orbitalView.stageLevelIndex, n - 1));
      const lv = levels[idx];
      const stageName = stage === "FREE" ? "Free Ion" : stage;
      stateInfoEl.textContent = `${stageName} state ${idx + 1}/${n}: ${lv.energy.toFixed(8)} eV`;
      stateLeftEl.disabled = pos <= 0;
      stateDownEl.disabled = isFreeStage || idx <= 0;
      stateUpEl.disabled = isFreeStage || idx >= n - 1;
      stateRightEl.disabled = pos < 0 || pos >= order.length - 1;
    }

    function selectStageState(stage = null, index = null, step = 0) {
      const activeStage = stage || orbitalView.stageTag || "B";
      const levels = activeStage ? (stageStateLevels[activeStage] || []) : [];
      if (!levels.length) return;
      if (activeStage === "FREE" && step !== 0) {
        return;
      }
      let i = index;
      if (i === null || i === undefined || !Number.isFinite(i)) {
        i = orbitalView.stageLevelIndex === null ? 0 : orbitalView.stageLevelIndex;
      }
      i = Math.max(0, Math.min(i + step, levels.length - 1));
      orbitalView.stageTag = activeStage;
      orbitalView.stageLevelIndex = i;
      const lv = levels[i];
      const stageName = activeStage === "FREE" ? "Free Ion" : activeStage;
      showOrbital("mixed", `${stageName} / ${lv.label}`, lv.degenerateMixSpec || "", lv.degenerateMzSpec || "", lv.degenerateSpinSpec || "", lv.degenerateSpinOrbSpec || "", lv.energy, lv.gFactor);
      rerenderDiagramSelection();
      updateStateNav();
    }

    function shiftStage(offset) {
      const current = orbitalView.stageTag || "B";
      const order = (currentStageOrder && currentStageOrder.length) ? currentStageOrder : DEFAULT_STAGE_ORDER;
      let pos = order.indexOf(current);
      if (pos < 0) pos = order.length - 1;
      const nextPos = Math.max(0, Math.min(pos + offset, order.length - 1));
      const nextStage = order[nextPos];
      const nextLevels = stageStateLevels[nextStage] || [];
      if (!nextLevels.length) return;
      const idx = Math.max(0, Math.min(orbitalView.stageLevelIndex ?? 0, nextLevels.length - 1));
      selectStageState(nextStage, idx, 0);
    }

    function clearOrbitalPreview() {
      orbitalView.name = null;
      orbitalView.label = "";
      orbitalView.mixSpec = "";
      orbitalHintEl.textContent = "Click a split orbital line to pin a 3D orbital-function view.";
      clearPreviewCanvas();
      orbitalCtx.fillStyle = "#7a8eaf";
      orbitalCtx.font = "14px 'Noto Sans JP', sans-serif";
      orbitalCtx.fillText("Click an orbital line to render 3D surface", 120, 155);
      orbitalCoeffEl.innerHTML = `<div class="muted">Coefficient bars appear here after you click a level.</div>`;
      updateStateNav();
    }

    function freeIonOccupancy(dElectrons) {
      const occ = new Array(ORBITAL_BASIS.length).fill(0);
      let e = dElectrons;
      for (let i = 0; i < ORBITAL_BASIS.length && e > 0; i += 1) {
        occ[i] += 1;
        e -= 1;
      }
      for (let i = 0; i < ORBITAL_BASIS.length && e > 0; i += 1) {
        occ[i] += 1;
        e -= 1;
      }
      return occ;
    }

    function buildFreeIonOrbitalLevels(dElectrons) {
      const occ = freeIonOccupancy(dElectrons);
      return ORBITAL_BASIS.map((orbital, i) => ({
        label: orbital,
        color: "#5b6f90",
        coeff: 0,
        energy: 0,
        orbitals: [orbital],
        hoverOrbitals: [orbital],
        orbitalOcc: [occ[i]],
        electrons: occ[i]
      }));
    }

    function crystalFieldEnergyMap(preset, delta) {
      const m = {};
      for (const level of preset.levels) {
        for (const orbital of level.orbitals) {
          m[orbital] = level.coeff * delta;
        }
      }
      return m;
    }

    function applyCrystalFieldAfterSOI(levelsWithSOI, preset, delta) {
      const eMap = crystalFieldEnergyMap(preset, delta);
      let cfShiftEnergy = 0;
      const shifted = levelsWithSOI.map((level) => {
        const orbital = level.orbitals[0];
        const shift = eMap[orbital] || 0;
        cfShiftEnergy += shift * level.electrons;
        return {
          ...level,
          label: orbital,
          color: "#1f4f8f",
          coeff: Math.abs(delta) < 1e-12 ? 0 : (level.energy + shift) / delta,
          energy: level.energy + shift,
          soiMin: level.soiMin + shift,
          soiMax: level.soiMax + shift
        };
      });
      return { shiftedLevels: shifted, cfShiftEnergy };
    }

    function renderDiagram({ nl, scaleMode = "deformed", stage1Levels, stage1Label, stage1Tag, stage2Levels, stage2Label, stage2Tag, stage3Levels, lambdaValue, bField, selectedStage = null, selectedIndex = null }) {
      const yMid = 226;
      const labelBandTop = 18;
      const labelBandBottom = 62;
      const yTop = labelBandBottom + 4;
      const yBottom = 432;
      const SPLIT_GAIN = 2.6;
      const MIN_HALF_SPAN_PX = 22;
      const allEnergies = [...stage1Levels, ...stage2Levels, ...stage3Levels].map((l) => l.energy);
      const maxE = Math.max(...allEnergies, 0.001);
      const minE = Math.min(...allEnergies, -0.001);
      const positiveExtent = Math.max(maxE, 0.001);
      const negativeExtent = Math.max(-minE, 0.001);
      const scale = Math.min((yMid - yTop) / positiveExtent, (yBottom - yMid) / negativeExtent);

      const xFree0 = 20;
      const xFree1 = 124;
      const x1a = 142;
      const x1b = 272;
      const x2a = 320;
      const x2b = 450;
      const x3a = 500;
      const x3b = 680;
      const parts = [];

      const freeCx = xFree0 + 64;
      const freeHalfLen = 48;
      parts.push(`<g class="orbital-hit" data-orbital="mixed" data-label="Free Ion" data-stage="FREE" data-level-index="0" data-energy="0" data-mix="${FREE_MIX}" data-mz="${FREE_MZ}" data-spin="${FREE_SPIN}" data-spinorb="${FREE_SPINORB}">`);
      parts.push(`<rect x="${freeCx - 34}" y="${yMid - 14}" width="68" height="28" fill="rgba(0,0,0,0.001)"/>`);
      parts.push(`<line x1="${freeCx - freeHalfLen}" y1="${yMid}" x2="${freeCx + freeHalfLen}" y2="${yMid}" stroke="#7a4fb3" stroke-width="2.2" stroke-linecap="round"/>`);
      parts.push(`</g>`);
      function pushFrontArrowLeft(targetParts, tipX, y, labelText = "") {
        const tailX = tipX + 34;
        targetParts.push(`<line x1="${tailX - 8}" y1="${y}" x2="${tipX + 3}" y2="${y}" stroke="#d83a3a" stroke-width="4.0" stroke-linecap="round"/>`);
        targetParts.push(`<polygon points="${tipX},${y} ${tipX + 13},${y - 10} ${tipX + 13},${y + 10}" fill="#d83a3a"/>`);
        if (labelText) {
          targetParts.push(`<text x="${tailX + 6}" y="${y + 4}" style="fill:#d83a3a; font-size:13px; font-weight:800;">${labelText}</text>`);
        }
      }

      function levelWeights(level) {
        const mix = (level && level.degenerateMixSpec) ? level.degenerateMixSpec : FREE_MIX;
        const coeff = parseMixSpec(mix);
        const w = ORBITAL_BASIS.map((orb) => {
          const c = coeff[orb] || 0;
          return c * c;
        });
        const s = w.reduce((a, b) => a + b, 0) || 1;
        return w.map((x) => x / s);
      }

      function overlapScore(a, b) {
        let s = 0;
        for (let i = 0; i < a.length; i += 1) s += a[i] * b[i];
        return s;
      }

      function buildLevelIncomingShareMatrix(fromTag, toTag, fromLevels, toLevels) {
        if (!currentTransitionData || !Array.isArray(currentTransitionData)) return null;
        const tr = currentTransitionData.find((x) => x.fromTag === fromTag && x.toTag === toTag);
        if (!tr || !tr.matrix) return null;
        const raw = Array.from({ length: fromLevels.length }, () => Array(toLevels.length).fill(0));
        for (let i = 0; i < fromLevels.length; i += 1) {
          const fromStates = (fromLevels[i].stateIndices || []).filter((k) => Number.isFinite(k));
          for (let j = 0; j < toLevels.length; j += 1) {
            const toStates = (toLevels[j].stateIndices || []).filter((k) => Number.isFinite(k));
            let s = 0;
            for (const fi of fromStates) {
              for (const tj of toStates) {
                const v = ((tr.matrix[fi] && tr.matrix[fi][tj]) || 0);
                s += v * v;
              }
            }
            const deg = Math.max(1, fromStates.length);
            raw[i][j] = s / deg;
          }
        }
        const share = Array.from({ length: fromLevels.length }, () => Array(toLevels.length).fill(0));
        for (let j = 0; j < toLevels.length; j += 1) {
          let colSum = 0;
          for (let i = 0; i < fromLevels.length; i += 1) colSum += raw[i][j];
          if (colSum <= 1e-20) continue;
          for (let i = 0; i < fromLevels.length; i += 1) share[i][j] = raw[i][j] / colSum;
        }
        return share;
      }

      function drawMixLinks(srcNodes, dstNodes, fromTag = "", toTag = "", fromLevels = [], toLevels = []) {
        if (!srcNodes.length || !dstNodes.length) return;
        const shares = buildLevelIncomingShareMatrix(fromTag, toTag, fromLevels, toLevels);
        if (shares) {
          for (let j = 0; j < dstNodes.length; j += 1) {
            const ranked = srcNodes
              .map((src, i) => ({ src, share: (shares[i] && shares[i][j]) || 0 }))
              .sort((a, b) => b.share - a.share);
            for (const item of ranked) {
              if (item.share < 1e-3) continue; // hide <0.1%
              const t = Math.max(0, Math.min(1, item.share));
              const alpha = 0.15 + 0.70 * Math.sqrt(t);
              const width = 0.6 + 2.4 * t; // 100% share ~= level solid line thickness
              parts.push(`<line x1="${item.src.xRight}" y1="${item.src.y}" x2="${dstNodes[j].xLeft}" y2="${dstNodes[j].y}" stroke="rgba(122,140,170,${alpha.toFixed(3)})" stroke-width="${width.toFixed(2)}" stroke-dasharray="4 4"/>`);
            }
          }
          return;
        }
        for (const dst of dstNodes) {
          const scored = srcNodes
            .map((src) => ({ src, score: overlapScore(src.w, dst.w) }))
            .sort((a, b) => b.score - a.score);
          const top = scored[0] ? scored[0].score : 0;
          for (const item of scored.slice(0, 2)) {
            if (item.score < Math.max(0.08, top * 0.55)) continue;
            const alpha = 0.25 + 0.5 * Math.min(1, item.score / (top || 1));
            parts.push(`<line x1="${item.src.xRight}" y1="${item.src.y}" x2="${dst.xLeft}" y2="${dst.y}" stroke="rgba(122,140,170,${alpha.toFixed(3)})" stroke-width="1.2" stroke-dasharray="4 4"/>`);
          }
        }
      }

      function buildStageYMapper(levels) {
        if (!levels || levels.length === 0) return () => yMid;
        if (scaleMode === "accurate") {
          return (energy) => yMid - energy * scale;
        }
        const center = levels.reduce((s, lv) => s + lv.energy, 0) / levels.length;
        let halfRange = 0;
        for (const lv of levels) {
          halfRange = Math.max(halfRange, Math.abs(lv.energy - center));
        }
        const baseHalfPx = Math.max(1e-6, halfRange * scale);
        const targetAmp = Math.max(SPLIT_GAIN, MIN_HALF_SPAN_PX / baseHalfPx);
        const base = center * scale;
        const low = yMid - (yBottom - 8);
        const high = yMid - (yTop + 8);
        let maxAmpFit = Number.POSITIVE_INFINITY;
        for (const lv of levels) {
          const d = (lv.energy - center) * scale;
          if (d > 1e-12) {
            maxAmpFit = Math.min(maxAmpFit, (high - base) / d);
          } else if (d < -1e-12) {
            maxAmpFit = Math.min(maxAmpFit, (base - low) / (-d));
          }
        }
        if (!Number.isFinite(maxAmpFit) || maxAmpFit <= 0) {
          maxAmpFit = targetAmp;
        }
        const amp = Math.max(0.35, Math.min(targetAmp, maxAmpFit));
        return (energy) => yMid - (center * scale + (energy - center) * scale * amp);
      }

      function drawStage(levels, x0, x1, showEnergy, stageTag = "") {
        const yOf = buildStageYMapper(levels);
        const yList = [];
        const nodes = [];
        const xCenter = (x0 + x1) * 0.5;
        const halfLen = 48;
        for (let i = 0; i < levels.length; i += 1) {
          const lv = levels[i];
          const y = yOf(lv.energy);
          yList.push(y);
          nodes.push({ xLeft: xCenter - halfLen, xRight: xCenter + halfLen, y, w: levelWeights(lv) });
          parts.push(drawLevelGroup({
            y,
            label: lv.label,
            energy: lv.energy,
            orbitalNames: lv.orbitals,
            hoverOrbitalNames: lv.hoverOrbitals || lv.orbitals,
            mixSpecs: lv.mixSpecs || [],
            mzSpecs: lv.mzSpecs || [],
            spinSpecs: lv.spinSpecs || [],
            spinOrbSpecs: lv.spinOrbSpecs || [],
            degenerateMixSpec: lv.degenerateMixSpec || "",
            degenerateMzSpec: lv.degenerateMzSpec || "",
            degenerateSpinSpec: lv.degenerateSpinSpec || "",
            degenerateSpinOrbSpec: lv.degenerateSpinOrbSpec || "",
            gFactor: lv.gFactor,
            levelIndex: i,
            stageTag,
            levelEnergy: lv.energy,
            selected: selectedStage === stageTag && selectedIndex === i,
            orbitalOcc: lv.orbitalOcc || lv.orbitals.map(() => 0),
            color: lv.color || "#1f4f8f",
            x0,
            x1,
            showElectrons: false,
            soiSplitPx: 0,
            showLabel: false,
            showEnergy
          }));
        }
        return { yList, nodes };
      }

      const stageA = drawStage(stage1Levels, x1a, x1b, true, stage1Tag || "CF");
      const stageB = drawStage(stage2Levels, x2a, x2b, false, stage2Tag || "SOI");
      const bStage = drawStage(stage3Levels, x3a, x3b, true, "B");
      function stageLabelPos(stageData, fallbackX) {
        const yList = (stageData && stageData.yList) ? stageData.yList : [];
        const nodes = (stageData && stageData.nodes) ? stageData.nodes : [];
        if (!yList.length) return { x: fallbackX, y: (labelBandTop + labelBandBottom) * 0.5 };
        let xCenter = fallbackX;
        if (nodes.length) {
          const sum = nodes.reduce((acc, node) => acc + (node.xLeft + node.xRight) * 0.5, 0);
          xCenter = sum / nodes.length;
        }
        // Keep stage titles in reserved top band, always above highest level.
        const yTopLevel = Math.min(...yList);
        const preferred = yTopLevel - 18;
        const y = Math.max(labelBandTop, Math.min(labelBandBottom, preferred));
        return { x: xCenter, y };
      }

      const stage1LabelPos = stageLabelPos(stageA, (x1a + x1b) * 0.5);
      const stage2LabelPos = stageLabelPos(stageB, (x2a + x2b) * 0.5);
      const stage3LabelPos = stageLabelPos(bStage, (x3a + x3b) * 0.5);
      const fiLabelX = freeCx;
      const fiLabelY = Math.max(20, yMid - 42);
      parts.push(`<text x="${fiLabelX}" y="${fiLabelY}" class="diagram-label diagram-stage-label" text-anchor="middle">Free Ion</text>`);
      parts.push(`<text x="${stage1LabelPos.x}" y="${stage1LabelPos.y}" class="diagram-label diagram-stage-label" text-anchor="middle">${stage1Label}</text>`);
      parts.push(`<text x="${stage2LabelPos.x}" y="${stage2LabelPos.y}" class="diagram-label diagram-stage-label" text-anchor="middle">${stage2Label}</text>`);
      parts.push(`<text x="${stage3LabelPos.x}" y="${stage3LabelPos.y}" class="diagram-label diagram-stage-label" text-anchor="middle">B</text>`);
      const freeNodes = [{ xLeft: freeCx - freeHalfLen, xRight: freeCx + freeHalfLen, y: yMid, w: levelWeights({ degenerateMixSpec: FREE_MIX }) }];
      const freeLevels = [{ stateIndices: Array.from({ length: 2 * ORBITAL_BASIS.length }, (_, i) => i) }];
      drawMixLinks(freeNodes, stageA.nodes, "FREE", (stage1Tag || "CF"), freeLevels, stage1Levels);
      drawMixLinks(stageA.nodes, stageB.nodes, (stage1Tag || "CF"), (stage2Tag || "SOI"), stage1Levels, stage2Levels);
      drawMixLinks(stageB.nodes, bStage.nodes, (stage2Tag || "SOI"), "B", stage2Levels, stage3Levels);

      const legendX = 16;
      const legendY = yBottom - 62;
      const degLegend = [
        { label: "g=1", color: "#1f4f8f" },
        { label: "g=2", color: "#9d5a20" },
        { label: "g=3", color: "#2f7f61" },
        { label: "g>=4", color: "#7a4fb3" }
      ];
      parts.push(`<text x="${legendX}" y="${legendY}" class="diagram-note">Degeneracy</text>`);
      for (let i = 0; i < degLegend.length; i += 1) {
        const y = legendY + 14 + i * 14;
        const item = degLegend[i];
        parts.push(`<text x="${legendX}" y="${y + 4}" style="fill:${item.color}; font-size:13px; font-weight:700;">${item.label}</text>`);
      }

      // Draw selected marker last so it always stays in front.
      const frontOverlay = [];
      if (selectedStage === "FREE") {
        pushFrontArrowLeft(frontOverlay, freeCx + freeHalfLen + 6, yMid, "FI#1");
      } else {
        let stageData = null;
        if (selectedStage === (stage1Tag || "CF")) stageData = stageA;
        else if (selectedStage === (stage2Tag || "SOI")) stageData = stageB;
        else if (selectedStage === "B") stageData = bStage;
        if (stageData && stageData.nodes && stageData.nodes.length) {
          const idx = Math.max(0, Math.min(Number(selectedIndex) || 0, stageData.nodes.length - 1));
          const node = stageData.nodes[idx];
          const stageShort = selectedStage || "";
          pushFrontArrowLeft(frontOverlay, node.xRight + 6, node.y, `${stageShort}#${idx + 1}`);
        }
      }
      parts.push(...frontOverlay);
      diagramEl.innerHTML = parts.join("");
    }

    function rerenderDiagramSelection() {
      if (!currentDiagramData) return;
      renderDiagram({
        ...currentDiagramData,
        selectedStage: orbitalView.stageTag,
        selectedIndex: orbitalView.stageLevelIndex
      });
      renderSelectedTransitionPanel();
    }

    function calculate(trackEvent = true, trigger = "user") {
      const nl = `${nEl.value}${lEl.value}`;
      setActiveSubshell(nl);
      const scaleMode = scaleModeEl.value;
      const geometry = geometryEl.value;
      const nOrb = ORBITAL_BASIS.length;
      const n = 1;
      const delta = Number(deltaEl.value);
      const delta2 = Number(delta2El.value);
      const lambdaValue = Number(lambdaEl.value);
      const bField = Number(bFieldEl.value);
      const bTheta = Number(bThetaEl.value);
      const bPhi = Number(bPhiEl.value);
      if (!Number.isFinite(delta) || delta < 0) {
        document.getElementById("status").textContent = "Delta must be >= 0.";
        return;
      }
      if (!Number.isFinite(lambdaValue) || lambdaValue < 0) {
        document.getElementById("status").textContent = "Lambda must be >= 0.";
        return;
      }
      if (!Number.isFinite(bField) || bField < 0) {
        document.getElementById("status").textContent = "B must be >= 0.";
        return;
      }
      if (!Number.isFinite(bTheta)) {
        document.getElementById("status").textContent = "Theta must be a number.";
        return;
      }
      if (!Number.isFinite(bPhi)) {
        document.getElementById("status").textContent = "Phi must be a number.";
        return;
      }

      const preset = FIELD_PRESETS[geometry] || FIELD_PRESETS.octa;
      const useDelta2 = !!preset.twoDelta;
      if (useDelta2 && (!Number.isFinite(delta2) || delta2 < 0)) {
        document.getElementById("status").textContent = "Delta2 must be >= 0.";
        return;
      }
      const d2 = useDelta2 ? delta2 : 0;
      const soiFirst = lambdaValue > Math.max(delta, d2);
      const stage1 = soiFirst
        ? solveLevelStage(preset, delta, d2, lambdaValue, 0, bTheta, bPhi, { cf: false, soi: true, magnetic: false }, n, geometry)
        : solveLevelStage(preset, delta, d2, 0, 0, bTheta, bPhi, { cf: true, soi: false, magnetic: false }, n, geometry);
      const stage2 = solveLevelStage(preset, delta, d2, lambdaValue, 0, bTheta, bPhi, { cf: true, soi: true, magnetic: false }, n, geometry);
      const stage3 = solveLevelStage(preset, delta, d2, lambdaValue, bField, bTheta, bPhi, { cf: true, soi: true, magnetic: true }, n, geometry);
      const dim = 2 * nOrb;
      const Hfree = makeZeroMatrix(dim);
      const H1 = soiFirst
        ? buildTotalHamiltonian(preset, delta, d2, lambdaValue, 0, bTheta, bPhi, { cf: false, soi: true, magnetic: false }, geometry)
        : buildTotalHamiltonian(preset, delta, d2, 0, 0, bTheta, bPhi, { cf: true, soi: false, magnetic: false }, geometry);
      const H2 = buildTotalHamiltonian(preset, delta, d2, lambdaValue, 0, bTheta, bPhi, { cf: true, soi: true, magnetic: false }, geometry);
      const H3 = buildTotalHamiltonian(preset, delta, d2, lambdaValue, bField, bTheta, bPhi, { cf: true, soi: true, magnetic: true }, geometry);
      const gByState = computeStateGFactors(preset, delta, d2, lambdaValue, bField, bTheta, bPhi, geometry);
      for (const lv of stage3.levels) {
        const idxs = lv.stateIndices || [];
        const vals = idxs.map((i) => gByState[i]).filter((v) => Number.isFinite(v));
        lv.gFactor = vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
      }
      const stage1Label = soiFirst ? "SOI" : "CF";
      const stage1Tag = soiFirst ? "SOI" : "CF";
      const stage2Label = soiFirst ? "CF" : "SOI";
      const stage2Tag = soiFirst ? "CF" : "SOI";
      const freeStagePseudo = {
        stateVectors: Array.from({ length: dim }, (_, i) => {
          const v = new Array(dim).fill(0);
          v[i] = 1;
          return v;
        }),
        stateEnergies: new Array(dim).fill(0)
      };
      const freeStageLevels = [{ label: "free", stateIndices: Array.from({ length: dim }, (_, i) => i) }];
      const M_free_to_1 = buildStateCouplingMatrix(freeStagePseudo, stage1, subtractMatrices(H1, Hfree));
      const M_1_to_2 = buildStateCouplingMatrix(stage1, stage2, subtractMatrices(H2, H1));
      const M_2_to_3 = buildStateCouplingMatrix(stage2, stage3, subtractMatrices(H3, H2));
      currentTransitionData = [
        { fromTag: "FREE", toTag: stage1Tag, fromLabel: "FI", toLabel: stage1Label, fromLevels: freeStageLevels, toLevels: stage1.levels, matrix: M_free_to_1 },
        { fromTag: stage1Tag, toTag: stage2Tag, fromLabel: stage1Label, toLabel: stage2Label, fromLevels: stage1.levels, toLevels: stage2.levels, matrix: M_1_to_2 },
        { fromTag: stage2Tag, toTag: "B", fromLabel: stage2Label, toLabel: "B", fromLevels: stage2.levels, toLevels: stage3.levels, matrix: M_2_to_3 }
      ];
      currentStageOrder = soiFirst
        ? ["FREE", "SOI", "CF", "B"]
        : ["FREE", "CF", "SOI", "B"];
      stageStateLevels.FREE = Array.from({ length: 2 * nOrb }, (_, i) => ({
        label: `free ${i + 1}`,
        energy: 0,
        degenerateMixSpec: FREE_MIX,
        degenerateMzSpec: FREE_MZ,
        degenerateSpinSpec: FREE_SPIN,
        degenerateSpinOrbSpec: FREE_SPINORB
      }));
      stageStateLevels.CF = (stage2Tag === "CF" ? stage2.levels : stage1.levels).map((lv) => ({ ...lv }));
      stageStateLevels.SOI = (stage1Tag === "SOI" ? stage1.levels : stage2.levels).map((lv) => ({ ...lv }));
      stageStateLevels.B = stage3.levels.map((lv) => ({ ...lv }));

      document.getElementById("status").textContent = `${preset.label} / ${nl}`;
      levelListEl.innerHTML = stage3.levels
        .map((level, idx) => `<div class="level level-hit" data-level-index="${idx}" data-energy="${level.energy}" data-g="${Number.isFinite(level.gFactor) ? level.gFactor : ""}" data-orbital="mixed" data-label="${level.label}" data-mix="${level.degenerateMixSpec || ""}" data-mz="${level.degenerateMzSpec || ""}" data-spin="${level.degenerateSpinSpec || ""}" data-spinorb="${level.degenerateSpinOrbSpec || ""}"><span>${level.label} (g=${level.orbitals.length})</span><strong>${level.energy.toFixed(8)} eV${Number.isFinite(level.gFactor) ? ` / g=${level.gFactor.toFixed(5)}` : ""}</strong></div>`)
        .join("");
      if (orbitalView.stageTag && orbitalView.stageLevelIndex !== null) {
        const curLevels = stageStateLevels[orbitalView.stageTag] || [];
        orbitalView.stageLevelIndex = Math.max(0, Math.min(orbitalView.stageLevelIndex, Math.max(0, curLevels.length - 1)));
      } else {
        const cfLevels = stageStateLevels.CF || [];
        if (cfLevels.length > 0) {
          orbitalView.stageTag = "CF";
          orbitalView.stageLevelIndex = 0;
          const lv = cfLevels[0];
          showOrbital("mixed", `CF / ${lv.label}`, lv.degenerateMixSpec || "", lv.degenerateMzSpec || "", lv.degenerateSpinSpec || "", lv.degenerateSpinOrbSpec || "", lv.energy, lv.gFactor);
        }
      }
      updateStateNav();
      renderSelectedTransitionPanel();

      renderDiagram({
        nl,
        scaleMode,
        stage1Levels: stage1.levels,
        stage1Label,
        stage1Tag,
        stage2Levels: stage2.levels,
        stage2Label,
        stage2Tag,
        stage3Levels: stage3.levels,
        lambdaValue,
        bField,
        selectedStage: orbitalView.stageTag,
        selectedIndex: orbitalView.stageLevelIndex
      });
      currentDiagramData = {
        nl,
        scaleMode,
        stage1Levels: stage1.levels,
        stage1Label,
        stage1Tag,
        stage2Levels: stage2.levels,
        stage2Label,
        stage2Tag,
        stage3Levels: stage3.levels,
        lambdaValue,
        bField
      };

      document.getElementById("note").textContent = `Note: ${2 * nOrb}x${2 * nOrb} single-electron Hamiltonian in orbital-spin basis; stages are solved by direct diagonalization.`;

      if (trackEvent && typeof window.gtag === "function") {
        window.gtag("event", "crystal_field_calculated", {
          nl,
          geometry,
          d_count: 1,
          delta_ev: Number(delta.toFixed(4)),
          delta2_ev: Number(d2.toFixed(4)),
          lambda_ev: Number(lambdaValue.toFixed(4)),
          b_field_t: Number(bField.toFixed(4)),
          b_theta_deg: Number(bTheta.toFixed(2)),
          b_phi_deg: Number(bPhi.toFixed(2)),
          soi_first: soiFirst ? 1 : 0,
          trigger
        });
      }
    }

    nEl.addEventListener("change", () => {
      syncLSelectorByN();
      calculate(true, "n_change");
    });
    function syncDelta2Visibility() {
      const preset = FIELD_PRESETS[geometryEl.value] || FIELD_PRESETS.octa;
      delta2WrapEl.style.display = preset.twoDelta ? "" : "none";
    }
    lEl.addEventListener("change", () => calculate(true, "l_change"));
    geometryEl.addEventListener("change", () => {
      syncDelta2Visibility();
      calculate(true, "geometry_change");
    });
    deltaEl.addEventListener("input", () => calculate(true, "delta_input"));
    delta2El.addEventListener("input", () => calculate(true, "delta2_input"));
    lambdaEl.addEventListener("input", () => calculate(true, "lambda_input"));
    bFieldEl.addEventListener("input", () => calculate(true, "b_field_input"));
    bThetaEl.addEventListener("input", () => calculate(true, "b_theta_input"));
    bPhiEl.addEventListener("input", () => calculate(true, "b_phi_input"));
    bDirXEl.addEventListener("click", () => {
      bThetaEl.value = "90";
      bPhiEl.value = "0";
      calculate(true, "b_dir_x");
    });
    bDirYEl.addEventListener("click", () => {
      bThetaEl.value = "90";
      bPhiEl.value = "90";
      calculate(true, "b_dir_y");
    });
    bDirZEl.addEventListener("click", () => {
      bThetaEl.value = "0";
      bPhiEl.value = "0";
      calculate(true, "b_dir_z");
    });
    scaleModeEl.addEventListener("change", () => calculate(true, "scale_mode_change"));
    diagramEl.addEventListener("click", (event) => {
      const target = event.target.closest(".orbital-hit");
      if (!target) return;
      const stage = target.dataset.stage || "";
      const idx = Number(target.dataset.levelIndex);
      if (stage && Number.isFinite(idx)) {
        orbitalView.stageTag = stage;
        orbitalView.stageLevelIndex = idx;
      } else {
        orbitalView.stageTag = null;
        orbitalView.stageLevelIndex = null;
      }
      orbitalView.ax = DEFAULT_VIEW_AX;
      orbitalView.ay = DEFAULT_VIEW_AY;
      orbitalView.zoom = DEFAULT_VIEW_ZOOM;
      showOrbital(
        target.dataset.orbital || "d",
        target.dataset.label || "",
        target.dataset.mix || "",
        target.dataset.mz || "",
        target.dataset.spin || "",
        target.dataset.spinorb || "",
        Number(target.dataset.energy),
        Number(target.dataset.g)
      );
      rerenderDiagramSelection();
      updateStateNav();
    });
    levelListEl.addEventListener("click", (event) => {
      const target = event.target.closest(".level-hit");
      if (!target) return;
      const idx = Number(target.dataset.levelIndex);
      orbitalView.stageTag = "B";
      orbitalView.stageLevelIndex = Number.isFinite(idx) ? idx : null;
      orbitalView.ax = DEFAULT_VIEW_AX;
      orbitalView.ay = DEFAULT_VIEW_AY;
      orbitalView.zoom = DEFAULT_VIEW_ZOOM;
      showOrbital(
        target.dataset.orbital || "mixed",
        target.dataset.label || "",
        target.dataset.mix || "",
        target.dataset.mz || "",
        target.dataset.spin || "",
        target.dataset.spinorb || "",
        Number(target.dataset.energy),
        Number(target.dataset.g)
      );
      rerenderDiagramSelection();
      updateStateNav();
    });
    stateLeftEl.addEventListener("click", () => shiftStage(-1));
    stateDownEl.addEventListener("click", () => selectStageState(null, null, -1));
    stateUpEl.addEventListener("click", () => selectStageState(null, null, +1));
    stateRightEl.addEventListener("click", () => shiftStage(+1));
    viewResetEl.addEventListener("click", () => {
      orbitalView.ax = DEFAULT_VIEW_AX;
      orbitalView.ay = DEFAULT_VIEW_AY;
      orbitalView.zoom = DEFAULT_VIEW_ZOOM;
      if (orbitalView.name) renderOrbital3D(orbitalView.name, orbitalView.mixSpec);
    });
    viewModeEl.addEventListener("change", () => {
      orbitalView.projection = viewModeEl.value === "isometric" ? "isometric" : "perspective";
      if (orbitalView.name) renderOrbital3D(orbitalView.name, orbitalView.mixSpec);
    });
    document.addEventListener("keydown", (event) => {
      const t = event.target;
      const tag = t && t.tagName ? t.tagName.toLowerCase() : "";
      if (tag === "input" || tag === "textarea" || tag === "select" || (t && t.isContentEditable)) return;
      if (event.key === "ArrowUp") {
        event.preventDefault();
        selectStageState(null, null, +1);
      } else if (event.key === "ArrowDown") {
        event.preventDefault();
        selectStageState(null, null, -1);
      } else if (event.key === "ArrowLeft") {
        event.preventDefault();
        shiftStage(-1);
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        shiftStage(+1);
      }
    });
    orbitalPreviewEl.addEventListener("pointerdown", (event) => {
      if (!orbitalView.name) return;
      orbitalView.dragging = true;
      orbitalView.pointerId = event.pointerId;
      orbitalView.lastX = event.clientX;
      orbitalView.lastY = event.clientY;
      orbitalPreviewEl.style.cursor = "grabbing";
      orbitalPreviewEl.setPointerCapture(event.pointerId);
      event.preventDefault();
    });

    orbitalPreviewEl.addEventListener("pointermove", (event) => {
      if (!orbitalView.dragging || orbitalView.pointerId !== event.pointerId || !orbitalView.name) return;
      const dx = event.clientX - orbitalView.lastX;
      const dy = event.clientY - orbitalView.lastY;
      orbitalView.lastX = event.clientX;
      orbitalView.lastY = event.clientY;
      orbitalView.ay += dx * 0.01;
      orbitalView.ax += dy * 0.01;
      orbitalView.ax = Math.max(-1.45, Math.min(1.45, orbitalView.ax));
      renderOrbital3D(orbitalView.name, orbitalView.mixSpec);
    });

    orbitalPreviewEl.addEventListener("wheel", (event) => {
      if (!orbitalView.name) return;
      event.preventDefault();
      const factor = Math.exp(-event.deltaY * 0.0015);
      orbitalView.zoom = Math.max(0.55, Math.min(2.8, orbitalView.zoom * factor));
      renderOrbital3D(orbitalView.name, orbitalView.mixSpec);
    }, { passive: false });

    function stopDrag(event) {
      if (orbitalView.pointerId !== event.pointerId) return;
      orbitalView.dragging = false;
      orbitalView.pointerId = null;
      orbitalPreviewEl.style.cursor = "grab";
      if (orbitalPreviewEl.hasPointerCapture(event.pointerId)) {
        orbitalPreviewEl.releasePointerCapture(event.pointerId);
      }
    }

    orbitalPreviewEl.addEventListener("pointerup", stopDrag);
    orbitalPreviewEl.addEventListener("pointercancel", stopDrag);

    syncLSelectorByN();
    syncDelta2Visibility();
    clearOrbitalPreview();
    calculate(false, "init");
  </script>
</body>
</html>
