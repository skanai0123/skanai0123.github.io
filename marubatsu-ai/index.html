            </tbody>
          `;
          }).join("")}
        </table>
        </div>
      `;
    }

    function recordMatchupResult(winner) {
      const record = makeResultRecord(winner);
      if (!record) return;
      applyResultRecord(matchupStats, record);
      if (!isRemoteTrackableStatsMode(record.mode)) return;
      const remoteRecord = {
        ...record,
        mode: record.mode === "2d_classic" ? "2d" : record.mode
      };
      void submitRemoteResult(remoteRecord);
    }

    function render(winLine = currentWinLine) {
      const cells = getCells();
      const hoveredLayer = mode === "3d" && hoveredTopIndex >= 0 ? Math.floor(hoveredTopIndex / 9) : -1;
      cells.forEach((cell) => {
        const i = Number(cell.dataset.index);
        const value = board[i] || "";
        const markClass = value;
        const selectionIndex = mode === "3d" ? hoveredTopIndex : (isQuantum2Mode() ? quantum2PendingCell : selectedIndex);
        const layer = Number(cell.dataset.layer);
        if (cell.classList.contains("voxel")) {
          const markEl = cell.querySelector(".mark");
          if (markEl) markEl.textContent = value;
        } else {
          cell.textContent = isQuantum2Mode() && value === "" ? quantum2LabelsForCell(i) : value;
        }
        let quantumTint = "";
        if (isQuantum1Mode() && value === "") {
          const probs = quantumProbabilities(i, quantumOuterORates);
          const xChance = Math.round(probs.x * 100);
          const oChance = Math.round(probs.o * 100);
          cell.dataset.prob = `X${xChance}/O${oChance}`;
          quantumTint = quantumTintStyle(probs);
        } else if (isQuantum2Mode() && value === "") {
          quantumTint = quantumTintStyle(quantum2CellProbabilities(i));
        } else {
          cell.dataset.prob = "";
        }
        cell.style.backgroundColor = quantumTint;
        cell.classList.toggle("x", markClass === "X");
        cell.classList.toggle("o", markClass === "O");
        cell.classList.toggle("quantum-empty", isQuantum1Mode() && !board[i]);
        cell.classList.toggle("quantum-b-empty", isQuantum2Mode() && !board[i]);
        cell.classList.toggle("pending", isQuantum2Mode() && i === quantum2PendingCell);
        cell.classList.toggle("win", winLine.includes(i));
        cell.classList.toggle("hint", i === hintIndex);
        cell.classList.toggle("forced-loss", i === hintIndex && hintForcedLoss);
        cell.classList.toggle("selected", i === selectionIndex);
        cell.classList.toggle("hover-top", i === hoveredTopIndex);
        cell.classList.toggle("hover-layer", mode === "3d" && hoveredLayer !== -1 && layer === hoveredLayer);
        cell.classList.add("active-layer-cell");
        cell.classList.remove("pass-through");
        cell.classList.remove("dim");
        cell.classList.remove("dim-empty");
        cell.disabled = roundOver || value !== "" || !isHumanTurn();
      });

      const coordIndex = mode === "3d" ? hoveredTopIndex : (isQuantum2Mode() ? quantum2PendingCell : selectedIndex);
      const coord = coordFromIndex(coordIndex);
      hintTextEl.textContent = hintMessage;
      hintTextEl.classList.toggle("forced-loss", hintForcedLoss);
      coordsEl.textContent = coord
        ? `Cell: x=${coord.x}, y=${coord.y}, z=${coord.z}, w=${coord.w}`
        : "";
      winEquationEl.textContent = roundOver && currentWinLine.length > 0
        ? winEquationText(currentWinLine)
        : "";

      scoreEl.textContent = scoreText();
      renderStatsSummary();
      mode2dClassicBtn.classList.toggle("active", !statsOpen && mode === "2d" && twoDVariant === "classic");
      mode2dQuantum1Btn.classList.toggle("active", !statsOpen && mode === "2d" && twoDVariant === "quantum1");
      mode2dQuantum2Btn.classList.toggle("active", !statsOpen && mode === "2d" && twoDVariant === "quantum2");
      mode3dBtn.classList.toggle("active", !statsOpen && mode === "3d");
      mode4dBtn.classList.toggle("active", !statsOpen && mode === "4d");
      statsBtn.classList.toggle("active", statsOpen);
      statsSummaryEl.classList.toggle("hidden", !statsOpen);
      gamePanelEl.classList.toggle("panel-hidden", statsOpen);
      quantumPanelEl.classList.toggle("hidden", mode !== "2d" || twoDVariant !== "quantum1" || statsOpen);
      quantumPanelBodyEl.classList.toggle("hidden", !quantumSettingsOpen);
      quantumSettingsBtn.classList.toggle("active", quantumSettingsOpen);
      matchAiBtn.classList.toggle("active", isAiMatch());
      matchAiAiBtn.classList.toggle("active", isAiVsAiMatch());
      matchPvpBtn.classList.toggle("active", matchType === "pvp");
      layerArrowsEl.classList.add("hidden");
      viewArrowsEl.classList.toggle("hidden", mode !== "3d");
      layerUpBtn.disabled = true;
      layerDownBtn.disabled = true;
      viewTiltUpBtn.disabled = viewRotateX >= VIEW_TILT_MAX;
      viewTiltDownBtn.disabled = viewRotateX <= VIEW_TILT_MIN;
      playAsXBtn.classList.toggle("active", human === "X");
      playAsOBtn.classList.toggle("active", human === "O");
      playAsXBtn.disabled = !isAiMatch();
      playAsOBtn.disabled = !isAiMatch();
      hintBtn.classList.toggle("hidden", isAiVsAiMatch() || (isAiMatch() && human !== "X") || isQuantum2Mode());
      hintBtn.disabled = isAiVsAiMatch() || (isAiMatch() && human !== "X") || roundOver || !isHumanTurn() || current !== "X" || quantumSimRunning || isQuantum2Mode();
      mattaBtn.disabled = isQuantum1Mode() || isQuantum2Mode() || moveHistory.length === 0 || quantumSimRunning;
      quantumSimBtn.disabled = quantumSimRunning;
      quantumGraphBtn.disabled = quantumSimRunning;
      quantumGraphRoundsEl.disabled = quantumSimRunning;
      centerOAdvantageInput.disabled = quantumSimRunning;
      centerOAdvantageValueEl.textContent = `${Math.round(quantumCenterORate * 100)}%`;
      quantumOuterSummaryEl.textContent = "Other cells: O uses 10/30/50/70/90 or 20/80 patterns";
      quantumSimResultEl.textContent = quantumSimResultEl.textContent;
      quantumGraphWrapEl.classList.toggle("hidden", quantumGraphSeries.length === 0);

      subtextEl.textContent = isQuantum1Mode()
        ? "Quantum A: every move is measured immediately with cell-fixed probabilities. Center can favor O."
        : isQuantum2Mode()
          ? "Quantum B: choose two cells per turn. Choosing the same cell twice claims it immediately; touching an occupied seed from the other player causes probabilistic interference."
          : (mode === "2d"
            ? "Classic 2D uses optimal play."
            : mode === "3d"
              ? "3D uses cube cells and a lightweight AI."
              : "4D uses a flattened 9x9 view with colored 3x3 blocks.");
    }

    function evaluateState(testBoard) {
      if (mode === "2d") return evaluate2DState(testBoard);
      for (const line of winLines()) {
        const [a, b, c] = line;
        if (testBoard[a] && testBoard[a] === testBoard[b] && testBoard[a] === testBoard[c]) {
          return { winner: testBoard[a], line };
        }
      }
      if (testBoard.every((v) => v !== "")) return { winner: "draw", line: [] };
      return { winner: null, line: [] };
    }

    function endRound(winner, line) {
      roundOver = true;
      hoveredTopIndex = -1;
      clearHint();
      currentWinLine = [...line];
      recordMatchupResult(winner);
      if (winner === "draw") {
        score.draw += 1;
        statusEl.textContent = "It's a draw.";
      } else {
        if (winner === "X") score.x += 1;
        if (winner === "O") score.o += 1;
        if (isAiVsAiMatch()) {
          statusEl.textContent = winner === "X" ? "AI X wins." : "AI O wins.";
        } else if (isAiMatch()) {
          statusEl.textContent = winner === human ? "You win." : "AI wins.";
        } else {
          statusEl.textContent = winner === "X" ? "Player X wins." : "Player O wins.";
        }
      }
      render(line);
    }

    function onMove(index) {
      if (roundOver) return;
      if (isAiVsAiMatch()) return;
      if (isAiMatch() && current !== human) return;
      if (board[index] !== "") {
        return;
      }

      if (mode === "3d") {
        activeLayer = Math.floor(index / 9);
      }
      clearHint();
      if (isQuantum2Mode()) {
        if (quantum2ActionStep === 0) {
          const result = quantum2ApplyAction(index, current, 1);
          if (!result.ok) return;
          quantum2PendingCell = index;
          selectedIndex = index;
          if (result.ended) return;
          quantum2ActionStep = 1;
          statusEl.textContent = turnLabel();
          render();
          return;
        }

        quantum2PendingCell = -1;
        selectedIndex = index;
        const result = quantum2ApplyAction(index, current, -1);
        if (!result.ok) {
          quantum2PendingCell = selectedIndex;
          statusEl.textContent = "Choose a different second cell.";
          render();
          return;
        }
        if (result.ended) return;
        quantum2ActionStep = 0;
        if (isAiMatch()) {
          current = ai;
          queueAiTurnIfNeeded();
        } else {
          current = current === "X" ? "O" : "X";
          statusEl.textContent = turnLabel();
          render();
        }
        return;
      }

      selectedIndex = index;
      if (isQuantum1Mode()) {
        board[index] = quantumCollapseMove(board, index, current);
        const result = evaluate2DState(board);
        if (result.winner) {
          endRound(result.winner, result.line);
          return;
        }
      } else {
        moveHistory.push({ index, player: current });
        board[index] = current;
        const result = evaluateState(board);
        if (result.winner) {
          endRound(result.winner, result.line);
          return;
        }
      }
      if (isAiMatch()) {
        current = ai;
        queueAiTurnIfNeeded();
      } else {
        current = current === "X" ? "O" : "X";
        statusEl.textContent = turnLabel();
        render();
      }
    }

    function onCellClick(event) {
      if (mode === "3d") return;
      const index = Number(event.currentTarget.dataset.index);
      onMove(index);
    }

    boardEl.addEventListener("pointermove", (event) => {
      if (mode !== "3d") return;
      if (roundOver) return;
      updateHoveredVoxelFromPoint(event.clientX, event.clientY);
    });

    boardEl.addEventListener("pointerleave", () => {
      if (roundOver) return;
      if (hoveredTopIndex === -1) return;
      hoveredTopIndex = -1;
      selectedIndex = -1;
      render();
    });

    boardEl.addEventListener("click", (event) => {
      if (mode !== "3d") return;
      if (roundOver) return;
      const index = selectedIndex;
      if (index === -1) return;
      event.preventDefault();
      onMove(index);
    });

    function playAiTurn() {
      if (!(isAiMatch() || isAiVsAiMatch())) return;
      if (roundOver || !isAiControlledTurn()) return;
      const prevHuman = human;
      const prevAi = ai;
      if (isAiVsAiMatch()) {
        ai = current;
        human = quantumOtherPlayer(current);
      }
      if (isQuantum2Mode()) {
        const [first, second] = getQuantum2AiPair(ai);
        if (first === -1) {
          human = prevHuman;
          ai = prevAi;
          current = isAiVsAiMatch() ? quantumOtherPlayer(current) : human;
          statusEl.textContent = turnLabel();
          render();
          return;
        }
        clearHint();
        quantum2ActionStep = 0;
        quantum2PendingCell = first;
        selectedIndex = first;
        let result = quantum2ApplyAction(first, ai, 1);
        if (!result.ok) {
          human = prevHuman;
          ai = prevAi;
          current = isAiVsAiMatch() ? quantumOtherPlayer(current) : human;
          quantum2PendingCell = -1;
          statusEl.textContent = turnLabel();
          render();
          return;
        }
        if (result.ended) {
          human = prevHuman;
          ai = prevAi;
          return;
        }
        if (second === -1) {
          human = prevHuman;
          ai = prevAi;
          current = isAiVsAiMatch() ? quantumOtherPlayer(current) : human;
          quantum2PendingCell = -1;
          statusEl.textContent = turnLabel();
          render();
          return;
        }
        selectedIndex = second;
        result = quantum2ApplyAction(second, ai, -1);
        quantum2PendingCell = -1;
        if (!result.ok) {
          human = prevHuman;
          ai = prevAi;
          current = isAiVsAiMatch() ? quantumOtherPlayer(current) : human;
          statusEl.textContent = turnLabel();
          render();
          if (isAiVsAiMatch()) queueAiTurnIfNeeded();
          return;
        }
        if (result.ended) {
          human = prevHuman;
          ai = prevAi;
          return;
        }
        human = prevHuman;
        ai = prevAi;
        current = isAiVsAiMatch() ? quantumOtherPlayer(current) : human;
        statusEl.textContent = turnLabel();
        render();
        if (isAiVsAiMatch()) queueAiTurnIfNeeded();
        return;
      }
      const bestMove = getAiMove(board);
      if (bestMove === -1) {
        human = prevHuman;
        ai = prevAi;
        return;
      }

      clearHint();
      selectedIndex = bestMove;
      if (isQuantum1Mode()) {
        board[bestMove] = quantumCollapseMove(board, bestMove, ai);
        const result = evaluate2DState(board);
        if (result.winner) {
          human = prevHuman;
          ai = prevAi;
          endRound(result.winner, result.line);
          return;
        }
      } else {
        moveHistory.push({ index: bestMove, player: ai });
        board[bestMove] = ai;
        const result = evaluateState(board);
        if (result.winner) {
          human = prevHuman;
          ai = prevAi;
          endRound(result.winner, result.line);
          return;
        }
      }

      human = prevHuman;
      ai = prevAi;
      current = isAiVsAiMatch() ? quantumOtherPlayer(current) : human;
      statusEl.textContent = turnLabel();
      render();
      if (isAiVsAiMatch()) queueAiTurnIfNeeded();
    }

    function applyMatta() {
      if (isQuantum1Mode()) return;
      if (moveHistory.length === 0) return;
      clearAiTimer();

      let undoCount = 1;
      if (isAiMatch()) {
        const aiPending = !roundOver && current === ai;
        undoCount = aiPending ? 1 : Math.min(2, moveHistory.length);
      }

      for (let i = 0; i < undoCount; i += 1) {
        const last = moveHistory.pop();
        if (!last) break;
        board[last.index] = "";
      }

      roundOver = false;
      hoveredTopIndex = -1;
      clearHint();
      selectedIndex = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1].index : -1;
      current = moveHistory.length > 0
        ? (moveHistory[moveHistory.length - 1].player === "X" ? "O" : "X")
        : "X";

      statusEl.textContent = turnLabel();
      render();
      queueAiTurnIfNeeded();
    }

    function minimax(testBoard, turn, depth) {
      const state = evaluateState(testBoard);
      if (state.winner === ai) return 10 - depth;
      if (state.winner === human) return depth - 10;
      if (state.winner === "draw") return 0;

      if (turn === ai) {
        let best = -Infinity;
        for (let i = 0; i < 9; i += 1) {
          if (testBoard[i] !== "") continue;
          testBoard[i] = ai;
          best = Math.max(best, minimax(testBoard, human, depth + 1));
          testBoard[i] = "";
        }
        return best;
      }

      let best = Infinity;
      for (let i = 0; i < 9; i += 1) {
        if (testBoard[i] !== "") continue;
        testBoard[i] = human;
        best = Math.min(best, minimax(testBoard, ai, depth + 1));
        testBoard[i] = "";
      }
      return best;
    }

    function getBestMove2D(testBoard) {
      return getBestMove2DWithScore(testBoard).move;
    }

    function getBestMove2DWithScore(testBoard) {
      let bestScore = -Infinity;
      let moves = [];
      for (let i = 0; i < 9; i += 1) {
        if (testBoard[i] !== "") continue;
        testBoard[i] = ai;
        const scoreNow = minimax(testBoard, human, 0);
        testBoard[i] = "";
        if (scoreNow > bestScore) {
          bestScore = scoreNow;
          moves = [i];
        } else if (scoreNow === bestScore) {
          moves.push(i);
        }
      }
      const move = moves.length === 0
        ? -1
        : (isAiVsAiMatch()
            ? moves[Math.floor(Math.random() * moves.length)]
            : moves[0]);
      return { move, score: bestScore };
    }

    function emptyCells(testBoard) {
      const result = [];
      for (let i = 0; i < testBoard.length; i += 1) {
        if (testBoard[i] === "") result.push(i);
      }
      return result;
    }

    function findImmediateWinMove(testBoard, player) {
      const empties = emptyCells(testBoard);
      for (const i of empties) {
        testBoard[i] = player;
        const state = evaluateState(testBoard);
        testBoard[i] = "";
        if (state.winner === player) return i;
      }
      return -1;
    }

    function heuristic3DMoveScore(testBoard, move, player = ai, opponent = human) {
      let scoreNow = 0;

      for (const line of WIN_LINES_3D) {
        if (!line.includes(move)) continue;
        let aiCount = 0;
        let humanCount = 0;
        for (const idx of line) {
          if (testBoard[idx] === player) aiCount += 1;
          if (testBoard[idx] === opponent) humanCount += 1;
        }
        if (aiCount > 0 && humanCount > 0) continue;

        if (aiCount > 0) {
          if (aiCount === 1) scoreNow += 2;
          if (aiCount === 2) scoreNow += 14;
          if (aiCount === 3) scoreNow += 500;
        }
        if (humanCount > 0) {
          if (humanCount === 1) scoreNow -= 1;
          if (humanCount === 2) scoreNow -= 12;
          if (humanCount === 3) scoreNow -= 400;
        }
      }

      if (move === 13) scoreNow += 4;

      const corners = new Set([0, 2, 6, 8, 18, 20, 24, 26]);
      if (corners.has(move)) scoreNow += 2;

      return scoreNow;
    }

    function evaluateBoard3D(testBoard, player = ai, opponent = human) {
      let scoreNow = 0;
      for (const line of WIN_LINES_3D) {
        let aiCount = 0;
        let humanCount = 0;
        for (const idx of line) {
          if (testBoard[idx] === player) aiCount += 1;
          if (testBoard[idx] === opponent) humanCount += 1;
        }
        if (aiCount > 0 && humanCount > 0) continue;
        if (aiCount > 0) {
          if (aiCount === 1) scoreNow += 2;
          if (aiCount === 2) scoreNow += 14;
        }
        if (humanCount > 0) {
          if (humanCount === 1) scoreNow -= 2;
          if (humanCount === 2) scoreNow -= 16;
        }
      }
      return scoreNow;
    }

    function orderedMoves3D(testBoard, player = ai, opponent = human) {
      const empties = emptyCells(testBoard);
      return empties
        .map((move) => {
          testBoard[move] = player;
          const scoreNow = heuristic3DMoveScore(testBoard, move, player, opponent);
          testBoard[move] = "";
          return { move, score: scoreNow };
        })
        .sort((a, b) => b.score - a.score)
        .map((entry) => entry.move);
    }

    function minimax3D(testBoard, turn, depth, maxDepth, player = ai, opponent = human, alpha = -Infinity, beta = Infinity) {
      const state = evaluateState(testBoard);
      if (state.winner === player) return 10000 - depth;
      if (state.winner === opponent) return depth - 10000;
      if (state.winner === "draw") return 0;
      if (depth >= maxDepth) return evaluateBoard3D(testBoard, player, opponent);

      const empties = turn === player ? orderedMoves3D(testBoard, player, opponent) : emptyCells(testBoard);
      if (turn === player) {
        let best = -Infinity;
        for (const i of empties) {
          testBoard[i] = player;
          best = Math.max(best, minimax3D(testBoard, opponent, depth + 1, maxDepth, player, opponent, alpha, beta));
          testBoard[i] = "";
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
        return best;
      }

      let best = Infinity;
      for (const i of empties) {
        testBoard[i] = opponent;
        best = Math.min(best, minimax3D(testBoard, player, depth + 1, maxDepth, player, opponent, alpha, beta));
        testBoard[i] = "";
        beta = Math.min(beta, best);
        if (beta <= alpha) break;
      }
      return best;
    }

    function getBestMove3DHint(testBoard, lookaheadDepth = 5, player = ai, opponent = human) {
      const empties = orderedMoves3D(testBoard, player, opponent);
      if (empties.length === 0) return { move: -1, score: -Infinity };

      let bestScore = -Infinity;
      let bestMove = -1;
      for (const move of empties) {
        testBoard[move] = player;
        const scoreNow = minimax3D(testBoard, opponent, 1, lookaheadDepth, player, opponent);
        testBoard[move] = "";
        if (scoreNow > bestScore) {
          bestScore = scoreNow;
          bestMove = move;
        }
      }

      return { move: bestMove, score: bestScore };
    }

    function heuristic4DMoveScore(testBoard, move, player = ai, opponent = human) {
      let scoreNow = 0;
      for (const line of WIN_LINES_4D) {
        if (!line.includes(move)) continue;
        let aiCount = 0;
        let humanCount = 0;
        for (const idx of line) {
          if (testBoard[idx] === player) aiCount += 1;
          if (testBoard[idx] === opponent) humanCount += 1;
        }
        if (aiCount > 0 && humanCount > 0) continue;

        if (aiCount > 0) {
          if (aiCount === 1) scoreNow += 3;
          if (aiCount === 2) scoreNow += 18;
          if (aiCount === 3) scoreNow += 800;
        }
        if (humanCount > 0) {
          if (humanCount === 1) scoreNow -= 2;
          if (humanCount === 2) scoreNow -= 16;
          if (humanCount === 3) scoreNow -= 700;
        }
      }

      if (move === idx4D(1, 1, 1, 1)) scoreNow += 8;
      return scoreNow;
    }

    function evaluateBoard4D(testBoard, player = ai, opponent = human) {
      let scoreNow = 0;
      for (const line of WIN_LINES_4D) {
        let aiCount = 0;
        let humanCount = 0;
        for (const idx of line) {
          if (testBoard[idx] === player) aiCount += 1;
          if (testBoard[idx] === opponent) humanCount += 1;
        }
        if (aiCount > 0 && humanCount > 0) continue;
        if (aiCount > 0) {
          if (aiCount === 1) scoreNow += 3;
          if (aiCount === 2) scoreNow += 20;
        }
        if (humanCount > 0) {
          if (humanCount === 1) scoreNow -= 3;
          if (humanCount === 2) scoreNow -= 22;
        }
      }
      return scoreNow;
    }

    function orderedMoves4D(testBoard, beamWidth = 10, player = ai, opponent = human) {
      return emptyCells(testBoard)
        .map((move) => {
          testBoard[move] = player;
          const scoreNow = heuristic4DMoveScore(testBoard, move, player, opponent);
          testBoard[move] = "";
          return { move, score: scoreNow };
        })
        .sort((a, b) => b.score - a.score)
        .slice(0, beamWidth)
        .map((entry) => entry.move);
    }

    function minimax4D(testBoard, turn, depth, maxDepth, beamWidth, player = ai, opponent = human, alpha = -Infinity, beta = Infinity) {
      const state = evaluateState(testBoard);
      if (state.winner === player) return 10000 - depth;
      if (state.winner === opponent) return depth - 10000;
      if (state.winner === "draw") return 0;
      if (depth >= maxDepth) return evaluateBoard4D(testBoard, player, opponent);

      const empties = turn === player ? orderedMoves4D(testBoard, beamWidth, player, opponent) : emptyCells(testBoard).slice(0, beamWidth);
      if (turn === player) {
        let best = -Infinity;
        for (const move of empties) {
          testBoard[move] = player;
          best = Math.max(best, minimax4D(testBoard, opponent, depth + 1, maxDepth, beamWidth, player, opponent, alpha, beta));
          testBoard[move] = "";
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
        return best;
      }

      let best = Infinity;
      for (const move of empties) {
        testBoard[move] = opponent;
        best = Math.min(best, minimax4D(testBoard, player, depth + 1, maxDepth, beamWidth, player, opponent, alpha, beta));
        testBoard[move] = "";
        beta = Math.min(beta, best);
        if (beta <= alpha) break;
      }
      return best;
    }

    function getBestMove3D(testBoard, player = ai, opponent = human) {
      return getBestMove3DWithScore(testBoard, 0, player, opponent).move;
    }

    function getBestMove3DWithScore(testBoard, lookaheadDepth = 0, player = ai, opponent = human) {
      const winMove = findImmediateWinMove(testBoard, player);
      if (winMove !== -1) return { move: winMove, score: 10000 };

      const blockMove = findImmediateWinMove(testBoard, opponent);
      if (blockMove !== -1) return { move: blockMove, score: 5000 };

      const empties = emptyCells(testBoard);
      if (empties.length === 0) return { move: -1, score: -Infinity };

      let bestScore = -Infinity;
      let candidates = [];

      for (const i of empties) {
        testBoard[i] = player;
        const scoreNow = lookaheadDepth > 0
          ? minimax3D(testBoard, opponent, 1, lookaheadDepth, player, opponent)
          : heuristic3DMoveScore(testBoard, i, player, opponent);
        testBoard[i] = "";

        if (scoreNow > bestScore) {
          bestScore = scoreNow;
          candidates = [i];
        } else if (scoreNow === bestScore) {
          candidates.push(i);
        }
      }

      return {
        move: candidates[Math.floor(Math.random() * candidates.length)],
        score: bestScore
      };
    }

    function getBestMove4D(testBoard, player = ai, opponent = human) {
      const winMove = findImmediateWinMove(testBoard, player);
      if (winMove !== -1) return winMove;

      const blockMove = findImmediateWinMove(testBoard, opponent);
      if (blockMove !== -1) return blockMove;

      const empties = emptyCells(testBoard);
      if (empties.length === 0) return -1;

      let bestScore = -Infinity;
      let candidates = [];
      for (const i of empties) {
        testBoard[i] = player;
        const scoreNow = heuristic4DMoveScore(testBoard, i, player, opponent);
        testBoard[i] = "";

        if (scoreNow > bestScore) {
          bestScore = scoreNow;
          candidates = [i];
        } else if (scoreNow === bestScore) {
          candidates.push(i);
        }
      }
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function getBestMove4DWithScore(testBoard, lookaheadDepth = 3, beamWidth = 10, player = ai, opponent = human) {
      const empties = orderedMoves4D(testBoard, beamWidth, player, opponent);
      if (empties.length === 0) return { move: -1, score: -Infinity };

      let bestScore = -Infinity;
      let bestMove = -1;
      for (const move of empties) {
        testBoard[move] = player;
        const scoreNow = minimax4D(testBoard, opponent, 1, lookaheadDepth, beamWidth, player, opponent);
        testBoard[move] = "";
        if (scoreNow > bestScore) {
          bestScore = scoreNow;
          bestMove = move;
        }
      }

      return { move: bestMove, score: bestScore };
    }

    function getAiMove(testBoard) {
      if (isQuantum1Mode()) return getQuantum1BestMove([...testBoard], current).move;
      if (isQuantum2Mode()) return -1;
      if (mode === "2d") return getBestMove2D(testBoard);
      if (mode === "3d") return getBestMove3D(testBoard, ai, human);
      return getBestMove4D(testBoard, ai, human);
    }

    function newRound() {
      clearAiTimer();
      board = Array(cellCount()).fill("");
      quantumOuterORates = generateQuantumOuterORates();
      quantumMinimaxCache = new Map();
      quantum2Cells = createQuantum2Cells();
      if (isQuantum2Mode()) {
        quantum2Cells[4].touches.push({ player: "O", phase: 1 });
      }
      quantum2PendingCell = -1;
      quantum2ActionStep = 0;
      moveHistory = [];
      clearHint();
      currentWinLine = [];
      current = "X";
      selectedIndex = -1;
      hoveredTopIndex = -1;
      roundOver = false;
      statusEl.textContent = turnLabel();
      render();
      queueAiTurnIfNeeded();
    }

    mode2dClassicBtn.addEventListener("click", () => {
      set2DModeVariant("classic");
    });

    mode2dQuantum1Btn.addEventListener("click", () => {
      set2DModeVariant("quantum1");
    });

    mode2dQuantum2Btn.addEventListener("click", () => {
      set2DModeVariant("quantum2");
    });

    quantumSettingsBtn.addEventListener("click", () => {
      quantumSettingsOpen = !quantumSettingsOpen;
      render();
    });

    mode3dBtn.addEventListener("click", () => {
      setMode("3d");
    });

    mode4dBtn.addEventListener("click", () => {
      setMode("4d");
    });

    statsBtn.addEventListener("click", () => {
      statsOpen = !statsOpen;
      render();
    });

    matchAiBtn.addEventListener("click", () => {
      setMatchType("ai");
    });

    matchAiAiBtn.addEventListener("click", () => {
      setMatchType("ai_ai");
    });

    matchPvpBtn.addEventListener("click", () => {
      setMatchType("pvp");
    });

    layerUpBtn.addEventListener("click", () => {
      setActiveLayer(activeLayer + 1);
    });

    layerDownBtn.addEventListener("click", () => {
      setActiveLayer(activeLayer - 1);
    });

    viewLeftBtn.addEventListener("click", () => {
      viewRotateZ -= VIEW_STEP;
      apply3DViewTransform();
      render();
    });

    viewRightBtn.addEventListener("click", () => {
      viewRotateZ += VIEW_STEP;
      apply3DViewTransform();
      render();
    });

    viewTiltUpBtn.addEventListener("click", () => {
      viewRotateX = Math.min(VIEW_TILT_MAX, viewRotateX + VIEW_STEP);
      apply3DViewTransform();
      render();
    });

    viewTiltDownBtn.addEventListener("click", () => {
      viewRotateX = Math.max(VIEW_TILT_MIN, viewRotateX - VIEW_STEP);
      apply3DViewTransform();
      render();
    });

    playAsXBtn.addEventListener("click", () => {
      human = "X";
      ai = "O";
      newRound();
    });

    playAsOBtn.addEventListener("click", () => {
      human = "O";
      ai = "X";
      newRound();
    });

    hintBtn.addEventListener("click", () => {
      const hint = getHintInfo();
      hintIndex = hint.move;
      hintForcedLoss = hint.forcedLoss;
      hintMessage = hint.message;
      render();
    });

    centerOAdvantageInput.addEventListener("input", () => {
      quantumCenterORate = Number(centerOAdvantageInput.value) / 100;
      quantumMinimaxCache = new Map();
      if (isQuantum1Mode()) {
        clearHint();
        render();
      } else {
        centerOAdvantageValueEl.textContent = `${Math.round(quantumCenterORate * 100)}%`;
      }
    });

    quantumSimBtn.addEventListener("click", async () => {
      if (quantumSimRunning) return;
      clearHint();
      await runQuantumAiSimulation(Number(quantumGraphRoundsEl.value));
    });

    quantumGraphBtn.addEventListener("click", async () => {
      if (quantumSimRunning) return;
      clearHint();
      quantumSettingsOpen = true;
      await runQuantumGraphSweep();
    });

    mattaBtn.addEventListener("click", () => {
      applyMatta();
    });

    restartRoundBtn.addEventListener("click", () => {
      newRound();
    });

    resetScoreBtn.addEventListener("click", () => {
      score = { x: 0, o: 0, draw: 0 };
      matchupStats = createInitialMatchupStats();
      newRound();
    });

    buildBoardDom();
    newRound();
    void loadRemoteMatchupStats();
  </script>
  <script src="../shared/back-to-hub.js"></script>
</body>
