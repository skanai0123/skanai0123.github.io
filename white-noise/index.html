<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Sleep Sounds</title>
  <meta name="description" content="Browser noise generator with brown, rain, pink, and white noise.">
  <link rel="icon" href="../shared/icons/utility.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../shared/back-to-hub.css">
  <script defer src="../shared/back-to-hub.js"></script>
  <style>
    :root {
      --bg: #eef5f2;
      --paper: #fffdf8;
      --ink: #19211c;
      --muted: #65706a;
      --line: rgba(25, 33, 28, 0.16);
      --accent: #0f7b63;
      --accent-2: #b63d57;
      --active: #f1a72c;
      --shadow: 0 18px 48px rgba(25, 33, 28, 0.12);
      --brown: #b47a43;
      --rain: #62a6cf;
      --pink: #e86f93;
      --white: #f8f6ec;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(15, 123, 99, 0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(98, 166, 207, 0.06) 1px, transparent 1px),
        linear-gradient(145deg, var(--bg), #f4f0e7 54%, #eef2f6);
      background-size: 24px 24px, 24px 24px, auto;
      padding: 24px;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(880px, 100%);
      margin: 0 auto;
      padding-top: 28px;
    }

    .hero {
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      max-width: 74ch;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .deck {
      display: grid;
      gap: 12px;
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.9);
      box-shadow: var(--shadow);
    }

    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .readout strong {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .status-row {
      display: flex;
      justify-content: flex-end;
      min-height: 18px;
    }

    .status::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #aab3ad;
    }

    .deck.playing .status::before {
      background: var(--active);
      box-shadow: 0 0 0 5px rgba(241, 167, 44, 0.18);
    }

    .meters {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .meter {
      display: grid;
      gap: 7px;
    }

    .meter[hidden] {
      display: none;
    }

    .meter-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .visualizer {
      width: 100%;
      height: 132px;
      border: 1px solid rgba(25, 33, 28, 0.2);
      border-radius: 6px;
      background: #101815;
      display: block;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input[type="range"] {
      width: min(340px, 60%);
      accent-color: var(--accent);
    }

    input[type="number"] {
      width: 86px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      font-weight: 800;
    }

    .noise-type,
    .timer-presets,
    .fade-mode {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .noise-type {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .btn,
    .type-btn,
    .preset-btn,
    .fade-btn {
      min-height: 42px;
      border: 1px solid rgba(25, 33, 28, 0.18);
      border-radius: 8px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 800;
      touch-action: manipulation;
    }

    .type-btn {
      min-height: 74px;
      padding: 8px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.56);
      overflow: hidden;
    }

    .btn {
      color: var(--paper);
      background: var(--accent);
    }

    .btn.secondary,
    .type-btn,
    .preset-btn,
    .fade-btn {
      color: var(--ink);
      background: transparent;
    }

    .btn.warn {
      background: var(--accent-2);
    }

    .type-btn[aria-pressed="true"],
    .fade-btn[aria-pressed="true"] {
      color: var(--paper);
      background: var(--accent);
    }

    .type-btn[aria-pressed="true"] {
      box-shadow: inset 0 0 0 3px rgba(255, 253, 248, 0.72);
    }

    .sound-symbol {
      width: min(84px, 72%);
      height: 44px;
      position: relative;
      display: block;
    }

    .sound-symbol::before,
    .sound-symbol::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .brown-symbol::before {
      background:
        linear-gradient(180deg, transparent 0 5px, var(--brown) 5px 10px, transparent 10px 17px, #d0a16b 17px 23px, transparent 23px 31px, #8b5b34 31px 37px, transparent 37px);
      border-radius: 12px;
    }

    .rain-symbol::before {
      background:
        radial-gradient(ellipse at 22% 28%, var(--rain) 0 5px, transparent 6px),
        radial-gradient(ellipse at 50% 62%, #88c4df 0 5px, transparent 6px),
        radial-gradient(ellipse at 75% 34%, #3f86ad 0 5px, transparent 6px);
    }

    .pink-symbol::before {
      background:
        linear-gradient(90deg, transparent 0 7%, var(--pink) 7% 13%, transparent 13% 24%, #ff9db6 24% 33%, transparent 33% 46%, #d44f79 46% 55%, transparent 55% 70%, #ff9db6 70% 78%, transparent 78%);
      border-radius: 20px;
    }

    .white-symbol {
      border-radius: 16px;
      background: #18211e;
    }

    .white-symbol::before {
      background:
        radial-gradient(circle at 18% 24%, var(--white) 0 2px, transparent 3px),
        radial-gradient(circle at 42% 70%, var(--white) 0 2px, transparent 3px),
        radial-gradient(circle at 63% 38%, var(--white) 0 2px, transparent 3px),
        radial-gradient(circle at 82% 62%, var(--white) 0 2px, transparent 3px),
        radial-gradient(circle at 34% 43%, #dce5df 0 1px, transparent 2px),
        radial-gradient(circle at 72% 20%, #dce5df 0 1px, transparent 2px);
    }

    .timer-panel {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.46);
    }

    .timer-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .readout {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .analysis-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 720px) {
      body { padding: 14px; }
      .shell { padding-top: 34px; }
      .type-btn {
        min-height: 58px;
      }
      .sound-symbol {
        width: 46px;
        height: 32px;
      }
      .readout,
      .timer-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .field {
        display: grid;
        gap: 8px;
      }
      input[type="range"] {
        width: 100%;
      }
      input[type="number"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero" aria-labelledby="pageTitle">
      <h1 id="pageTitle">Baby Sleep Sounds</h1>
      <p class="lead">家庭で使うための個人用ツールです。長時間・大音量での使用は避け、端末を赤ちゃんの耳元に置かないでください。体調や睡眠に不安がある場合は医療者に相談してください。</p>
    </section>

    <article class="deck" id="deck">
      <div class="status-row">
        <span class="status" id="status">stopped</span>
      </div>

      <div class="noise-type" role="group" aria-label="Noise playback">
        <button class="type-btn" type="button" data-noise="brown" aria-pressed="false" aria-label="Brown noise" title="Brown">
          <span class="sound-symbol brown-symbol" aria-hidden="true"></span>
          <span class="visually-hidden">Brown</span>
        </button>
        <button class="type-btn" type="button" data-noise="rain" aria-pressed="false" aria-label="Soft rain" title="Rain">
          <span class="sound-symbol rain-symbol" aria-hidden="true"></span>
          <span class="visually-hidden">Rain</span>
        </button>
        <button class="type-btn" type="button" data-noise="pink" aria-pressed="false" aria-label="Pink noise" title="Pink">
          <span class="sound-symbol pink-symbol" aria-hidden="true"></span>
          <span class="visually-hidden">Pink</span>
        </button>
        <button class="type-btn" type="button" data-noise="white" aria-pressed="false" aria-label="White noise" title="White">
          <span class="sound-symbol white-symbol" aria-hidden="true"></span>
          <span class="visually-hidden">White</span>
        </button>
      </div>

      <div class="controls">
        <div class="timer-panel" aria-label="Timer controls">
          <div class="field">
            <label for="timerMinutes">Timer</label>
            <input id="timerMinutes" type="number" min="0" max="720" step="1" value="10" inputmode="numeric">
          </div>
          <div class="timer-actions" role="group" aria-label="Timer actions">
            <button class="preset-btn" id="addTen" type="button">Add 10 min</button>
            <button class="fade-btn" id="fadeToggle" type="button" aria-pressed="true">Fade</button>
            <button class="preset-btn" type="button" data-minutes="0">Off</button>
          </div>
        </div>
        <div class="field">
          <label for="gain">Volume</label>
          <input id="gain" type="range" min="0" max="1" step="0.01" value="0.42">
        </div>
      </div>

      <div class="readout">
        <div class="metric"><span>Volume</span><strong id="gainRead">42%</strong></div>
        <div class="metric"><span>Type</span><strong id="typeRead">brown</strong></div>
        <div class="metric"><span>Timer</span><strong id="timerRead">10 min set</strong></div>
        <div class="metric"><span>Fade</span><strong id="fadeRead">on</strong></div>
      </div>

      <div class="analysis-controls">
        <button class="btn secondary" id="waveformToggle" type="button" aria-pressed="false">Waveform Off</button>
        <button class="btn secondary" id="spectrumToggle" type="button" aria-pressed="false">Spectrum Off</button>
      </div>

      <div class="meters">
        <div class="meter" id="waveformMeter" hidden>
          <span class="meter-label">Waveform</span>
          <canvas class="visualizer" id="scope" width="900" height="220" aria-label="Noise waveform"></canvas>
        </div>
        <div class="meter" id="spectrumMeter" hidden>
          <span class="meter-label">FFT spectrum</span>
          <canvas class="visualizer" id="spectrum" width="900" height="220" aria-label="Noise FFT spectrum"></canvas>
        </div>
      </div>
    </article>
  </main>

  <script>
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    let audioContext = null;
    let processor = null;
    let workletModuleReady = null;
    let gainNode = null;
    let analyser = null;
    let waveform = null;
    let spectrum = null;
    let animationId = 0;
    let timerIntervalId = 0;
    let timerEndMs = 0;
    let timerStartMs = 0;
    let timerDurationMs = 0;
    let playing = false;
    let noiseType = "brown";
    let fadeMode = "last-minute";
    let audioUnlocked = false;
    let lastToggleMs = 0;
    let suppressClickUntilMs = 0;
    let starting = false;
    let startRequestId = 0;
    let iosMediaUnlock = null;
    let waveformEnabled = false;
    let spectrumEnabled = false;
    let pinkB0 = 0;
    let pinkB1 = 0;
    let pinkB2 = 0;
    let pinkB3 = 0;
    let pinkB4 = 0;
    let pinkB5 = 0;
    let pinkB6 = 0;
    let brownLast = 0;
    let rainLow = 0;
    let rainDrop = 0;

    const deck = document.getElementById("deck");
    const statusEl = document.getElementById("status");
    const waveformMeter = document.getElementById("waveformMeter");
    const canvas = document.getElementById("scope");
    const spectrumMeter = document.getElementById("spectrumMeter");
    const spectrumCanvas = document.getElementById("spectrum");
    const gainSlider = document.getElementById("gain");
    const gainRead = document.getElementById("gainRead");
    const typeRead = document.getElementById("typeRead");
    const timerMinutes = document.getElementById("timerMinutes");
    const timerRead = document.getElementById("timerRead");
    const fadeRead = document.getElementById("fadeRead");
    const waveformToggle = document.getElementById("waveformToggle");
    const spectrumToggle = document.getElementById("spectrumToggle");
    const addTen = document.getElementById("addTen");
    const fadeToggle = document.getElementById("fadeToggle");
    const typeButtons = Array.from(document.querySelectorAll(".type-btn"));
    const presetButtons = Array.from(document.querySelectorAll(".preset-btn"));

    function isProbablyIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    async function ensureAudio() {
      if (!AudioContextClass) {
        throw new Error("Web Audio API is not available in this browser.");
      }
      if (!audioContext) {
        audioContext = new AudioContextClass();
      }
      unlockAudioOutput();
      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }
      unlockAudioOutput();
      updateUi();
    }

    function ensureAudioFromGesture() {
      if (!AudioContextClass) {
        throw new Error("Web Audio API is not available in this browser.");
      }
      prepareIOSAudioOutput();
      if (!audioContext) {
        audioContext = new AudioContextClass();
      }
      unlockAudioOutput();
      if (audioContext.state === "suspended") {
        audioContext.resume().then(updateUi).catch(() => {
          statusEl.textContent = "tap Start again";
        });
      }
      unlockAudioOutput();
    }

    function prepareIOSAudioOutput() {
      if (!isProbablyIOS()) return;
      if (navigator.audioSession && "type" in navigator.audioSession) {
        try {
          navigator.audioSession.type = "playback";
        } catch (error) {
          // Older Safari builds expose no writable audio session type.
        }
      }
      if (!iosMediaUnlock) {
        iosMediaUnlock = document.createElement("audio");
        iosMediaUnlock.setAttribute("x-webkit-airplay", "deny");
        iosMediaUnlock.setAttribute("playsinline", "");
        iosMediaUnlock.preload = "auto";
        iosMediaUnlock.loop = true;
        iosMediaUnlock.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
      }
      const playPromise = iosMediaUnlock.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(() => {
          statusEl.textContent = "tap Start again";
        });
      }
    }

    function unlockAudioOutput() {
      if (!audioContext || audioUnlocked) return;
      const silent = audioContext.createBufferSource();
      const silentGain = audioContext.createGain();
      silent.buffer = audioContext.createBuffer(1, 1, audioContext.sampleRate);
      silentGain.gain.value = 0;
      silent.connect(silentGain);
      silentGain.connect(audioContext.destination);
      silent.start(0);
      audioUnlocked = true;
    }

    async function loadNoiseWorklet() {
      if (!audioContext.audioWorklet) return false;
      if (!workletModuleReady) {
        const workletCode = `
          class NoiseGeneratorProcessor extends AudioWorkletProcessor {
            constructor() {
              super();
              this.noiseType = "brown";
              this.pinkB0 = 0;
              this.pinkB1 = 0;
              this.pinkB2 = 0;
              this.pinkB3 = 0;
              this.pinkB4 = 0;
              this.pinkB5 = 0;
              this.pinkB6 = 0;
              this.brownLast = 0;
              this.rainLow = 0;
              this.rainDrop = 0;
              this.port.onmessage = (event) => {
                if (event.data && event.data.noiseType) {
                  this.noiseType = event.data.noiseType;
                }
              };
            }

            process(inputs, outputs) {
              const output = outputs[0][0];
              for (let i = 0; i < output.length; i += 1) {
                const white = Math.random() * 2 - 1;
                if (this.noiseType === "pink") {
                  this.pinkB0 = 0.99886 * this.pinkB0 + white * 0.0555179;
                  this.pinkB1 = 0.99332 * this.pinkB1 + white * 0.0750759;
                  this.pinkB2 = 0.96900 * this.pinkB2 + white * 0.1538520;
                  this.pinkB3 = 0.86650 * this.pinkB3 + white * 0.3104856;
                  this.pinkB4 = 0.55000 * this.pinkB4 + white * 0.5329522;
                  this.pinkB5 = -0.7616 * this.pinkB5 - white * 0.0168980;
                  output[i] = (this.pinkB0 + this.pinkB1 + this.pinkB2 + this.pinkB3 + this.pinkB4 + this.pinkB5 + this.pinkB6 + white * 0.5362) * 0.18;
                  this.pinkB6 = white * 0.115926;
                } else if (this.noiseType === "rain") {
                  this.rainLow = 0.985 * this.rainLow + 0.015 * white;
                  if (this.rainDrop < 0.0004 && Math.random() < 180 / sampleRate) {
                    this.rainDrop = 0.12 + Math.random() * 0.18;
                  }
                  this.rainDrop *= 0.965 + Math.random() * 0.01;
                  output[i] = (white - this.rainLow) * 0.055 + this.rainLow * 0.32 + (Math.random() * 2 - 1) * this.rainDrop;
                } else if (this.noiseType === "brown") {
                  this.brownLast = (this.brownLast + 0.02 * white) / 1.02;
                  output[i] = this.brownLast * 2.4;
                } else {
                  output[i] = white * 0.22;
                }
              }
              return true;
            }
          }

          registerProcessor("noise-generator", NoiseGeneratorProcessor);
        `;
        const workletUrl = URL.createObjectURL(new Blob([workletCode], { type: "application/javascript" }));
        workletModuleReady = audioContext.audioWorklet.addModule(workletUrl).finally(() => {
          URL.revokeObjectURL(workletUrl);
        });
      }
      await workletModuleReady;
      return true;
    }

    function connectScriptProcessorSource() {
      processor = audioContext.createScriptProcessor(2048, 0, 1);
      processor.onaudioprocess = (event) => {
        const output = event.outputBuffer.getChannelData(0);
        fillNoise(output);
      };
      processor.connect(gainNode);
    }

    function setupGraphNodes() {
      gainNode = audioContext.createGain();
      gainNode.gain.value = getEffectiveGain();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.82;
      waveform = new Uint8Array(analyser.fftSize);
      spectrum = new Uint8Array(analyser.frequencyBinCount);
    }

    function finishGraphConnection() {
      gainNode.connect(analyser);
      analyser.connect(audioContext.destination);
    }

    function connectSourceSync() {
      setupGraphNodes();
      connectScriptProcessorSource();
      finishGraphConnection();
    }

    async function connectSource() {
      setupGraphNodes();
      try {
        if (!isProbablyIOS() && await loadNoiseWorklet()) {
          processor = new AudioWorkletNode(audioContext, "noise-generator", {
            numberOfInputs: 0,
            numberOfOutputs: 1,
            outputChannelCount: [1]
          });
          processor.port.postMessage({ noiseType });
          processor.connect(gainNode);
        } else {
          connectScriptProcessorSource();
        }
      } catch (error) {
        connectScriptProcessorSource();
      }
      finishGraphConnection();
    }

    function fillNoise(output) {
      for (let i = 0; i < output.length; i += 1) {
        const white = Math.random() * 2 - 1;
        if (noiseType === "pink") {
          pinkB0 = 0.99886 * pinkB0 + white * 0.0555179;
          pinkB1 = 0.99332 * pinkB1 + white * 0.0750759;
          pinkB2 = 0.96900 * pinkB2 + white * 0.1538520;
          pinkB3 = 0.86650 * pinkB3 + white * 0.3104856;
          pinkB4 = 0.55000 * pinkB4 + white * 0.5329522;
          pinkB5 = -0.7616 * pinkB5 - white * 0.0168980;
          output[i] = (pinkB0 + pinkB1 + pinkB2 + pinkB3 + pinkB4 + pinkB5 + pinkB6 + white * 0.5362) * 0.18;
          pinkB6 = white * 0.115926;
        } else if (noiseType === "rain") {
          rainLow = 0.985 * rainLow + 0.015 * white;
          if (rainDrop < 0.0004 && Math.random() < 180 / audioContext.sampleRate) {
            rainDrop = 0.12 + Math.random() * 0.18;
          }
          rainDrop *= 0.965 + Math.random() * 0.01;
          output[i] = (white - rainLow) * 0.055 + rainLow * 0.32 + (Math.random() * 2 - 1) * rainDrop;
        } else if (noiseType === "brown") {
          brownLast = (brownLast + 0.02 * white) / 1.02;
          output[i] = brownLast * 2.4;
        } else {
          output[i] = white * 0.22;
        }
      }
    }

    async function start() {
      if (playing || starting) return;
      const requestId = startRequestId + 1;
      startRequestId = requestId;
      starting = true;
      let startFailed = false;
      statusEl.textContent = "starting";
      try {
        if (isProbablyIOS()) {
          ensureAudioFromGesture();
          if (requestId !== startRequestId || playing) return;
          connectSourceSync();
          if (audioContext.state === "suspended") {
            audioContext.resume().then(updateUi).catch(() => {
              statusEl.textContent = "tap Start again";
            });
          }
          playing = true;
          startTimerIfNeeded();
          updateUi();
          draw();
          return;
        }
        await ensureAudio();
        if (requestId !== startRequestId || playing) return;
        await connectSource();
        if (requestId !== startRequestId) {
          disconnectSource();
          return;
        }
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }
        if (requestId !== startRequestId) {
          disconnectSource();
          return;
        }
        playing = true;
        startTimerIfNeeded();
        updateUi();
        draw();
      } catch (error) {
        startFailed = true;
        statusEl.textContent = "tap Start again";
        disconnectSource();
      } finally {
        starting = false;
        if (playing || !startFailed) updateUi();
      }
    }

    function disconnectSource() {
      playing = false;
      if (processor) {
        processor.disconnect();
        if (processor.onaudioprocess) processor.onaudioprocess = null;
        processor = null;
      }
      if (gainNode) gainNode.disconnect();
      if (analyser) analyser.disconnect();
      gainNode = null;
      analyser = null;
    }

    function stop() {
      if (!playing && !starting) return;
      startRequestId += 1;
      starting = false;
      disconnectSource();
      clearTimer();
      updateUi();
      draw();
    }

    function restartIfPlaying() {
      if (!playing) {
        updateUi();
        draw();
        return;
      }
      stop();
      start();
    }

    function updateUi() {
      const gain = Number(gainSlider.value);
      if (gainNode) gainNode.gain.value = getEffectiveGain();
      gainRead.textContent = `${Math.round(gain * 100)}%`;
      typeRead.textContent = noiseType;
      fadeRead.textContent = fadeMode === "last-minute" ? "on" : "off";
      statusEl.textContent = starting ? "starting" : playing ? "playing" : "stopped";
      waveformToggle.textContent = waveformEnabled ? "Waveform On" : "Waveform Off";
      waveformToggle.setAttribute("aria-pressed", String(waveformEnabled));
      waveformMeter.hidden = !waveformEnabled;
      spectrumToggle.textContent = spectrumEnabled ? "Spectrum On" : "Spectrum Off";
      spectrumToggle.setAttribute("aria-pressed", String(spectrumEnabled));
      spectrumMeter.hidden = !spectrumEnabled;
      deck.classList.toggle("playing", playing);
      updateTimerReadout();
      typeButtons.forEach((button) => {
        button.setAttribute("aria-pressed", String(playing && button.dataset.noise === noiseType));
      });
      fadeToggle.setAttribute("aria-pressed", String(fadeMode === "last-minute"));
    }

    function getTimerMinutes() {
      const value = Math.max(0, Math.min(720, Number(timerMinutes.value) || 0));
      timerMinutes.value = String(value);
      return value;
    }

    function startTimerIfNeeded() {
      clearTimer();
      const minutes = getTimerMinutes();
      if (minutes <= 0) {
        updateTimerReadout();
        return;
      }
      timerEndMs = Date.now() + minutes * 60 * 1000;
      timerStartMs = Date.now();
      timerDurationMs = minutes * 60 * 1000;
      timerIntervalId = window.setInterval(() => {
        if (Date.now() >= timerEndMs) {
          stop();
          return;
        }
        applyTimerGain();
        updateTimerReadout();
      }, 250);
      applyTimerGain();
      updateTimerReadout();
    }

    function clearTimer() {
      if (timerIntervalId) {
        window.clearInterval(timerIntervalId);
        timerIntervalId = 0;
      }
      timerEndMs = 0;
      timerStartMs = 0;
      timerDurationMs = 0;
    }

    function updateTimerReadout() {
      const minutes = Math.max(0, Number(timerMinutes.value) || 0);
      if (!playing || minutes <= 0 || !timerEndMs) {
        timerRead.textContent = minutes > 0 ? `${minutes} min set` : "off";
        return;
      }
      const remainingSec = Math.max(0, Math.ceil((timerEndMs - Date.now()) / 1000));
      const mm = Math.floor(remainingSec / 60);
      const ss = remainingSec % 60;
      timerRead.textContent = `${mm}:${String(ss).padStart(2, "0")}`;
    }

    function getTimerFadeFactor() {
      if (!playing || !timerEndMs || !timerDurationMs || fadeMode === "instant") return 1;
      const now = Date.now();
      if (fadeMode === "last-minute") {
        const remaining = Math.max(0, timerEndMs - now);
        return remaining >= 60000 ? 1 : Math.max(0, remaining / 60000);
      }
      return 1;
    }

    function getEffectiveGain() {
      return Number(gainSlider.value) * getTimerFadeFactor();
    }

    function applyTimerGain() {
      if (gainNode) gainNode.gain.value = getEffectiveGain();
    }

    function drawScope() {
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#101815";
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = "rgba(255, 253, 248, 0.16)";
      ctx.beginPath();
      ctx.moveTo(0, height / 2);
      ctx.lineTo(width, height / 2);
      ctx.stroke();

      if (!playing || !analyser) {
        ctx.fillStyle = "rgba(255, 253, 248, 0.48)";
        ctx.font = "600 18px Segoe UI, sans-serif";
        ctx.fillText("stopped", 24, 42);
        return;
      }

      analyser.getByteTimeDomainData(waveform);
      ctx.strokeStyle = noiseType === "brown" ? "#f0b35a" : noiseType === "rain" ? "#62a6cf" : noiseType === "pink" ? "#ff8aa0" : "#52d3ba";
      ctx.lineWidth = 2;
      ctx.beginPath();
      const step = width / (waveform.length - 1);
      for (let i = 0; i < waveform.length; i += 1) {
        const x = i * step;
        const y = (waveform[i] / 255) * height;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    function drawSpectrum() {
      const ctx = spectrumCanvas.getContext("2d");
      const width = spectrumCanvas.width;
      const height = spectrumCanvas.height;
      const padLeft = 48;
      const padRight = 16;
      const padTop = 18;
      const padBottom = 32;
      const plotWidth = width - padLeft - padRight;
      const plotHeight = height - padTop - padBottom;
      const minFreq = 20;
      const maxFreq = audioContext ? audioContext.sampleRate / 2 : 24000;
      const nyquist = maxFreq;
      const color = noiseType === "brown" ? "#f0b35a" : noiseType === "rain" ? "#62a6cf" : noiseType === "pink" ? "#ff8aa0" : "#52d3ba";

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#101815";
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = "rgba(255, 253, 248, 0.13)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i += 1) {
        const y = padTop + (plotHeight * i) / 4;
        ctx.beginPath();
        ctx.moveTo(padLeft, y);
        ctx.lineTo(width - padRight, y);
        ctx.stroke();
      }

      const ticks = [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000].filter((f) => f <= maxFreq);
      ctx.fillStyle = "rgba(255, 253, 248, 0.62)";
      ctx.font = "600 12px Segoe UI, sans-serif";
      ticks.forEach((freq) => {
        const x = padLeft + (Math.log10(freq / minFreq) / Math.log10(maxFreq / minFreq)) * plotWidth;
        ctx.strokeStyle = "rgba(255, 253, 248, 0.10)";
        ctx.beginPath();
        ctx.moveTo(x, padTop);
        ctx.lineTo(x, height - padBottom);
        ctx.stroke();
        const label = freq >= 1000 ? `${freq / 1000}k` : String(freq);
        ctx.fillText(label, x - 10, height - 10);
      });

      ctx.fillText("-20 dB", 8, padTop + 4);
      ctx.fillText("-80 dB", 8, height - padBottom);

      if (!playing || !analyser) {
        ctx.fillStyle = "rgba(255, 253, 248, 0.48)";
        ctx.font = "600 18px Segoe UI, sans-serif";
        ctx.fillText("stopped", padLeft + 10, padTop + 28);
        return;
      }

      analyser.getByteFrequencyData(spectrum);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      let started = false;
      for (let i = 1; i < spectrum.length; i += 1) {
        const freq = (i / spectrum.length) * nyquist;
        if (freq < minFreq) continue;
        const x = padLeft + (Math.log10(freq / minFreq) / Math.log10(maxFreq / minFreq)) * plotWidth;
        const dbNorm = spectrum[i] / 255;
        const y = padTop + (1 - dbNorm) * plotHeight;
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();
    }

    function draw() {
      cancelAnimationFrame(animationId);
      function frame() {
        if (waveformEnabled) drawScope();
        if (spectrumEnabled) drawSpectrum();
        if (playing) {
          animationId = requestAnimationFrame(frame);
        }
      }
      frame();
    }

    function switchNoise(nextNoise) {
      const now = Date.now();
      if (now - lastToggleMs < 350) return;
      lastToggleMs = now;
      if (playing && nextNoise === noiseType) {
        stop();
        return;
      }
      noiseType = nextNoise;
      if (processor && processor.port) {
        processor.port.postMessage({ noiseType });
      }
      if (playing) {
        updateUi();
        draw();
        return;
      }
      start();
    }

    function bindActivation(button, handler) {
      button.addEventListener("touchend", (event) => {
        event.preventDefault();
        suppressClickUntilMs = Date.now() + 900;
        handler();
      }, { passive: false });

      button.addEventListener("click", (event) => {
        event.preventDefault();
        if (Date.now() < suppressClickUntilMs) return;
        handler();
      });

      button.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        handler();
      });
    }

    bindActivation(spectrumToggle, () => {
      spectrumEnabled = !spectrumEnabled;
      updateUi();
      if (spectrumEnabled) drawSpectrum();
    });

    bindActivation(waveformToggle, () => {
      waveformEnabled = !waveformEnabled;
      updateUi();
      if (waveformEnabled) drawScope();
    });

    typeButtons.forEach((button) => {
      bindActivation(button, () => {
        switchNoise(button.dataset.noise);
      });
    });

    gainSlider.addEventListener("input", updateUi);
    timerMinutes.addEventListener("input", () => {
      getTimerMinutes();
      if (playing) startTimerIfNeeded();
      else updateUi();
    });

    addTen.addEventListener("click", () => {
      const nextMinutes = Math.min(720, getTimerMinutes() + 10);
      timerMinutes.value = String(nextMinutes);
      if (playing && timerEndMs) {
        timerEndMs += 10 * 60 * 1000;
        timerDurationMs += 10 * 60 * 1000;
        applyTimerGain();
        updateTimerReadout();
        return;
      }
      if (playing) startTimerIfNeeded();
      updateUi();
    });

    presetButtons.forEach((button) => {
      button.addEventListener("click", () => {
        timerMinutes.value = button.dataset.minutes;
        if (playing) startTimerIfNeeded();
        updateUi();
      });
    });

    bindActivation(fadeToggle, () => {
      fadeMode = fadeMode === "last-minute" ? "instant" : "last-minute";
      applyTimerGain();
      updateUi();
    });

    updateUi();
  </script>
</body>
</html>
