  <style>
    :root {
      --bg-0: #070F1A;
      --bg-1: #070F1A;

      --panel-2: #102947;
      --text: #eaf1ff;
      --accent: #86c8ff;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: "Noto Sans JP", system-ui, sans-serif;
      color: rgba(234, 241, 255, 0.3);
      background: #000;
      user-select: none;
      -webkit-user-select: none;
    }

    #heroFx {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 0;
      pointer-events: none;
      filter: saturate(1.1);
    }

    .wall-clock {
      position: fixed;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      z-index: 2;
      color: rgba(255, 255, 255, 0.92);
      font-size: clamp(72px, 18vw, 170px);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      pointer-events: none;
      text-align: center;
    }

    .wall-clock-time {
      display: block;
      line-height: 1;
    }

    .wall-clock-date {
      display: block;
      margin-top: 0.18em;
      font-size: clamp(16px, 2.2vw, 30px);
      font-weight: 500;
      letter-spacing: 0.04em;
      opacity: 0.92;
    }

    .wall-clock-date.hidden {
      display: none;
    }

    .wall-clock.hidden {
      display: none;
    }

    .bookmark-bar {
      position: fixed;
      top: 10px;
      left: 12px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 6px 8px;
      border: 1px solid rgba(134, 200, 255, 0.28);
      border-radius: 10px;
      background: rgba(8, 21, 42, 0.36);
      backdrop-filter: blur(2px);
    }

    .bookmark-bar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      min-width: 70px;
      padding: 0 10px;
      border: 1px solid rgba(63, 112, 166, 0.45);
      border-radius: 8px;
      color: rgba(234, 241, 255, 0.9);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      background: rgba(9, 26, 48, 0.42);
    }

    .bookmark-bar a sub {
      display: inline-block;
      font-size: 0.68em;
      line-height: 1;
      vertical-align: baseline;
      transform: translateY(0.22em);
      margin-left: 0.02em;
    }

    .bookmark-bar a:hover {
      border-color: var(--accent);
      color: #fff;
    }

    .tool-btn {
      position: fixed;
      z-index: 3;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(42, 70, 103, 0.38);
      border-radius: 9px;
      background: rgba(7, 20, 40, 0.24);
      color: rgba(234, 241, 255, 0.44);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(1px);
    }

    .tool-btn:hover {
      border-color: var(--accent);
      color: #ffffff;
    }

    .bh-arrow-toggle { right: 12px; top: 12px; font-size: 12px; }         /* b */
    .collision-toggle { right: 12px; top: 52px; font-size: 12px; }        /* c */
    .date-toggle { right: 12px; top: 92px; font-size: 12px; }             /* d */
    .fullscreen-toggle { right: 12px; top: 132px; font-size: 14px; }      /* f */
    .particle-gravity-toggle { right: 12px; top: 172px; font-size: 12px; }/* g */
    .flow-toggle { right: 12px; top: 212px; font-size: 12px; }            /* h */
    .info-btn { right: 12px; top: 252px; font-size: 14px; }               /* i */
    .links-toggle { right: 12px; top: 292px; font-size: 13px; }           /* l */
    .mouse-gravity-toggle { right: 12px; top: 332px; font-size: 12px; }   /* m */
    .friction-toggle { right: 12px; top: 372px; font-size: 12px; }        /* n */

    .clock-toggle { right: 12px; top: 452px; font-size: 12px; }           /* t */

    .preset-1 { top: 12px; }
    .preset-2 { top: 52px; }
    .preset-3 { top: 92px; }
    .preset-4 { top: 132px; }
    .preset-5 { top: 172px; }

    .universe-hud {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border: 1px solid rgba(134, 200, 255, 0.35);
      border-radius: 10px;
      background: rgba(8, 21, 42, 0.28);
      color: rgba(234, 241, 255, 0.82);
      font-size: 12px;
      line-height: 1.3;
      backdrop-filter: blur(2px);
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 120ms ease;
    }

    .universe-hud.visible {
      opacity: 1;
      visibility: visible;
    }

    .hud-item {
      opacity: 0.92;
    }

    @media (max-width: 720px) {
      .wall-clock {
        top: 42%;
        font-size: clamp(56px, 22vw, 108px);
      }
      .bookmark-bar {
        top: 8px;
        left: 8px;
        gap: 6px;
        padding: 4px 6px;
      }
      .bookmark-bar a {
        min-height: 24px;
        min-width: 60px;
        padding: 0 8px;
        font-size: 11px;
      }

        top: 8px;
        max-width: calc(100vw - 12px);
        font-size: 11px;
        gap: 7px;
        padding: 5px 8px;
      }

      const canvas = document.getElementById('heroFx');

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function gradientColor(t) {
        const stops = [
          [96, 140, 255],   // O: vivid deep blue
          [160, 190, 255],  // B: saturated blue-white
          [248, 247, 255],  // A: white
          [255, 244, 234],  // F/G: warm white
          [255, 210, 161],  // K: orange
          [255, 167, 82]    // M: red-orange
        ];
        const n = stops.length - 1;
        const x = Math.max(0, Math.min(0.9999, t)) * n;
        const i = Math.floor(x);
        const u = x - i;
        const a = stops[i];
        const b = stops[i + 1];
        const r = Math.round(lerp(a[0], b[0], u));
        const g = Math.round(lerp(a[1], b[1], u));
        const bch = Math.round(lerp(a[2], b[2], u));
        return r + ',' + g + ',' + bch;
      }

      function calcRadius(mass) {
        return PARAM.bhR0 * Math.cbrt(Math.max(0.01, mass));

        return Math.max(
          PARAM.bhCenterHitRadius,
          PARAM.bhCaptureRadiusMin,
          visualRadius * PARAM.bhCaptureRadiusScale

        return Math.pow(Math.max(0.2, r), Math.max(0.1, PARAM.ppMassPower));

        if (collisionCount < PARAM.collapseCollisionThreshold) return false;
        const m = particleMassFromRadius(p.r);
        if (m < PARAM.collapseMassThreshold) return false;
        const radius = calcRadius(m);
        blackHoles.push({
          x: p.x,
          y: p.y,
          vx: p.vx || 0,
          vy: p.vy || 0,
          mass: m,
          R: radius,
          Rabs: calcAbsorbRadius(radius),
          absorbedCount: 0,
          absorbGlow: 0,
          absorbGlowR: 0,
          absorbGlowG: 0,
          absorbGlowB: 0
        });
        emitCollapseRepulse(p.x, p.y);
        return true;
      }

      function emitCollapseRepulse(cx, cy) {
        const r = Math.max(1, PARAM.collapseRepulseRadius);
        const r2 = r * r;
        const wx = w + 40;
        const wy = h + 20;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          if (!p) continue;
          const dx = shortestWrappedDelta(p.x, cx, wx);
          const dy = shortestWrappedDelta(p.y, cy, wy);
          const d2 = dx * dx + dy * dy;
          if (d2 < 1 || d2 > r2) continue;
          const d = Math.sqrt(d2);
          const u = 1 - (d / r);
          const kick = PARAM.collapseRepulseImpulse * u;
          p.vx += (dx / d) * kick;
          p.vy += (dy / d) * kick;
          p.flash = Math.min(PARAM.collisionFlashMax, (p.flash || 0) + 0.22 * u);
        }
      }

      function absorbParticleIntoBlackHole(b, p) {
        const dm = Math.max(0.0001, PARAM.bhMassGainPerAbsorb);
        const mb = Math.max(0.0001, b.mass || 0);
        const vbx = b.vx || 0;
        const vby = b.vy || 0;
        const newM = mb + dm;
        b.vx = (vbx * mb + p.vx * dm) / newM;
        b.vy = (vby * mb + p.vy * dm) / newM;
        b.mass = newM;
        b.absorbedCount = (b.absorbedCount || 0) + 1;
        const starMass = particleMassFromRadius(p.r);
        const rvx = (p.vx || 0) - vbx;
        const rvy = (p.vy || 0) - vby;
        const kineticTerm = starMass * (rvx * rvx + rvy * rvy);
        const glowAdd = kineticTerm * PARAM.bhAbsorbGlowEnergyScale;
        b.absorbGlow = (b.absorbGlow || 0) + glowAdd;
        b.absorbGlowR = (b.absorbGlowR || 0) + (p.cr || 255) * glowAdd;
        b.absorbGlowG = (b.absorbGlowG || 0) + (p.cg || 255) * glowAdd;
        b.absorbGlowB = (b.absorbGlowB || 0) + (p.cb || 255) * glowAdd;
      }

      function removeParticleAt(index) {
        const last = particles.length - 1;
        if (index < 0 || index > last) return;
        if (index !== last) particles[index] = particles[last];
        particles.pop();
      }

      function markSinglePinkStar() {
        if (particles.length === 0) return;
        for (let i = 0; i < particles.length; i += 1) {
          particles[i].isEarth = false;
        }
        const p = particles[0];
        setParticleColor(p, '120,255,170');
        p.r = Math.max(p.r, 1.8);
        p.life = 1;
        p.isEarth = true;
      }

      function randomVelReturn() {
        const lo = Math.min(PARAM.bbFrictionMin, PARAM.bbFrictionMax);
        const hi = Math.max(PARAM.bbFrictionMin, PARAM.bbFrictionMax);
        return lo + Math.random() * (hi - lo);
      }

      function randomInRange(minV, maxV) {
        const lo = Math.min(minV, maxV);
        const hi = Math.max(minV, maxV);
        return lo + Math.random() * (hi - lo);
      }

      function randomParticleRadius() {
        return randomInRange(PARAM.particleRadiusMin, PARAM.particleRadiusMax);
      }

      function randomInitialHeat() {
        if (Math.random() >= PARAM.initialHotStarChance) return 0;
        return randomInRange(PARAM.initialHotStarHeatMin, PARAM.initialHotStarHeatMax);
      }

      function setParticleColor(p, csv) {
        p.color = csv;
        const s = String(csv || '255,255,255').split(',');
        p.cr = Number(s[0]) || 255;
        p.cg = Number(s[1]) || 255;
        p.cb = Number(s[2]) || 255;
      }

      function particleColorFromRadius(r) {
        if (!PARAM.useRadiusBasedColor) return gradientColor(Math.random());
        const span = Math.max(0.0001, PARAM.particleRadiusMax - PARAM.particleRadiusMin);
        const t = clamp((r - PARAM.particleRadiusMin) / span, 0, 1);
        // Suppress warm/orange population to about one-third while keeping blue spread.
        const warmCut = 0.78;
        const tBlueBoost = t < 0.74 ? t * 0.72 : t;
        const tWarmSuppressed = tBlueBoost < warmCut
          ? tBlueBoost
          : warmCut + (tBlueBoost - warmCut) * 0.11;
        let tone = clamp(0.0 + tWarmSuppressed * 0.82, 0, 1);
        if (Math.random() < PARAM.vividBlueChance) {
          tone *= PARAM.vividBlueToneScale;
        } else if (Math.random() < PARAM.vividRedChance) {
          const redMin = clamp(PARAM.vividRedToneMin, 0, 0.999);
          tone = redMin + Math.random() * (1 - redMin);
        }
        return gradientColor(tone);
      }

      function applyGravityScale(scale) {
        const s = clamp(scale, PARAM.bbGravityScaleMin, PARAM.bbGravityScaleMax);
        const sign = s >= 0 ? 1 : -1;
        const absS = Math.abs(s);
        const over = Math.max(0, absS - 1);
        const strongMag = absS <= 1
          ? absS
          : 1 + Math.pow(over, PARAM.bbGravityCurvePower) * PARAM.bbGravityAmplify;
        const strongScale = strongMag * sign;
        const absMax = Math.max(1, Math.abs(PARAM.bbGravityScaleMin), Math.abs(PARAM.bbGravityScaleMax));
        const strongT = clamp((absS - 1) / Math.max(0.0001, absMax - 1), 0, 1);
        const softeningFactor = lerp(1, PARAM.bbSofteningMinFactor, strongT);
        currentGravityScale = strongScale;
        currentAttractStrength = PARAM.attractStrength * bbMousePullScale * strongScale;
        currentBhGlobalPull = randomInRange(PARAM.bhGlobalPullMin, PARAM.bhGlobalPullMax) * bbBhPullScale * strongScale;
        currentBhPullMax = PARAM.bhPullMax * bbBhPullScale * (1 + over * PARAM.bbPullMaxAmplify);
        currentBhPullPerAbsorb = randomInRange(PARAM.bhPullPerAbsorbMin, PARAM.bhPullPerAbsorbMax) * strongScale;
        currentPpGravityStrength = PARAM.ppGravityStrength * (strongScale / Math.max(1e-9, PARAM.initialGravityScale));
        currentBhGlobalSoftening *= softeningFactor;
      }

      function particleBrightnessEnergy(p) {
        const v2 = (p.vx * p.vx) + (p.vy * p.vy);
        if (v2 <= 0) return 0;
        // Use a sub-quadratic speed metric to avoid BB spikes over-brightening the background.
        return Math.pow(v2, Math.max(0.01, PARAM.bgSpeedPower * 0.5));
      }

      function computeParticleEnergy() {
        let total = 0;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          total += particleBrightnessEnergy(p);
        }
        return total;
      }

      function backgroundLumaFromEnergy(totalEnergy) {
        if (particles.length === 0 || totalEnergy <= 0) return PARAM.bgLumaMin;
        const scaled = 1 - Math.exp(-totalEnergy * PARAM.bgEnergyGain);
        const boosted = Math.pow(clamp(scaled, 0, 1), PARAM.bgResponseGamma);
        const baseLuma = PARAM.bgLumaMin + (PARAM.bgLumaMax - PARAM.bgLumaMin) * boosted;
        const flashT = clamp((bbWhiteBoost - 1) / Math.max(0.0001, PARAM.bbWhiteBoostStart - 1), 0, 1);
        const flash = Math.pow(flashT, 0.35) * PARAM.bbWhiteFlashMax;
        const luma = baseLuma + flash;
        return Math.round(clamp(luma, PARAM.bgLumaMin, 255));
      }

      function backgroundColorFromEnergy(totalEnergy, time) {
        const luma = backgroundLumaFromEnergy(totalEnergy);
        if (!PARAM.useCmbBackground) {
          return 'rgb(' + luma + ',' + luma + ',' + luma + ')';
        }

        // Very subtle red/blue temperature-like fluctuations over a dark microwave background.
        const fluct = (Math.sin(time * 0.63) + Math.sin(time * 0.27 + 1.7)) * 0.5;
        const d = fluct * PARAM.cmbAnisoAmplitude;
        const r = clamp(Math.round(PARAM.cmbBaseR + luma * 0.92 + d), 0, 255);
        const g = clamp(Math.round(PARAM.cmbBaseG + luma * 0.97), 0, 255);
        const b = clamp(Math.round(PARAM.cmbBaseB + luma * 1.08 - d), 0, 255);
        return 'rgb(' + r + ',' + g + ',' + b + ')';
      }

        }
        if (!enabled && (currentFlowX !== 0 || currentFlowY !== 0)) {
          for (let i = 0; i < particles.length; i += 1) {

            p.baseVy -= currentFlowY;

      function neutralizeGlobalDriftWhenFlowOff() {
        if (flowModeEnabled || particles.length === 0) return;
        const n = particles.length;
        const periodX = w + 40;
        const periodY = h + 20;
        let sumVx = 0;
        let sumVy = 0;
        let sumX = 0;
        let sumY = 0;
        for (let i = 0; i < n; i += 1) {
          const p = particles[i];
          // Use wrapped [0, period) coordinates to avoid edge discontinuity artifacts.
          const wx = (((p.x + 20) % periodX) + periodX) % periodX;
          const wy = (((p.y + 10) % periodY) + periodY) % periodY;
          sumX += wx;
          sumY += wy;
          sumVx += p.vx || 0;
          sumVy += p.vy || 0;
        }
        const meanX = sumX / n;
        const meanY = sumY / n;
        const meanVx = sumVx / n;
        const meanVy = sumVy / n;

        let covXX = 0;
        let covYY = 0;
        let covXY = 0;
        let covXVx = 0;
        let covYVx = 0;
        let covXVy = 0;
        let covYVy = 0;
        for (let i = 0; i < n; i += 1) {
          const p = particles[i];
          const wx = (((p.x + 20) % periodX) + periodX) % periodX;
          const wy = (((p.y + 10) % periodY) + periodY) % periodY;
          const x = shortestWrappedDelta(wx, meanX, periodX);
          const y = shortestWrappedDelta(wy, meanY, periodY);
          const vx = (p.vx || 0) - meanVx;
          const vy = (p.vy || 0) - meanVy;
          covXX += x * x;
          covYY += y * y;
          covXY += x * y;
          covXVx += x * vx;
          covYVx += y * vx;
          covXVy += x * vy;
          covYVy += y * vy;
        }
        const invN = 1 / Math.max(1, n);
        covXX *= invN;
        covYY *= invN;
        covXY *= invN;
        covXVx *= invN;
        covYVx *= invN;
        covXVy *= invN;
        covYVy *= invN;

        const det = covXX * covYY - covXY * covXY;
        let ax = 0;
        let ay = 0;
        let bx = 0;
        let by = 0;
        if (Math.abs(det) > 1e-9) {
          const inv00 = covYY / det;
          const inv01 = -covXY / det;
          const inv10 = -covXY / det;
          const inv11 = covXX / det;
          ax = inv00 * covXVx + inv01 * covYVx;
          ay = inv10 * covXVx + inv11 * covYVx;
          bx = inv00 * covXVy + inv01 * covYVy;
          by = inv10 * covXVy + inv11 * covYVy;
        }

        // Keep correction gentle to avoid edge sticking under strong local fields.
        const corrGain = 0.35;
        for (let i = 0; i < n; i += 1) {
          const p = particles[i];
          const wx = (((p.x + 20) % periodX) + periodX) % periodX;
          const wy = (((p.y + 10) % periodY) + periodY) % periodY;
          const x = shortestWrappedDelta(wx, meanX, periodX);
          const y = shortestWrappedDelta(wy, meanY, periodY);
          p.vx -= corrGain * (meanVx + ax * x + ay * y);
          p.vy -= corrGain * (meanVy + bx * x + by * y);
        }
      }

      function drawCleanHint(nowMs) {
        if (nowMs >= cleanHintUntilMs) return;
        const total = Math.max(1, PARAM.cleanHintShowMs);
        const fadeIn = clamp(PARAM.cleanHintFadeInMs, 0, total);
        const fadeOut = Math.max(700, Math.min(1600, total - fadeIn));
        const elapsed = clamp(nowMs - cleanHintStartMs, 0, total);
        const remain = total - elapsed;
        let alpha = 1;
        if (fadeIn > 0 && elapsed < fadeIn) {
          alpha = elapsed / fadeIn;
        } else if (remain < fadeOut) {
          alpha = remain / fadeOut;
        }
        alpha = clamp(alpha, 0, 1);
        const msg = PARAM.cleanHintText;
        const fontSize = Math.max(16, Math.round(Math.min(w, h) * 0.045));
        ctx.save();
        ctx.font = '700 ' + fontSize + 'px "Noto Sans JP", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(255,255,255,' + (0.85 * alpha).toFixed(3) + ')';
        ctx.fillText(msg, w * 0.5, h * 0.5);
        ctx.restore();
      }

      function triggerBigBang(cx, cy, source) {
        const src = source || 'unknown';
        bigBangCount += 1;
        if (typeof gtag === 'function') {
          gtag('event', 'big_bang', {
            event_category: 'simulation',
            source: src,
            particles_before: particles.length,
            black_holes_before: blackHoles.length
          });
        }

        blackHoles.length = 0;
        bhSpawnCooldown = PARAM.spawnCooldownFrames;
        bhCreationLockFrames = PARAM.bbNoBhLockFrames;
        particles.length = 0;
        bbWhiteBoost = Math.max(bbWhiteBoost, PARAM.bbWhiteBoostStart);
        bbMousePullScale = 1;
        bbBhPullScale = 1;
        currentVelReturn = randomVelReturn();
        currentPpLinearDamping = randomVelReturn();
        currentBhGlobalSoftening = randomInRange(PARAM.bhGlobalSofteningMin, PARAM.bhGlobalSofteningMax);
        applyGravityScale(randomInRange(PARAM.bbGravityScaleMin, PARAM.bbGravityScaleMax));
        currentBigBangMaxSpeed = randomInRange(PARAM.bigBangMaxSpeedMin, PARAM.bigBangMaxSpeedMax);
        currentMaxSpeed = randomInRange(PARAM.maxSpeedMin, PARAM.maxSpeedMax);
        const flowS = flowModeEnabled
          ? randomInRange(PARAM.bigBangFlowSpeedMin, PARAM.bigBangFlowSpeedMax)
          : 0;
        currentFlowX = (Math.random() > 0.5 ? 1 : -1) * flowS;
        currentFlowY = (Math.random() * 0.24 - 0.12) * Math.min(1, flowS * 4);

        const maxR = Math.sqrt((w * w) + (h * h)) * 0.7;
        for (let i = 0; i < currentParticleTarget; i += 1) {
          const ang = Math.random() * Math.PI * 2;
          const rr = Math.pow(Math.random(), 0.72) * maxR;
          const nx = Math.cos(ang);
          const ny = Math.sin(ang);
          const rNorm = Math.min(1, rr / maxR);
          const u = 1 - rNorm;
          const a = Math.max(0.0001, PARAM.bigBangSpeedCurveA);
          const curve = (1 - Math.exp(-a * u)) / (1 - Math.exp(-a));
          const speed = PARAM.bigBangMinSpeed + curve * (currentBigBangMaxSpeed - PARAM.bigBangMinSpeed);
          const vx = nx * speed;
          const vy = ny * speed;
          const baseVx = (Math.random() * 0.55 + 0.18) * (Math.random() > 0.5 ? 1 : -1);
          const baseVy = (Math.random() * 0.24 - 0.12);
          const px = clamp(cx, 0, w);
          const py = clamp(cy, 0, h);
          const r = randomParticleRadius();
          const c = particleColorFromRadius(r);
          const heat0 = randomInitialHeat();
          const p = {
            x: px,
            y: py,
            vx: baseVx + currentFlowX,
            vy: baseVy + currentFlowY,
            baseVx: baseVx + currentFlowX,
            baseVy: baseVy + currentFlowY,
            launchVxTarget: vx,
            launchVyTarget: vy,
            launchTime: 0,
            r,
            collisionCount: 0,
            flash: 0,
            heat: heat0,
            life: Math.random() * 0.7 + 0.3,
            color: c,
            cr: 255,
            cg: 255,
            cb: 255
          };
          setParticleColor(p, c);
          particles.push(p);
        }
        markSinglePinkStar();
      }

      function isEarthAlive() {

          const p = particles[i];

      function maybeTriggerBigBang() {
        if (particles.length !== 0) return;
        if (!bhEnabled || blackHoles.length === 0) return;

        let cx = blackHoles[0].x;
        let cy = blackHoles[0].y;
        if (blackHoles.length > 1) {
          let msum = 0;
          let sx = 0;
          let sy = 0;
          for (let i = 0; i < blackHoles.length; i += 1) {
            const b = blackHoles[i];
            const m = Math.max(0.0001, b.mass || 0);
            msum += m;
            sx += b.x * m;
            sy += b.y * m;
          }
          cx = sx / msum;
          cy = sy / msum;
        }
        triggerBigBang(cx, cy, 'auto');
      }

      function gridKey(cx, cy) {
        return cx + ',' + cy;
      }

      function ppGridIndex(cx, cy) {
        return cy * ppGridCols + cx;
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function shortestWrappedDelta(a, b, period) {
        let d = a - b;
        if (d > period * 0.5) d -= period;
        if (d < -period * 0.5) d += period;
        return d;
      }

      function torusRelativePoint(x, y, cx, cy, periodX, periodY) {
        return {
          x: cx + shortestWrappedDelta(x, cx, periodX),
          y: cy + shortestWrappedDelta(y, cy, periodY)
        };
      }

      function segmentIntersectsCircle(x0, y0, x1, y1, cx, cy, r2) {
        const dx = x1 - x0;
        const dy = y1 - y0;
        const fx = x0 - cx;
        const fy = y0 - cy;
        const a = dx * dx + dy * dy;
        if (a <= 1e-9) return (fx * fx + fy * fy) <= r2;
        let t = -((fx * dx) + (fy * dy)) / a;
        if (t < 0) t = 0;
        if (t > 1) t = 1;
        const px = x0 + dx * t;
        const py = y0 + dy * t;
        const qx = px - cx;
        const qy = py - cy;
        return (qx * qx + qy * qy) <= r2;
      }

      function pointToSegmentDistanceSq(px, py, x0, y0, x1, y1) {
        const dx = x1 - x0;
        const dy = y1 - y0;
        const len2 = dx * dx + dy * dy;
        if (len2 <= 1e-9) {
          const ex = px - x0;
          const ey = py - y0;
          return ex * ex + ey * ey;
        }
        let t = ((px - x0) * dx + (py - y0) * dy) / len2;
        if (t < 0) t = 0;
        if (t > 1) t = 1;
        const qx = x0 + t * dx;
        const qy = y0 + t * dy;
        const ex = px - qx;
        const ey = py - qy;
        return ex * ex + ey * ey;
      }

      function getBhArrowGeometry(b) {
        const arrowLen = Math.max(18, b.R * 2.4);
        const head = Math.max(5, b.R * 0.5);
        const tipY = b.y + b.R + 4;
        const baseY = tipY + arrowLen;
        return { arrowLen, head, tipY, baseY };
      }

      function drawUpArrow(x, y, r, color) {
        const arrowLen = Math.max(18, r * 2.4);
        const head = Math.max(5, r * 0.5);
        const tipY = y + r + 4;
        const baseY = tipY + arrowLen;
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(x, baseY);
        ctx.lineTo(x, tipY);
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x, tipY - 1);
        ctx.lineTo(x - head, tipY + head * 0.9);
        ctx.lineTo(x + head, tipY + head * 0.9);
        ctx.closePath();
        ctx.fill();
      }

      function pickBlackHole(x, y) {
        if (!bhEnabled || blackHoles.length === 0) return null;
        for (let i = blackHoles.length - 1; i >= 0; i -= 1) {
          const b = blackHoles[i];
          const dx = x - b.x;
          const dy = y - b.y;
          const r = b.R * 1.35;
          if (dx * dx + dy * dy <= r * r) return b;

          if (bhArrowEnabled) {
            const g = getBhArrowGeometry(b);
            const shaftPickR = Math.max(8, b.R * 0.55);
            const shaftD2 = pointToSegmentDistanceSq(x, y, b.x, g.baseY, b.x, g.tipY);
            const nearShaft = shaftD2 <= shaftPickR * shaftPickR;
            const hx = x - b.x;
            const hy = y - g.tipY;
            const nearHead =
              (hx * hx + hy * hy) <= Math.pow(g.head * 2.2, 2) &&
              y >= (g.tipY - g.head * 1.2) &&
              y <= (g.tipY + g.head * 2.2);
            if (nearShaft || nearHead) return b;
          }
        }
        return null;
      }

      function buildSpatialGrid() {
        grid.clear();
        const s = PARAM.cellSize;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const cx = Math.floor(p.x / s);
          const cy = Math.floor(p.y / s);
          const k = gridKey(cx, cy);
          let arr = grid.get(k);
          if (!arr) {
            arr = [];
            grid.set(k, arr);
          }
          arr.push(i);
        }
      }

      function buildParticleGravityGrid(periodX, periodY) {
        const s = PARAM.ppGravityCellSize;
        ppGridCols = Math.max(1, Math.ceil(periodX / s));
        ppGridRows = Math.max(1, Math.ceil(periodY / s));
        ppGrid = new Array(ppGridCols * ppGridRows);
        if (PARAM.ppGridPhaseJitter) {
          ppGridOffsetX = Math.random() * s;
          ppGridOffsetY = Math.random() * s;
        } else {
          ppGridOffsetX = 0;
          ppGridOffsetY = 0;
        }
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const px = (((p.x + ppGridOffsetX) % periodX) + periodX) % periodX;
          const py = (((p.y + ppGridOffsetY) % periodY) + periodY) % periodY;
          const cx = Math.floor(px / s);
          const cy = Math.floor(py / s);
          const idx = ppGridIndex(cx, cy);
          let arr = ppGrid[idx];
          if (!arr) {
            arr = [];
            ppGrid[idx] = arr;
          }
          arr.push(i);
        }
      }

      function applyParticleGravitySymmetric(wrapW, wrapH, gravityEnabled, collisionEnabled) {
        const n = particles.length;
        if (n <= 1) return false;
        const s = PARAM.ppGravityCellSize;
        const r2max = PARAM.ppGravityRange * PARAM.ppGravityRange;
        const soften2 = PARAM.ppGravitySoftening * PARAM.ppGravitySoftening;
        const halfW = wrapW * 0.5;
        const halfH = wrapH * 0.5;
        const maxInteractions = Math.max(1, Math.floor(PARAM.ppGravityMaxInteractions));
        const interactionCounts = new Uint16Array(n);
        const massPower = Math.max(0.1, PARAM.ppMassPower);
        const inertiaPower = Math.max(0, PARAM.ppInertiaPower);
        const gravityOn = !!gravityEnabled;
        const massArr = new Float32Array(n);
        const invInertiaArr = new Float32Array(n);
        const collisionsOn = !!collisionEnabled;
        const removed = collisionsOn ? new Uint8Array(n) : null;
        const maxMerges = collisionsOn ? Math.max(1, Math.floor(PARAM.collisionMaxMergesPerFrame)) : 0;
        const collisionFactor = collisionsOn ? Math.max(0.05, PARAM.collisionDistanceFactor) : 0;
        let merges = 0;
        let maxParticleR = 0;
        for (let i = 0; i < n; i += 1) {
          const p = particles[i];
          if (p && p.r > maxParticleR) maxParticleR = p.r;
          const m = Math.pow(Math.max(0.2, p ? p.r : 0.2), massPower);
          massArr[i] = m;
          invInertiaArr[i] = 1 / Math.pow(m, inertiaPower);
        }
        const gravityCellRadius = Math.max(1, Math.ceil(PARAM.ppGravityRange / s));
        const collisionRangeMax = Math.max(0.0001, maxParticleR * collisionFactor);
        const collisionCellRadius = Math.max(1, Math.ceil(collisionRangeMax / s));
        const cellRadius = gravityOn ? gravityCellRadius : collisionCellRadius;
        const neighborCellOffsets = [];
        for (let oy = -cellRadius; oy <= cellRadius; oy += 1) {
          for (let ox = -cellRadius; ox <= cellRadius; ox += 1) {
            neighborCellOffsets.push([ox, oy]);
          }
        }
        for (let i = neighborCellOffsets.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const tmp = neighborCellOffsets[i];
          neighborCellOffsets[i] = neighborCellOffsets[j];
          neighborCellOffsets[j] = tmp;
        }

        function applyPair(i, j) {
          if (i === j) return;
          if (removed && (removed[i] || removed[j])) return;
          if (interactionCounts[i] >= maxInteractions || interactionCounts[j] >= maxInteractions) return;
          const pi = particles[i];
          const pj = particles[j];
          if (!pi || !pj) return;
          let dx = pj.x - pi.x;
          if (dx > halfW) dx -= wrapW;
          if (dx < -halfW) dx += wrapW;
          let dy = pj.y - pi.y;
          if (dy > halfH) dy -= wrapH;
          if (dy < -halfH) dy += wrapH;
          const d2 = dx * dx + dy * dy;
          if (d2 < 1) return;

          if (collisionsOn && merges < maxMerges) {
            const rr = (pi.r + pj.r) * 0.5 * collisionFactor;
            if (d2 <= rr * rr) {
              const mi0 = massArr[i];
              const mj0 = massArr[j];
                const m = mi0 + mj0;
                const wj = mj0 / Math.max(1e-9, m);
                const ci = pi.collisionCount || 0;
                const cj = pj.collisionCount || 0;
                pi.x += dx * wj;
                pi.y += dy * wj;
                pi.vx = (pi.vx * mi0 + pj.vx * mj0) / Math.max(1e-9, m);
                pi.vy = (pi.vy * mi0 + pj.vy * mj0) / Math.max(1e-9, m);
                pi.r = Math.pow(Math.max(0.2, m), 1 / massPower);
                setParticleColor(pi, particleColorFromRadius(pi.r));
                pi.collisionCount = ci + cj + 1;
                if (pi.life < pj.life) pi.life = pj.life;
                pi.flash = Math.min(
                  PARAM.collisionFlashMax,
                  Math.max(pi.flash || 0, pj.flash || 0) + PARAM.collisionFlashGain
                );
                pi.heat = Math.min(1, Math.max(pi.heat || 0, pj.heat || 0) + PARAM.collisionHeatGain);
                removed[j] = 1;
                massArr[i] = m;
                invInertiaArr[i] = 1 / Math.pow(m, inertiaPower);
              merges += 1;
              interactionCounts[i] += 1;
              if (!PARAM.collapseRequireCollisionMode || collisionModeEnabled) {
                if (tryCollapseParticleToBlackHole(pi)) {
                  removed[i] = 1;
                }
              }
              return;
            }
          }

          if (!gravityOn || d2 > r2max) return;
          const mi = massArr[i];
          const mj = massArr[j];
          // Softened Newtonian gravity: a ~ r_vec / (r^2 + eps^2)^(3/2).
          const invR = 1 / Math.sqrt(d2 + soften2);
          const invR3 = invR * invR * invR;
          const ax = currentPpGravityStrength * dx * invR3;
          const ay = currentPpGravityStrength * dy * invR3;
          const invInertiaI = invInertiaArr[i];
          const invInertiaJ = invInertiaArr[j];
          // Equal and opposite pair update (momentum-conserving).
          pi.vx += ax * mj * invInertiaI;
          pi.vy += ay * mj * invInertiaI;
          pj.vx -= ax * mi * invInertiaJ;
          pj.vy -= ay * mi * invInertiaJ;
          interactionCounts[i] += 1;
          interactionCounts[j] += 1;
        }

        // Self-centered grid query with randomized iteration order to reduce directional bias.
        const startIndex = Math.floor(Math.random() * n);
        for (let ii = 0; ii < n; ii += 1) {
          const i = (startIndex + ii) % n;
          if (removed && removed[i]) continue;
          if (interactionCounts[i] >= maxInteractions) continue;
          const pi = particles[i];
          if (!pi) continue;
          const px = (((pi.x + ppGridOffsetX) % wrapW) + wrapW) % wrapW;
          const py = (((pi.y + ppGridOffsetY) % wrapH) + wrapH) % wrapH;
          const cx = Math.floor(px / s);
          const cy = Math.floor(py / s);

          for (let o = 0; o < neighborCellOffsets.length; o += 1) {
            if (interactionCounts[i] >= maxInteractions) break;
            const ox = neighborCellOffsets[o][0];
            const oy = neighborCellOffsets[o][1];
            const ncx = (cx + ox + ppGridCols) % ppGridCols;
            const ncy = (cy + oy + ppGridRows) % ppGridRows;
            const arr = ppGrid[ppGridIndex(ncx, ncy)];
            if (!arr || arr.length === 0) continue;
            for (let k = 0; k < arr.length; k += 1) {
              if (removed && removed[i]) break;
              if (interactionCounts[i] >= maxInteractions) break;
              const j = arr[k];
              if (j <= i) continue;
              applyPair(i, j);
            }
          }
        }

        if (!removed || merges === 0) return false;
        let write = 0;
        for (let i = 0; i < particles.length; i += 1) {
          if (!removed[i]) {
            particles[write] = particles[i];
            write += 1;
          }
        }
        particles.length = write;
        return true;
      }

      function proximityBrightnessOffset(i, p, wrapW, wrapH) {
        if (!collisionModeEnabled) return 0;
        const s = PARAM.ppGravityCellSize;
        const searchRange = Math.max(
          0.0001,
          ((p.r + Math.max(p.r, PARAM.particleRadiusMax)) * 0.5 * Math.max(0.05, PARAM.collisionDistanceFactor)) * 2.2
        );
        const cellRadius = Math.max(1, Math.ceil(searchRange / s));
        const px = (((p.x + ppGridOffsetX) % wrapW) + wrapW) % wrapW;
        const py = (((p.y + ppGridOffsetY) % wrapH) + wrapH) % wrapH;
        const cx = Math.floor(px / s);
        const cy = Math.floor(py / s);

        let bestRatio = Number.POSITIVE_INFINITY;
        let seen = 0;
        const seenCap = Math.max(4, Math.floor(PARAM.proximityNeighborCap));

        for (let oy = -cellRadius; oy <= cellRadius; oy += 1) {
          for (let ox = -cellRadius; ox <= cellRadius; ox += 1) {
            const ncx = (cx + ox + ppGridCols) % ppGridCols;
            const ncy = (cy + oy + ppGridRows) % ppGridRows;
            const arr = ppGrid[ppGridIndex(ncx, ncy)];
            if (!arr || arr.length === 0) continue;
            for (let k = 0; k < arr.length; k += 1) {
              const j = arr[k];
              if (j === i) continue;
              const q = particles[j];
              if (!q) continue;
              let dx = q.x - p.x;
              if (dx > wrapW * 0.5) dx -= wrapW;
              if (dx < -wrapW * 0.5) dx += wrapW;
              let dy = q.y - p.y;
              if (dy > wrapH * 0.5) dy -= wrapH;
              if (dy < -wrapH * 0.5) dy += wrapH;
              const d = Math.sqrt(dx * dx + dy * dy);
              const rr = ((p.r + q.r) * 0.5) * Math.max(0.05, PARAM.collisionDistanceFactor);
              if (rr > 0) {
                const ratio = d / rr;
                if (ratio < bestRatio) bestRatio = ratio;
              }
              seen += 1;
              if (bestRatio <= 0.05 || seen >= seenCap) break;
            }
            if (bestRatio <= 0.05 || seen >= seenCap) break;
          }
          if (bestRatio <= 0.05 || seen >= seenCap) break;
        }

        if (!Number.isFinite(bestRatio) || bestRatio >= 1) return 0;
        // Twinkle uses the same threshold parameter as collision (collisionDistanceFactor).
        const curve = Math.max(1, PARAM.proximityBrightnessCurve);
        const t = clamp(1 - bestRatio, 0, 1);
        const base = PARAM.proximityBrightnessMaxOffset * Math.pow(t, curve);
        const ultraCurve = Math.max(0.2, PARAM.proximityUltraCurve);
        const ultra = PARAM.proximityUltraBoost * Math.exp(-Math.pow(bestRatio, ultraCurve));
        return base + ultra;
      }

      function localDensityAt(x, y) {
        const s = PARAM.cellSize;
        const cx = Math.floor(x / s);
        const cy = Math.floor(y / s);
        let count = 0;
        for (let n = 0; n < neighborOffsets.length; n += 1) {
          const o = neighborOffsets[n];
          const arr = grid.get(gridKey(cx + o[0], cy + o[1]));
          if (!arr) continue;
          for (let j = 0; j < arr.length; j += 1) {
            const p = particles[arr[j]];
            const dx = p.x - x;
            const dy = p.y - y;
            if (dx * dx + dy * dy <= rRho2) count += 1;
          }
        }
        return count;
      }

      function trySpawnBlackHole() {
        if (!bhEnabled || blackHoles.length >= PARAM.maxBlackHoles || bhSpawnCooldown > 0 || bhCreationLockFrames > 0) return;

        let bestCell = null;
        let bestCount = PARAM.spawnCellMinCount - 1;
        for (const entry of grid.entries()) {
          const indices = entry[1];
          if (indices.length > bestCount) {
            bestCount = indices.length;
            bestCell = indices;
          }
        }
        if (!bestCell) return;

        const sampleStep = Math.max(1, Math.floor(bestCell.length / PARAM.spawnSampleMax));
        let spawnX = 0;
        let spawnY = 0;
        let bestRho = 0;
        for (let i = 0; i < bestCell.length; i += sampleStep) {
          const p = particles[bestCell[i]];
          const rho = localDensityAt(p.x, p.y);
          if (rho > bestRho) {
            bestRho = rho;
            spawnX = p.x;
            spawnY = p.y;
          }
        }
        if (bestRho < PARAM.rhoThreshold) return;

        const minD2 = PARAM.spawnMinDistance * PARAM.spawnMinDistance;
        for (let i = 0; i < blackHoles.length; i += 1) {
          const b = blackHoles[i];
          const dx = b.x - spawnX;
          const dy = b.y - spawnY;
          if (dx * dx + dy * dy < minD2) return;
        }

        const mass = PARAM.spawnMassBase + (bestRho - PARAM.rhoThreshold) * PARAM.spawnMassPerRho;
        const radius = calcRadius(mass);
        blackHoles.push({
          x: spawnX,
          y: spawnY,
          vx: 0,
          vy: 0,
          mass,
          R: radius,
          Rabs: calcAbsorbRadius(radius),
          absorbedCount: 0,
          absorbGlow: 0,
          absorbGlowR: 0,
          absorbGlowG: 0,
          absorbGlowB: 0
        });
        bhSpawnCooldown = PARAM.spawnCooldownFrames;
      }

      function updateBlackHoles(dtMs) {
        if (!bhEnabled) return;

        // Mutual BH gravity (pairwise, momentum-conserving).
        for (let i = 0; i < blackHoles.length; i += 1) {
          for (let j = i + 1; j < blackHoles.length; j += 1) {
            const a = blackHoles[i];
            const b = blackHoles[j];
            const ma = Math.max(0.0001, a.mass || 0);
            const mb = Math.max(0.0001, b.mass || 0);
            let dx = b.x - a.x;
            if (dx > w * 0.5) dx -= w;
            if (dx < -w * 0.5) dx += w;
            let dy = b.y - a.y;
            if (dy > h * 0.5) dy -= h;
            if (dy < -h * 0.5) dy += h;
            const d2 = dx * dx + dy * dy;
            if (d2 < 1) continue;
            const soften2 = PARAM.bhMutualSoftening * PARAM.bhMutualSoftening;
            const invR = 1 / Math.sqrt(d2 + soften2);
            const invR3 = invR * invR * invR;
            const ax = PARAM.bhMutualGravityStrength * dx * invR3;
            const ay = PARAM.bhMutualGravityStrength * dy * invR3;
            a.vx = (a.vx || 0) + ax * mb;
            a.vy = (a.vy || 0) + ay * mb;
            b.vx = (b.vx || 0) - ax * ma;
            b.vy = (b.vy || 0) - ay * ma;
          }
        }

        const halfLifeMs = Math.max(1, PARAM.bhAbsorbGlowHalfLifeMs);
        const absorbGlowDecay = Math.pow(0.5, dtMs / halfLifeMs);
        for (let i = 0; i < blackHoles.length; i += 1) {
          const b = blackHoles[i];
          if (mouse.active && mouseGravityEnabled && dragBh.target !== b) {
            let dx = mouse.x - b.x;
            if (dx > w * 0.5) dx -= w;
            if (dx < -w * 0.5) dx += w;
            let dy = mouse.y - b.y;
            if (dy > h * 0.5) dy -= h;
            if (dy < -h * 0.5) dy += h;
            const d2 = dx * dx + dy * dy;
            const ar = currentAttractR;
            if (d2 > 1 && d2 < ar * ar) {
              const d = Math.sqrt(d2);
              const pull = (1 - d / ar) * currentAttractStrength * PARAM.bhMouseAttractScale;
              b.vx = (b.vx || 0) + (dx / d) * pull;
              b.vy = (b.vy || 0) + (dy / d) * pull;
            }
          }
          b.x += b.vx || 0;
          b.y += b.vy || 0;
          if (!noFrictionModeEnabled) {
            b.vx = (b.vx || 0) * PARAM.bhVelocityDamping;
            b.vy = (b.vy || 0) * PARAM.bhVelocityDamping;
          }
          const sp2 = (b.vx || 0) * (b.vx || 0) + (b.vy || 0) * (b.vy || 0);
          if (sp2 > PARAM.bhMaxSpeed * PARAM.bhMaxSpeed) {
            const s = PARAM.bhMaxSpeed / Math.sqrt(sp2);
            b.vx *= s;
            b.vy *= s;
          }
          if (b.x < 0) b.x += w;
          if (b.x >= w) b.x -= w;
          if (b.y < 0) b.y += h;
          if (b.y >= h) b.y -= h;
          b.absorbGlow = (b.absorbGlow || 0) * absorbGlowDecay;
          b.absorbGlowR = (b.absorbGlowR || 0) * absorbGlowDecay;
          b.absorbGlowG = (b.absorbGlowG || 0) * absorbGlowDecay;
          b.absorbGlowB = (b.absorbGlowB || 0) * absorbGlowDecay;
          b.R = calcRadius(b.mass);
          b.Rabs = calcAbsorbRadius(b.R);
        }

        const mergeK2 = PARAM.bhMergeK * PARAM.bhMergeK;
        for (let i = 0; i < blackHoles.length; i += 1) {
          for (let j = i + 1; j < blackHoles.length; j += 1) {
            const a = blackHoles[i];
            const b = blackHoles[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const d2 = dx * dx + dy * dy;
            const mr = a.R + b.R;
            if (d2 > mr * mr * mergeK2) continue;

            const massA = Math.max(0.0001, a.mass);
            const massB = Math.max(0.0001, b.mass);
            const mass = massA + massB;
            a.x = (a.x * massA + b.x * massB) / mass;
            a.y = (a.y * massA + b.y * massB) / mass;
            a.vx = ((a.vx || 0) * massA + (b.vx || 0) * massB) / mass;
            a.vy = ((a.vy || 0) * massA + (b.vy || 0) * massB) / mass;
            a.mass = mass;
            a.R = calcRadius(mass);
            a.Rabs = calcAbsorbRadius(a.R);
            a.absorbedCount = (a.absorbedCount || 0) + (b.absorbedCount || 0);
            a.absorbGlow = (a.absorbGlow || 0) + (b.absorbGlow || 0);
            a.absorbGlowR = (a.absorbGlowR || 0) + (b.absorbGlowR || 0);
            a.absorbGlowG = (a.absorbGlowG || 0) + (b.absorbGlowG || 0);
            a.absorbGlowB = (a.absorbGlowB || 0) + (b.absorbGlowB || 0);
            blackHoles.splice(j, 1);
            j -= 1;
          }
        }
      }

      function drawBlackHoles() {
        if (!bhEnabled) return;
        for (let i = 0; i < blackHoles.length; i += 1) {
          const b = blackHoles[i];
          ctx.beginPath();
          ctx.fillStyle = 'rgba(0,0,0,0.9)';
          ctx.arc(b.x, b.y, b.R, 0, Math.PI * 2);
          ctx.fill();
          const absorbLevel = 1 - Math.exp(-(b.absorbGlow || 0));
          if (absorbLevel > 0.001) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            const innerR = b.R * 1.08;
            const outerR = b.R * 1.62;
            const coreA = clamp(0.22 + absorbLevel * 0.62, 0, 1);
            const midA = clamp(0.14 + absorbLevel * 0.45, 0, 1);
            const rimA = clamp(0.06 + absorbLevel * 0.28, 0, 1);
            const glowDen = Math.max(0.0001, b.absorbGlow || 0);
            const gr = Math.round(clamp((b.absorbGlowR || 0) / glowDen, 0, 255));
            const gg = Math.round(clamp((b.absorbGlowG || 0) / glowDen, 0, 255));
            const gb = Math.round(clamp((b.absorbGlowB || 0) / glowDen, 0, 255));
            const mr = Math.round(clamp(gr + (255 - gr) * 0.45, 0, 255));
            const mg = Math.round(clamp(gg + (255 - gg) * 0.45, 0, 255));
            const mb = Math.round(clamp(gb + (255 - gb) * 0.45, 0, 255));
            const wr = Math.round(clamp(mr + 18, 0, 255));
            const wg = Math.round(clamp(mg - 8, 0, 255));
            const wb = Math.round(clamp(mb - 12, 0, 255));
            const oval = 1 + 0.025 * Math.sin(t * 1.35 + i * 0.9);
            ctx.translate(b.x, b.y);
            ctx.scale(1 / oval, oval);
            const grad = ctx.createRadialGradient(0, 0, innerR, 0, 0, outerR);
            grad.addColorStop(0.00, 'rgba(' + wr + ',' + wg + ',' + wb + ',' + coreA.toFixed(3) + ')');
            grad.addColorStop(0.30, 'rgba(' + mr + ',' + mg + ',' + mb + ',' + midA.toFixed(3) + ')');
            grad.addColorStop(0.72, 'rgba(' + gr + ',' + gg + ',' + gb + ',' + rimA.toFixed(3) + ')');
            grad.addColorStop(1.00, 'rgba(255,255,255,0.000)');
            ctx.beginPath();
            ctx.fillStyle = grad;
            ctx.arc(0, 0, outerR, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.lineWidth = Math.max(0.6, b.R * 0.05);
            ctx.strokeStyle = 'rgba(' + mr + ',' + mg + ',' + mb + ',' + clamp(0.05 + absorbLevel * 0.22, 0, 0.4).toFixed(3) + ')';
            ctx.arc(0, 0, b.R * 1.30, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0,0,0,0.98)';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.arc(b.x, b.y, b.R, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          if (bhArrowEnabled) {
            drawUpArrow(b.x, b.y, b.R, 'rgba(255, 120, 210, 0.95)');
          }
        }
      }


      function resize() {
        const rect = canvas.getBoundingClientRect();
        w = Math.max(1, Math.floor(rect.width));
        h = Math.max(1, Math.floor(rect.height));
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const baseArea = Math.max(1, PARAM.baseViewWidth * PARAM.baseViewHeight);
        const areaScale = (w * h) / baseArea;
        currentParticleTarget = Math.max(
          PARAM.minParticleCount,
          Math.round(PARAM.particleCount * areaScale)
        );
        const lenScale = Math.sqrt(Math.max(0.0001, areaScale));
        currentAttractR = PARAM.attractR * lenScale;
        currentBlastR = PARAM.blastR * lenScale;
        const target = currentParticleTarget;
        particles.length = 0;
        blackHoles.length = 0;
        bhSpawnCooldown = 0;
        for (let i = 0; i < target; i += 1) {
          const r = randomParticleRadius();
          const c = particleColorFromRadius(r);
          const heat0 = randomInitialHeat();
          const p = {
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() * 0.55 + 0.18) * (Math.random() > 0.5 ? 1 : -1),
            vy: (Math.random() * 0.24 - 0.12),
            baseVx: (Math.random() * 0.55 + 0.18) * (Math.random() > 0.5 ? 1 : -1),
            baseVy: (Math.random() * 0.24 - 0.12),
            launchVxTarget: 0,
            launchVyTarget: 0,
            launchTime: -1,
            r,
            collisionCount: 0,
            flash: 0,
            heat: heat0,
            life: Math.random() * 0.7 + 0.3,
            color: c,
            cr: 255,
            cg: 255,
            cb: 255
          };
          setParticleColor(p, c);
          particles.push(p);

        markSinglePinkStar();
        lastFrameParticleEnergy = computeParticleEnergy();

      function step() {
        if (isPaused) {
          updateUniverseHud(false);
          raf = requestAnimationFrame(step);
          return;
        }

        const nowMs = performance.now();
        const dtMs = lastStepMs > 0 ? clamp(nowMs - lastStepMs, 0, 250) : (1000 / 60);
        lastStepMs = nowMs;
        t += 0.015;
        frameTick += 1;
        ctx.fillStyle = backgroundColorFromEnergy(lastFrameParticleEnergy, t);
        ctx.fillRect(0, 0, w, h);
        const attractR2 = currentAttractR * currentAttractR;
        const bhSoft2 = PARAM.bhMutualSoftening * PARAM.bhMutualSoftening;
        const wrapW = w;
        const wrapH = h;
        let totalEnergy = 0;
        const preMassThreshold = Math.max(0.0001, PARAM.collapseMassThreshold) * Math.max(0.05, PARAM.preCollapseMassRatio);
        const preCollThreshold = Math.max(
          0,
          PARAM.collapseCollisionThreshold - Math.max(0, PARAM.preCollapseCollisionLead)
        );
        const canPreCollapseGlow =
          bhCreationLockFrames <= 0 && (!PARAM.collapseRequireCollisionMode || collisionModeEnabled);
        const suppressNegativeAmbientGravity = currentGravityScale < 0 && pointerHoldActive;
        if (suppressNegativeAmbientGravity) {
          // Hold-click in negative gravity: disable ambient negative gravity and apply click gravity only.
          gravitateClick(pointerHoldX, pointerHoldY, PARAM.holdGravityImpulseScale);
        }
        if (particleGravityEnabled || collisionModeEnabled) {
          buildParticleGravityGrid(wrapW, wrapH);
        }
        if (particleGravityEnabled || (collisionModeEnabled && bhCreationLockFrames <= 0)) {
          const merged = applyParticleGravitySymmetric(
            wrapW,
            wrapH,
            particleGravityEnabled,
            collisionModeEnabled && bhCreationLockFrames <= 0
          );
          if (merged && collisionModeEnabled) {
            buildParticleGravityGrid(wrapW, wrapH);
          }
        }

        if (bhSpawnCooldown > 0) bhSpawnCooldown -= 1;
        if (bhCreationLockFrames > 0) bhCreationLockFrames -= 1;
        if (
          bhEnabled &&
          blackHoles.length < PARAM.maxBlackHoles &&
          bhSpawnCooldown === 0 &&
          (frameTick % PARAM.spawnCheckEveryNFrames === 0)
        ) {
          buildSpatialGrid();
          trySpawnBlackHole();
        }

        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const prevX = p.x;
          const prevY = p.y;
          if (!noFrictionModeEnabled) {
            const hasBhGravity = bhEnabled && blackHoles.length > 0 && !suppressNegativeAmbientGravity;
            if (!particleGravityEnabled && (!hasBhGravity || flowModeEnabled)) {
              const flowOscY = flowModeEnabled
                ? Math.sin(t * PARAM.flowOscFreq) * PARAM.flowOscAmp
                : 0;
              const targetVx = flowModeEnabled ? p.baseVx : 0;
              const targetVy = (flowModeEnabled ? p.baseVy : 0) + flowOscY;
              p.vx += (targetVx - p.vx) * currentVelReturn;
              p.vy += (targetVy - p.vy) * currentVelReturn;
            } else {
              const drag = clamp(currentPpLinearDamping, 0, 0.5);
              p.vx *= (1 - drag);
              p.vy *= (1 - drag);
            }
          }

          if (p.launchTime >= 0) {
            const a = Math.max(0.000001, PARAM.bigBangLaunchA);
            const prevPhase = 1 - Math.exp(-a * p.launchTime);
            p.launchTime += 1;
            const nextPhase = 1 - Math.exp(-a * p.launchTime);
            const dPhase = nextPhase - prevPhase;
            if (dPhase > 0.000001) {
              p.vx += p.launchVxTarget * dPhase;
              p.vy += p.launchVyTarget * dPhase;
            } else {
              p.launchTime = -1;
            }
          }

          if (mouse.active && mouseGravityEnabled && !suppressNegativeAmbientGravity) {
            const dx = mouse.x - p.x;
            const dy = mouse.y - p.y;
            const d2 = dx * dx + dy * dy;
            if (d2 > 1 && d2 < attractR2) {
              const d = Math.sqrt(d2);
              const pull = (1 - d / currentAttractR) * currentAttractStrength;
              p.vx += (dx / d) * pull;
              p.vy += (dy / d) * pull;
            }
          }

          let absorbed = false;
          if (!suppressNegativeAmbientGravity && bhEnabled && blackHoles.length > 0) {
            for (let bIdx = 0; bIdx < blackHoles.length; bIdx += 1) {
              const b = blackHoles[bIdx];
              const dx = shortestWrappedDelta(b.x, p.x, wrapW);
              const dy = shortestWrappedDelta(b.y, p.y, wrapH);
              const d2 = dx * dx + dy * dy;
              if (d2 < b.Rabs * b.Rabs) {
                absorbParticleIntoBlackHole(b, p);
                removeParticleAt(i);
                absorbed = true;
                break;
              }
              if (d2 > 1) {
                const mb = Math.max(0.0001, b.mass || 0);
                const g = PARAM.bhMutualGravityStrength * mb;
                const invR = 1 / Math.sqrt(d2 + bhSoft2);
                const invR3 = invR * invR * invR;
                const ax = g * dx * invR3;
                const ay = g * dy * invR3;
                p.vx += ax;
                p.vy += ay;
              }
            }
          }
          if (absorbed) {
            i -= 1;
            continue;
          }

          const sp2 = p.vx * p.vx + p.vy * p.vy;
          if (sp2 > currentMaxSpeed * currentMaxSpeed) {
            const s = currentMaxSpeed / Math.sqrt(sp2);
            p.vx *= s;
            p.vy *= s;
          }

          const wave = Math.sin((p.x * 0.01) + t) * PARAM.waveAmp;
          p.x += p.vx;
          p.y += p.vy + wave;

          // Robust horizon check (endpoint + segment-crossing) to prevent tunneling leaks.
          if (bhEnabled && blackHoles.length > 0) {
            for (let bIdx = 0; bIdx < blackHoles.length; bIdx += 1) {
              const b = blackHoles[bIdx];
              const r2 = b.Rabs * b.Rabs;
              const dx = shortestWrappedDelta(b.x, p.x, wrapW);
              const dy = shortestWrappedDelta(b.y, p.y, wrapH);
              const insideNow = (dx * dx + dy * dy) < r2;
              const prevNear = torusRelativePoint(prevX, prevY, b.x, b.y, wrapW, wrapH);
              const currNear = torusRelativePoint(p.x, p.y, b.x, b.y, wrapW, wrapH);
              const crossed = segmentIntersectsCircle(prevNear.x, prevNear.y, currNear.x, currNear.y, b.x, b.y, r2);
              if (insideNow || crossed) {
                absorbParticleIntoBlackHole(b, p);
                removeParticleAt(i);
                absorbed = true;
                break;
              }
            }
          }
          if (absorbed) {
            i -= 1;
            continue;
          }

          p.life += (Math.random() - 0.5) * PARAM.lifeJitter;
          if (p.life < PARAM.lifeMin) p.life = PARAM.lifeMin;
          if (p.life > PARAM.lifeMax) p.life = PARAM.lifeMax;
          p.flash = (p.flash || 0) * PARAM.collisionFlashDecay;
          p.heat = (p.heat || 0) * PARAM.collisionHeatDecay;
          if (canPreCollapseGlow && (p.collisionCount || 0) >= preCollThreshold) {
            // Expensive mass check only for near-threshold particles.
            const m = particleMassFromRadius(p.r);
            if (m >= preMassThreshold) {
              p.flash = Math.min(
                PARAM.preCollapseFlashMax,
                (p.flash || 0) + PARAM.preCollapseFlashGain
              );
              p.heat = Math.min(1, (p.heat || 0) + PARAM.preCollapseHeatGain);
            }
          }
          totalEnergy += particleBrightnessEnergy(p);

          if (p.x < 0) p.x += w;
          if (p.x >= w) p.x -= w;
          if (p.y < 0) p.y += h;
          if (p.y >= h) p.y -= h;

          let alpha = (collisionModeEnabled ? 0.62 : 1.02) * p.life;
          if (!collisionModeEnabled) alpha += 0.07;
          if (collisionModeEnabled) {
            alpha += proximityBrightnessOffset(i, p, wrapW, wrapH);
            alpha += p.flash || 0;
          }
          let dr = p.cr || 255;
          let dg = p.cg || 255;
          let db = p.cb || 255;
          const heat = clamp(p.heat || 0, 0, 1);
          if (heat > 0.001) {
            dr = Math.round(lerp(dr, PARAM.hotColorR, heat));
            dg = Math.round(lerp(dg, PARAM.hotColorG, heat));
            db = Math.round(lerp(db, PARAM.hotColorB, heat));
          }
          ctx.fillStyle = 'rgba(' + dr + ',' + dg + ',' + db + ',' + alpha.toFixed(3) + ')';
          if (p.r >= PARAM.largeStarCircleThreshold) {
            ctx.beginPath();
            ctx.arc(p.x + p.r * 0.5, p.y + p.r * 0.5, p.r * 0.52, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillRect(p.x, p.y, p.r, p.r);
          }

          if (bhArrowEnabled && p.isEarth) {
            drawUpArrow(p.x + p.r * 0.5, p.y + p.r * 0.5, Math.max(2.4, p.r * 0.8), 'rgba(120, 255, 170, 0.95)');
          }
          if (hudVisible && particles.length < 10 && !(bhArrowEnabled && p.isEarth)) {
            const starArrowColor = p.isEarth ? 'rgba(120, 255, 170, 0.95)' : 'rgba(255, 205, 120, 0.92)';
            drawUpArrow(p.x + p.r * 0.5, p.y + p.r * 0.5, Math.max(2.4, p.r * 0.8), starArrowColor);
          }
        }

        updateBlackHoles(dtMs);
        maybeTriggerBigBang();
        drawBlackHoles();
        updateUniverseHud(false);
        if (bbWhiteBoost > 1) {
          bbWhiteBoost += (1 - bbWhiteBoost) * PARAM.bbWhiteBoostDecay;
        }
        if (particles.length < 10) {
          if (lowStarStartMs <= 0) {
            lowStarStartMs = nowMs;
            lowStarHintShown = false;
          } else if (!lowStarHintShown && (nowMs - lowStarStartMs) >= PARAM.cleanHintHoldMs) {
            cleanHintStartMs = nowMs;
            cleanHintUntilMs = nowMs + PARAM.cleanHintShowMs;
            lowStarHintShown = true;
          }
        } else {
          lowStarStartMs = 0;
          lowStarHintShown = false;
        }
        drawCleanHint(nowMs);
        lastFrameParticleEnergy = totalEnergy;

        raf = requestAnimationFrame(step);
      }

      function init() {
        resize();
        if (raf) cancelAnimationFrame(raf);
        step();
      }

      function explode(x, y) {
        const blastR2 = currentBlastR * currentBlastR;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const dx = p.x - x;
          const dy = p.y - y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 1 || d2 > blastR2) continue;
          const d = Math.sqrt(d2);
          const u = 1 - (d / currentBlastR);
          const impulse = PARAM.blastImpulse * u;
          p.vx += (dx / d) * impulse;
          p.vy += (dy / d) * impulse;
          p.life = Math.min(1, p.life + 0.2);
        }
      }

      function gravitateClick(x, y, impulseScale) {
        const scale = impulseScale == null ? 1 : impulseScale;
        const blastR2 = currentBlastR * currentBlastR;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const dx = x - p.x;
          const dy = y - p.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 1 || d2 > blastR2) continue;
          const d = Math.sqrt(d2);
          const u = 1 - (d / currentBlastR);
          const impulse = PARAM.blastImpulse * u * scale;
          p.vx += (dx / d) * impulse;
          p.vy += (dy / d) * impulse;
          p.life = Math.min(1, p.life + 0.2);
        }
      }

      async function applyPreset(id) {
        if (id === 1 || id === 4 || id === 5) {
          // Preset 1 baseline. 4-5 are currently mapped to baseline until their specs are defined.
          collisionModeEnabled = false;      // c
          particleGravityEnabled = false;    // g
          setFlowMode(true);                 // H
          hudVisible = false;                // i
          linksHidden = true;                // l
          mouseGravityEnabled = true;        // M
          noFrictionModeEnabled = false;     // n
          bhArrowEnabled = false;            // b
          setPauseState(false);              // ||
          await ensureFullscreenOff();       // f
        } else if (id === 2) {
          collisionModeEnabled = true;       // C
          particleGravityEnabled = true;     // G
          setFlowMode(false);                // h
          hudVisible = true;                 // I
          linksHidden = false;               // L
          mouseGravityEnabled = false;       // m
          noFrictionModeEnabled = false;     // n
          bhArrowEnabled = true;             // B
          clockVisible = false;              // t
          clockDateVisible = false;          // d
          setPauseState(false);              // ||
          await ensureFullscreenOff();       // f
        } else if (id === 3) {
          collisionModeEnabled = false;      // c
          particleGravityEnabled = true;     // G
          setFlowMode(false);                // h
          hudVisible = false;                // i
          linksHidden = true;                // l
          mouseGravityEnabled = false;       // m
          noFrictionModeEnabled = false;     // n
          bhArrowEnabled = false;            // b
          clockVisible = true;               // T
          clockDateVisible = true;           // D
        } else {
          return;

        syncCollisionToggle();
        syncParticleGravityToggle();
        syncMouseGravityToggle();

        syncBhArrowToggle();
        syncUniverseHudVisibility();
        syncLinksVisibility();
        syncClockVisibility();

      });
      collisionToggleBtn.addEventListener('click', () => {
        collisionModeEnabled = !collisionModeEnabled;
        syncCollisionToggle();
      });
      collisionToggleBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      frictionToggleBtn.addEventListener('click', () => {
        noFrictionModeEnabled = !noFrictionModeEnabled;
        syncFrictionToggle();
      });
      frictionToggleBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      particleGravityToggleBtn.addEventListener('click', () => {
        particleGravityEnabled = !particleGravityEnabled;
        syncParticleGravityToggle();
      });
      particleGravityToggleBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      mouseGravityToggleBtn.addEventListener('click', () => {
        mouseGravityEnabled = !mouseGravityEnabled;
        syncMouseGravityToggle();
      });
      mouseGravityToggleBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      resetLayoutBtn.addEventListener('click', () => {
        resize();
      });
      resetLayoutBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      fullscreenToggleBtn.addEventListener('click', async () => {
        await toggleFullscreen();
      });
      fullscreenToggleBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      document.addEventListener('fullscreenchange', () => {
        const active = !!document.fullscreenElement;
        fullscreenToggleBtn.textContent = active ? 'x' : '[ ]';
        fullscreenToggleBtn.title = active ? 'Exit fullscreen' : 'Fullscreen';
        fullscreenToggleBtn.setAttribute('aria-label', active ? 'Exit fullscreen' : 'Enter fullscreen');
      });

      window.addEventListener('resize', init, { passive: true });
      syncLinksVisibility();
      syncParticleGravityToggle();
      syncMouseGravityToggle();
      syncCollisionToggle();
      syncFlowToggle();
      syncFrictionToggle();
      syncBhArrowToggle();
      syncUniverseHudVisibility();
      syncClockVisibility();
      syncClockDateVisibility();
      updateUniverseHud(true);
      updateWallClock();
      setInterval(updateWallClock, 1000);
      init();
    })();
  </script>
</body>
</html>
