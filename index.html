<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground Hub</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-118J91MG59"></script>

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-118J91MG59');

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #070F1A;
      --bg-1: #070F1A;
      --line: #1f3857;
      --panel: #0a1d36;
      --panel-2: #102947;
      --text: #eaf1ff;
      --accent: #86c8ff;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: "Noto Sans JP", system-ui, sans-serif;
      color: rgba(234, 241, 255, 0.3);
      background: #000;
      user-select: none;
      -webkit-user-select: none;
    }

    #heroFx {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      min-height: 100dvh;
      display: block;
      z-index: 0;
      pointer-events: none;
      filter: saturate(1.1);
    }

    body.pseudo-fullscreen .bookmark-bar,
    body.pseudo-fullscreen .tool-btn,
    body.pseudo-fullscreen .universe-hud,
    body.pseudo-fullscreen .hud-copyright {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .wall-clock {
      position: fixed;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      z-index: 2;
      visibility: hidden;
      color: rgba(255, 255, 255, 0.92);
      font-size: clamp(72px, 18vw, 170px);
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 14px 56px rgba(0, 0, 0, 0.72);
      pointer-events: none;
      text-align: center;
    }

    .wall-clock-time {
      display: block;
      line-height: 1;
    }

    .wall-clock-date {
      display: block;
      margin-top: 0.18em;
      font-size: clamp(16px, 2.2vw, 30px);
      font-weight: 500;
      letter-spacing: 0.04em;
      opacity: 0.92;
      text-shadow: 0 14px 56px rgba(0, 0, 0, 0.72);
    }

    .wall-clock-date.hidden {
      display: none;
    }

    .wall-clock.hidden {
      display: none;
    }

    .custom-text-box {
      position: fixed;
      left: 50%;
      top: 20%;
      transform: translate(-50%, -50%);
      z-index: 4;
      width: min(72vw, 760px);
      max-width: calc(100vw - 26px);
      padding-top: 30px;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      color: rgba(234, 241, 255, 0.95);
      box-shadow: none;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    .custom-text-box.hidden {
      display: none;
    }

    .custom-text-drag-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 14px;
      padding: 0;
      border-bottom: 0;
      color: transparent;
      font-size: 0;
      font-weight: 600;
      letter-spacing: 0;
      cursor: grab;
      touch-action: none;
      opacity: 0;
    }

    .custom-text-drag-handle:active {
      cursor: grabbing;
    }

    .custom-text-input {
      display: block;
      width: 100%;
      height: 2.45em;
      min-height: 0;
      max-height: none;
      padding: 0;
      border: 0;
      outline: 0;
      resize: none;
      overflow: hidden;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      font-family: "Noto Sans JP", system-ui, sans-serif;
      font-size: 42px;
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: 0.02em;
      white-space: pre-wrap;
      text-align: center;
      text-shadow: 0 14px 56px rgba(0, 0, 0, 0.72);
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    .custom-text-input::placeholder {
      color: rgba(234, 241, 255, 0.35);
      text-align: center;
    }

    .custom-text-controls {
      position: fixed;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 6px;
      border: 1px solid rgba(134, 200, 255, 0.24);
      border-radius: 8px;
      background: rgba(9, 26, 48, 0.24);
      border-top: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      z-index: 5;
    }

    .custom-text-controls.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .custom-text-box.editing .custom-text-input {
      cursor: text;
    }

    .custom-text-box.dragging,
    .custom-text-box.dragging .custom-text-input {
      cursor: default !important;
    }

    .custom-text-size-btn {
      min-width: 44px;
      height: 24px;
      border: 1px solid rgba(63, 112, 166, 0.3);
      border-radius: 8px;
      background: rgba(9, 26, 48, 0.26);
      color: rgba(234, 241, 255, 0.8);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .bookmark-bar {
      position: fixed;
      top: 10px;
      left: 12px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 6px 8px;
      border: 1px solid rgba(134, 200, 255, 0.28);
      border-radius: 10px;
      background: rgba(8, 21, 42, 0.36);
      backdrop-filter: blur(2px);
    }

    .bookmark-bar a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      min-width: 70px;
      padding: 0 10px;
      border: 1px solid rgba(63, 112, 166, 0.45);
      border-radius: 8px;
      color: rgba(234, 241, 255, 0.9);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      background: rgba(9, 26, 48, 0.42);
    }

    .bookmark-bar a sub {
      display: inline-block;
      font-size: 0.68em;
      line-height: 1;
      vertical-align: baseline;
      transform: translateY(0.22em);
      margin-left: 0.02em;
    }

    .bookmark-bar a:hover {
      border-color: var(--accent);
      color: #fff;
    }

    .tool-btn {
      position: fixed;
      z-index: 3;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(42, 70, 103, 0.38);
      border-radius: 9px;
      background: rgba(7, 20, 40, 0.24);
      color: rgba(234, 241, 255, 0.44);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(1px);
      opacity: 1;
      transition: opacity 140ms ease;
    }

    .tool-btn:hover {
      border-color: var(--accent);
      color: #ffffff;
    }

    body.right-panel-hidden .tool-btn {
      opacity: 0;
      pointer-events: none;
    }

    .aging-toggle { right: 12px; top: 12px; font-size: 12px; }            /* a */
    .bh-arrow-toggle { right: 12px; top: 52px; font-size: 12px; }         /* b */
    .collision-toggle { right: 12px; top: 92px; font-size: 12px; }        /* c */
    .date-toggle { right: 12px; top: 132px; font-size: 12px; }            /* d */
    .fullscreen-toggle { right: 12px; top: 172px; font-size: 14px; }      /* f */
    .particle-gravity-toggle { right: 12px; top: 212px; font-size: 12px; }/* g */
    .flow-toggle { right: 12px; top: 252px; font-size: 12px; }            /* h */
    .info-btn { right: 12px; top: 292px; font-size: 14px; }               /* i */
    .custom-text-toggle { right: 12px; top: 332px; font-size: 12px; }     /* j */
    .clock-star-toggle { right: 12px; top: 372px; font-size: 12px; }      /* k */
    .links-toggle { right: 12px; top: 412px; font-size: 13px; }           /* l */
    .mouse-gravity-toggle { right: 12px; top: 452px; font-size: 12px; }   /* m */
    .friction-toggle { right: 12px; top: 492px; font-size: 12px; }        /* n */
    .hover-toggle { right: 12px; top: 532px; font-size: 12px; }           /* o */
    .panel-toggle { right: 12px; top: 572px; font-size: 12px; }           /* p */
    .reset-layout-btn { right: 12px; top: 612px; font-size: 12px; }       /* r */
    .star-export-btn { right: 12px; top: 652px; font-size: 12px; }        /* s */
    .clock-toggle { right: 12px; top: 692px; font-size: 12px; }           /* t */
    .relayout-btn { right: 12px; top: 732px; font-size: 12px; }           /* x */
    .time-toggle { right: 12px; top: 772px; }                              /* space */
    .preset-btn { right: 56px; font-size: 12px; }
    .preset-1 { top: 12px; }
    .preset-2 { top: 52px; }
    .preset-3 { top: 92px; }
    .preset-4 { top: 132px; }
    .preset-5 { top: 172px; }

    .universe-hud {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      width: min(96vw, 980px);
      box-sizing: border-box;
      gap: 10px;
      row-gap: 5px;
      padding: 6px 10px;
      border: 1px solid rgba(134, 200, 255, 0.35);
      border-radius: 10px;
      background: rgba(8, 21, 42, 0.28);
      color: rgba(234, 241, 255, 0.82);
      font-size: 12px;
      line-height: 1.3;
      backdrop-filter: blur(2px);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 120ms ease;
    }

    .universe-hud.visible {
      opacity: 1;
      visibility: visible;
    }

    .universe-hud.hover-only .hud-item:not(#hudEarthAlive):not(#hudStellarClasses):not(#hudHoverStar) {
      display: none;
    }

    .universe-hud.hover-only #hudHoverStar {
      flex: 1 0 auto;
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }

    .hud-copyright {
      position: fixed;
      right: 12px;
      bottom: 10px;
      z-index: 2;
      padding: 4px 8px;
      border: 1px solid rgba(134, 200, 255, 0.26);
      border-radius: 8px;
      background: rgba(8, 21, 42, 0.24);
      color: rgba(234, 241, 255, 0.72);
      font-size: 11px;
      line-height: 1.2;
      backdrop-filter: blur(2px);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 120ms ease;
    }

    .hud-copyright.visible {
      opacity: 1;
      visibility: visible;
    }

    .hud-item {
      opacity: 0.92;
      white-space: nowrap;
    }

    .hud-item.hidden {
      display: none;
    }

    #hudHoverStar {
      flex: 1 0 100%;
      border-top: 1px solid rgba(134, 200, 255, 0.22);
      padding-top: 4px;
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: 1.25em;
    }

    @media (max-width: 720px) {
      .wall-clock {
        top: 42%;
        font-size: clamp(56px, 22vw, 108px);
      }
      .custom-text-box {
        width: calc(100vw - 16px);
        max-width: calc(100vw - 16px);
      }
      .custom-text-input {
        font-size: 30px;
      }
      .bookmark-bar {
        top: 8px;
        left: 8px;
        gap: 6px;
        padding: 4px 6px;
      }
      .bookmark-bar a {
        min-height: 24px;
        min-width: 60px;
        padding: 0 8px;
        font-size: 11px;
      }
      .universe-hud {
        top: 8px;
        max-width: calc(100vw - 12px);
        font-size: 11px;
        gap: 7px;
        padding: 5px 8px;
      }
    }
  </style>
</head>
<body>
  <canvas id="heroFx" aria-hidden="true"></canvas>
  <nav class="bookmark-bar" aria-label="Bookmarks">
    <a href="https://skanai0123.github.io/">Hub</a>
    <a href="https://skanai0123.github.io/llg-playground/">LLG</a>
    <a href="https://skanai0123.github.io/t2-playground/"><i>T</i><sub>2</sub></a>
  </nav>
  <div id="wallClock" class="wall-clock" aria-hidden="true">
    <span id="wallClockTime" class="wall-clock-time">--:--</span>
    <span id="wallClockDate" class="wall-clock-date">----</span>
  </div>
  <div id="customTextBox" class="custom-text-box hidden" aria-hidden="true">
    <div id="customTextDragHandle" class="custom-text-drag-handle">Text Box (Drag here)</div>
    <textarea id="customTextInput" class="custom-text-input" rows="2" placeholder="Type here / 日本語OK / Enter for newline"></textarea>
  </div>
  <div id="customTextControls" class="custom-text-controls" aria-hidden="true">
    <button id="customTextSizeDownBtn" class="custom-text-size-btn" type="button" aria-label="Decrease text size" title="Smaller text">A-</button>
    <button id="customTextSizeUpBtn" class="custom-text-size-btn" type="button" aria-label="Increase text size" title="Larger text">A+</button>
  </div>
  <div id="universeHud" class="universe-hud" aria-live="polite">
    <span class="hud-item" id="hudBbCount">BB: -</span>
    <span class="hud-item" id="hudUniverseAge">AgeU: -</span>
    <span class="hud-item" id="hudEarthAlive">Earth: -</span>
    <span class="hud-item" id="hudTotalMass">Mtot: -</span>
    <span class="hud-item" id="hudStellarClasses">Lum I/II/III/IV/V/WD/BH: -</span>
    <span class="hud-item" id="hudMeanTemp">Tavg: -</span>
    <span class="hud-item" id="hudGravityG">G: -</span>
    <span class="hud-item" id="hudResistance">Res: -</span>
    <span class="hud-item" id="hudFps">FPS: -</span>
    <span class="hud-item" id="hudHoverStar">Hover: -</span>
  </div>
  <div id="hudCopyright" class="hud-copyright" aria-hidden="true">
    <span id="hudVersion">ver: -</span> | © 2026 Shun Kanai
  </div>
  <button id="agingToggleBtn" class="tool-btn aging-toggle" type="button" aria-label="Enable stellar aging" title="Enable stellar aging">a</button>
  <button id="bhArrowToggleBtn" class="tool-btn bh-arrow-toggle" type="button" aria-label="Show black hole arrows" title="Show black hole arrows">b</button>
  <button id="collisionToggleBtn" class="tool-btn collision-toggle" type="button" aria-label="Enable collisions" title="Enable collisions">c</button>
  <button id="dateToggleBtn" class="tool-btn date-toggle" type="button" aria-label="Show date" title="Show date">d</button>
  <button id="fullscreenToggleBtn" class="tool-btn fullscreen-toggle" type="button" aria-label="Enter fullscreen" title="Fullscreen">[ ]</button>
  <button id="particleGravityToggleBtn" class="tool-btn particle-gravity-toggle" type="button" aria-label="Enable particle gravity" title="Enable particle gravity">g</button>
  <button id="flowToggleBtn" class="tool-btn flow-toggle" type="button" aria-label="Enable flow mode" title="Enable flow mode">h</button>
  <button id="universeInfoBtn" class="tool-btn info-btn" type="button" aria-label="Show universe panel" title="Universe panel">i</button>
  <button id="customTextToggleBtn" class="tool-btn custom-text-toggle" type="button" aria-label="Show text box" title="Show text box">j</button>
  <button id="clockStarToggleBtn" class="tool-btn clock-star-toggle" type="button" aria-label="Enable star clock gravity" title="Enable star clock gravity">k</button>
  <button id="linksToggleBtn" class="tool-btn links-toggle" type="button" aria-label="Hide links" title="Hide links">L</button>
  <button id="mouseGravityToggleBtn" class="tool-btn mouse-gravity-toggle" type="button" aria-label="Disable mouse gravity" title="Disable mouse gravity">M</button>
  <button id="frictionToggleBtn" class="tool-btn friction-toggle" type="button" aria-label="Disable friction" title="Disable friction">n</button>
  <button id="hoverInfoToggleBtn" class="tool-btn hover-toggle" type="button" aria-label="Show hover info" title="Show hover info">o</button>
  <button id="panelToggleBtn" class="tool-btn panel-toggle" type="button" aria-label="Hide right panel" title="Hide right panel">P</button>
  <button id="resetLayoutBtn" class="tool-btn reset-layout-btn" type="button" aria-label="Reset layout" title="Reset layout">R</button>
  <button id="starExportBtn" class="tool-btn star-export-btn" type="button" aria-label="Download stars CSV" title="Download stars CSV">s</button>
  <button id="relayoutBtn" class="tool-btn relayout-btn" type="button" aria-label="Relayout positions" title="Relayout positions">x</button>
  <button id="clockToggleBtn" class="tool-btn clock-toggle" type="button" aria-label="Show clock" title="Show clock">t</button>
  <button id="timeToggleBtn" class="tool-btn time-toggle" type="button" aria-label="Pause time" title="Pause">II</button>
  <button id="preset1Btn" class="tool-btn preset-btn preset-1" type="button" aria-label="Preset 1" title="Preset 1">1</button>
  <button id="preset2Btn" class="tool-btn preset-btn preset-2" type="button" aria-label="Preset 2" title="Preset 2">2</button>
  <button id="preset3Btn" class="tool-btn preset-btn preset-3" type="button" aria-label="Preset 3" title="Preset 3">3</button>
  <button id="preset4Btn" class="tool-btn preset-btn preset-4" type="button" aria-label="Preset 4" title="Preset 4">4</button>
  <button id="preset5Btn" class="tool-btn preset-btn preset-5" type="button" aria-label="Preset 5" title="Preset 5">5</button>

      function lerp(a, b, t) {
        return a + (b - a) * t;

      function gradientColor(t) {
        const stops = [
          [96, 140, 255],   // O: vivid deep blue
          [160, 190, 255],  // B: saturated blue-white
          [248, 247, 255],  // A: white
          [255, 244, 234],  // F/G: warm white
          [255, 210, 161],  // K: orange
          [255, 167, 82]    // M: red-orange
        ];
        const n = stops.length - 1;
        const x = Math.max(0, Math.min(0.9999, t)) * n;
        const i = Math.floor(x);
        const u = x - i;
        const a = stops[i];
        const b = stops[i + 1];
        const r = Math.round(lerp(a[0], b[0], u));
        const g = Math.round(lerp(a[1], b[1], u));
        const bch = Math.round(lerp(a[2], b[2], u));
        return r + ',' + g + ',' + bch;
      }

      function calcRadius(mass) {

      function calcAbsorbRadius(visualRadius) {

          PARAM.bhCaptureRadiusMin,

      function particleMassFromRadius(r) {
        return Math.pow(Math.max(0.2, r), Math.max(0.1, PARAM.ppMassPower));
      }

      function particleRadiusFromMass(m) {
        return Math.pow(Math.max(0.0001, m), 1 / Math.max(0.1, PARAM.ppMassPower));
      }

      function isInsideClockSpawnBlockArea(x, y) {
        if (!clockVisible && !clockDateVisible && !clockStarModeEnabled) return false;
        const cx = w * 0.5;

        const timeFontPx = clamp(w * 0.18, 72, 170);
        const halfW = timeFontPx * 1.7;
        const halfH = timeFontPx * (clockDateVisible ? 0.9 : 0.55);
        return Math.abs(x - cx) <= halfW && Math.abs(y - cy) <= halfH;
      }

      function tryCollapseParticleToBlackHole(p) {
        if (bhCreationLockFrames > 0) return false;
        if (isInsideClockSpawnBlockArea(p.x, p.y)) return false;
        const collisionCount = p.collisionCount || 0;
        if (collisionCount < PARAM.collapseCollisionThreshold) return false;
        const m = Math.max(0.0001, Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r));
        if (m < PARAM.collapseMassThreshold) return false;
        if (!spawnBlackHoleFromParticle(p, m, Math.max(0, Math.floor(PARAM.collapseNoAbsorbFrames)))) {
          return false;
        }
        emitCollapseRepulse(p.x, p.y);
        return true;

      function spawnBlackHoleFromParticle(p, massOverride, absorbLockFramesOverride) {

        if (isInsideClockSpawnBlockArea(p.x, p.y)) return false;
        const m = Math.max(
          0.0001,
          Number.isFinite(massOverride) ? massOverride : (Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r))

        const radius = calcRadius(m);

      function emitCollapseRepulse(cx, cy, impulseScale = 1) {
        const r = Math.max(1, PARAM.collapseRepulseRadius);
        const r2 = r * r;
        const wx = w + 40;
        const wy = h + 20;
        const scaledImpulse = PARAM.collapseRepulseImpulse * Math.max(0, impulseScale);
        const soft2 = Math.max(1, PARAM.collapseRepulseSoftening * PARAM.collapseRepulseSoftening);
        const massInertiaPow = Math.max(0, PARAM.collapseRepulseMassInertia);
        const kickCap = Math.max(0.1, PARAM.collapseRepulseKickCap);
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          if (!p) continue;
          const dx = shortestWrappedDelta(p.x, cx, wx);
          const dy = shortestWrappedDelta(p.y, cy, wy);
          const d2 = dx * dx + dy * dy;
          if (d2 < 1 || d2 > r2) continue;
          const d = Math.sqrt(d2);
          const u = 1 - (d / r);
          const distFactor = 1 / (1 + (d2 / soft2));
          const massNow = Math.max(0.0001, Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r));
          const inertia = Math.pow(massNow, massInertiaPow);
          const kick = Math.min(kickCap, (scaledImpulse * u * distFactor) / Math.max(1e-6, inertia));
          p.vx += (dx / d) * kick;
          p.vy += (dy / d) * kick;
          const flashGain = 0.18 + 0.34 * (kick / kickCap);
          p.flash = Math.min(PARAM.collisionFlashMax, (p.flash || 0) + flashGain * u);
          const tempNow = Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK;
          const heatAdd = Math.max(0, PARAM.collapseRepulseHeatGainK) * (kick / kickCap) * u;
          p.tempK = clamp(tempNow + heatAdd, PARAM.tempMinK, PARAM.tempMaxK);
        }
      }

      function transferMassToBlackHole(b, p, dm, sourceMass, addDiskRing = true) {
        const addMass = Math.max(0.000001, dm);
        const mb = Math.max(0.0001, b.mass || 0);
        const vbx = b.vx || 0;
        const vby = b.vy || 0;
        const newM = mb + addMass;
        b.vx = (vbx * mb + p.vx * addMass) / newM;
        b.vy = (vby * mb + p.vy * addMass) / newM;
        b.mass = newM;
        b.R = calcRadius(newM);
        b.Rabs = calcAbsorbRadius(b.R);
        const starMass = Math.max(0.000001, sourceMass == null ? addMass : sourceMass);
        b.absorbedStarMass = (b.absorbedStarMass || 0) + addMass;
        const rvx = (p.vx || 0) - vbx;
        const rvy = (p.vy || 0) - vby;
        const kineticTerm = starMass * (rvx * rvx + rvy * rvy);
        const massRef = Math.max(0.0001, PARAM.bhRadiativeMassRef);
        const massExp = Math.max(0, PARAM.bhRadiativeMassExp);
        const massFactor = Math.pow(Math.max(0.0001, newM) / massRef, massExp);
        const recentAcc = Math.max(0, b.recentAccretion || 0);
        const accBoost = 1 + Math.min(PARAM.bhAccretionMaxBoost, recentAcc * PARAM.bhAccretionResponse);
        const glowAdd = kineticTerm * PARAM.bhAbsorbGlowEnergyScale * massFactor * accBoost;
        b.recentAccretion = recentAcc + starMass;
        b.absorbGlow = (b.absorbGlow || 0) + glowAdd;
        b.absorbGlowR = (b.absorbGlowR || 0) + (p.cr || 255) * glowAdd;
        b.absorbGlowG = (b.absorbGlowG || 0) + (p.cg || 255) * glowAdd;
        b.absorbGlowB = (b.absorbGlowB || 0) + (p.cb || 255) * glowAdd;
        const srcTempK = clamp(
          Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK,
          PARAM.tempMinK,
          PARAM.tempMaxK
        );
        const tempNow = clamp(
          Number.isFinite(b.tempK) ? b.tempK : srcTempK,
          PARAM.tempMinK,
          PARAM.tempMaxK
        );
        const kineticBoostK = Math.min(
          Math.max(0, PARAM.bhTempMaxBoostK),
          kineticTerm * Math.max(0, PARAM.bhTempKineticScale)
        );
        const targetTempK = clamp(srcTempK + kineticBoostK, PARAM.tempMinK, PARAM.tempMaxK);
        b.tempK = clamp(
          lerp(tempNow, targetTempK, clamp(PARAM.bhTempMixPerAbsorb, 0, 1)),
          PARAM.tempMinK,
          PARAM.tempMaxK
        );
        const srcR = clamp(Math.round(p.cr || 255), 0, 255);
        const srcG = clamp(Math.round(p.cg || 255), 0, 255);
        const srcB = clamp(Math.round(p.cb || 255), 0, 255);
        const shellW = Math.max(0.000001, volumeAddR3);
        b.accretionShellColorR = (b.accretionShellColorR || 0) + srcR * shellW;
        b.accretionShellColorG = (b.accretionShellColorG || 0) + srcG * shellW;
        b.accretionShellColorB = (b.accretionShellColorB || 0) + srcB * shellW;
        b.accretionShellColorW = (b.accretionShellColorW || 0) + shellW;
        if (b.diskColorR == null || b.diskColorG == null || b.diskColorB == null) {
          b.diskColorR = srcR;
          b.diskColorG = srcG;
          b.diskColorB = srcB;
        } else {
          const emaT = 0.2;
          b.diskColorR = lerp(b.diskColorR, srcR, emaT);
          b.diskColorG = lerp(b.diskColorG, srcG, emaT);
          b.diskColorB = lerp(b.diskColorB, srcB, emaT);
        }
        if (PARAM.bhAccretionDiskEnabled && addDiskRing) {
          const rings = b.accretionRings || (b.accretionRings = []);
          const gap = Math.max(0.00001, PARAM.bhAccretionDiskRingGap);
          let maxOffset = gap;
          for (let i = 0; i < rings.length; i += 1) {
            const off = rings[i].off == null ? gap : rings[i].off;
            if (off > maxOffset) maxOffset = off;
          }
          let mixR = Math.round(clamp(b.diskColorR == null ? srcR : b.diskColorR, 0, 255));
          let mixG = Math.round(clamp(b.diskColorG == null ? srcG : b.diskColorG, 0, 255));
          let mixB = Math.round(clamp(b.diskColorB == null ? srcB : b.diskColorB, 0, 255));
          if (rings.length > 0) {
            // Blend with the most recent ring color so the disk color transitions naturally.
            const prev = rings[rings.length - 1];
            mixR = Math.round(lerp(prev.r, mixR, 0.42));
            mixG = Math.round(lerp(prev.g, mixG, 0.42));
            mixB = Math.round(lerp(prev.bl, mixB, 0.42));
          }
          rings.push({
            r: clamp(mixR, 0, 255),
            g: clamp(mixG, 0, 255),
            bl: clamp(mixB, 0, 255),
            off: maxOffset + gap
          });
          const maxRings = Math.max(24, Math.floor(PARAM.bhAccretionDiskMaxRings));
          while (rings.length > maxRings) rings.shift();
        }
      }

      function absorbParticleIntoBlackHole(b, p) {
        const starMass = Math.max(0.0001, Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r));
        transferMassToAccretionDisk(b, p, starMass, starMass, true, true);
        b.absorbedCount = (b.absorbedCount || 0) + 1;
      }

      function transferMassToAccretionDisk(b, p, dm, sourceMass, addDiskRing = true, addToDiskMass = true) {
        const addMass = Math.max(0.000001, dm);
        if (addToDiskMass) {
          b.diskMass = (b.diskMass || 0) + addMass;
        }
        b.absorbedStarMass = (b.absorbedStarMass || 0) + addMass;
        const srcMass = Math.max(0.000001, sourceMass == null ? addMass : sourceMass);
        const areaFrac = clamp(addMass / srcMass, 0, 1);
        const srcRenderR = Math.max(0.2, Number.isFinite(p.r) ? p.r : 0.2);
        const volumeAddR3 = Math.pow(srcRenderR, 3) * areaFrac;
        b.accretionGlowVolumeR3 = Math.max(0, (b.accretionGlowVolumeR3 || 0) + volumeAddR3);
        const vbx = b.vx || 0;
        const vby = b.vy || 0;
        const rvx = (p.vx || 0) - vbx;
        const rvy = (p.vy || 0) - vby;
        const kineticTerm = addMass * (rvx * rvx + rvy * rvy);
        const massRef = Math.max(0.0001, PARAM.bhRadiativeMassRef);
        const massExp = Math.max(0, PARAM.bhRadiativeMassExp);
        const massFactor = Math.pow(Math.max(0.0001, b.mass || 0) / massRef, massExp);
        const recentAcc = Math.max(0, b.recentAccretion || 0);
        const accBoost = 1 + Math.min(PARAM.bhAccretionMaxBoost, recentAcc * PARAM.bhAccretionResponse);
        const glowAdd = kineticTerm * PARAM.bhAbsorbGlowEnergyScale * massFactor * accBoost;
        b.recentAccretion = recentAcc + addMass;
        b.absorbGlow = (b.absorbGlow || 0) + glowAdd;
        b.absorbGlowR = (b.absorbGlowR || 0) + (p.cr || 255) * glowAdd;
        b.absorbGlowG = (b.absorbGlowG || 0) + (p.cg || 255) * glowAdd;
        b.absorbGlowB = (b.absorbGlowB || 0) + (p.cb || 255) * glowAdd;

        const srcTempK = clamp(
          Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK,
          PARAM.tempMinK,
          PARAM.tempMaxK
        );
        const tempNow = clamp(
          Number.isFinite(b.tempK) ? b.tempK : srcTempK,
          PARAM.tempMinK,
          PARAM.tempMaxK
        );
        b.tempK = clamp(lerp(tempNow, srcTempK, 0.25), PARAM.tempMinK, PARAM.tempMaxK);

        const srcR = clamp(Math.round(p.cr || 255), 0, 255);
        const srcG = clamp(Math.round(p.cg || 255), 0, 255);
        const srcB = clamp(Math.round(p.cb || 255), 0, 255);
        if (b.diskColorR == null || b.diskColorG == null || b.diskColorB == null) {
          b.diskColorR = srcR;
          b.diskColorG = srcG;
          b.diskColorB = srcB;
        } else {
          const emaT = 0.2;
          b.diskColorR = lerp(b.diskColorR, srcR, emaT);
          b.diskColorG = lerp(b.diskColorG, srcG, emaT);
          b.diskColorB = lerp(b.diskColorB, srcB, emaT);
        }
        if (PARAM.bhAccretionDiskEnabled && addDiskRing) {
          const rings = b.accretionRings || (b.accretionRings = []);
          const gap = Math.max(0.00001, PARAM.bhAccretionDiskRingGap);
          let maxOffset = gap;
          for (let i = 0; i < rings.length; i += 1) {
            const off = rings[i].off == null ? gap : rings[i].off;
            if (off > maxOffset) maxOffset = off;
          }
          rings.push({
            r: srcR,
            g: srcG,
            bl: srcB,
            off: maxOffset + gap
          });
          const maxRings = Math.max(24, Math.floor(PARAM.bhAccretionDiskMaxRings));
          while (rings.length > maxRings) rings.shift();
        }
      }

      function stripParticleMassIntoBlackHole(b, p, d, dtMs) {
        if (!PARAM.bhTidalStripEnabled) return false;
        const inner = Math.max(0.0001, b.Rabs || 0);
        const outer = Math.max(inner + 0.0001, inner * Math.max(1.01, PARAM.bhTidalStripRangeScale));
        if (d <= inner || d >= outer) return false;
        const massNow = Math.max(0.0001, Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r));
        const dtSec = Math.max(0, dtMs) * 0.001;
        const u = 1 - ((d - inner) / Math.max(0.0001, outer - inner));
        const stripRate = Math.max(0, PARAM.bhTidalStripRatePerSec) * u * u;
        let dm = massNow * (1 - Math.exp(-stripRate * dtSec));
        const fracCap = clamp(PARAM.bhTidalStripMaxFractionPerFrame, 0, 1);
        dm = Math.min(dm, massNow * fracCap);
        if (dm <= 0.000001) return false;
        p.capturedByBh = false;
        transferMassToAccretionDisk(b, p, dm, massNow, true);
        const nextMass = Math.max(0.0001, massNow - dm);
        p.mass = nextMass;
        p.r = Math.max(0.2, particleRadiusFromMass(nextMass));
        p.stellarClass = stageFromParticleState(p);
        return nextMass <= 0.00011;
      }

      function lockCapturedParticleToNearestBh(p) {
        if (!p || !p.capturedByBh || !bhEnabled || blackHoles.length === 0) {
          if (p) p.capturedByBh = false;
          return;
        }
        let best = null;
        let bestDx = 0;
        let bestDy = 0;
        let bestD2 = Infinity;
        for (let i = 0; i < blackHoles.length; i += 1) {
          const b = blackHoles[i];
          const dx = shortestWrappedDelta(b.x, p.x, w);
          const dy = shortestWrappedDelta(b.y, p.y, h);
          const d2 = dx * dx + dy * dy;
          if (d2 < bestD2) {
            best = b;
            bestDx = dx;
            bestDy = dy;
            bestD2 = d2;
          }
        }
        if (!best) {
          p.capturedByBh = false;
          return;
        }
        const d = Math.sqrt(Math.max(1e-9, bestD2));
        const nx = bestDx / d;
        const ny = bestDy / d;
        const targetVx = (best.vx || 0) + nx * Math.max(0, PARAM.bhCapturedInwardPull);
        const targetVy = (best.vy || 0) + ny * Math.max(0, PARAM.bhCapturedInwardPull);
        const dragT = clamp(PARAM.bhCapturedDrag, 0, 1);
        p.vx = lerp(p.vx || 0, targetVx, dragT);
        p.vy = lerp(p.vy || 0, targetVy, dragT);
      }

      function removeParticleAt(index) {
        const last = particles.length - 1;
        if (index < 0 || index > last) return;
        if (index !== last) particles[index] = particles[last];
        particles.pop();
      }

      function markSinglePinkStar() {
        if (particles.length === 0) return;
        for (let i = 0; i < particles.length; i += 1) {
          particles[i].isEarth = false;
          particles[i].capturedByBh = false;
        }
        const p = particles[0];
        setParticleColor(p, '0,255,0');
        p.stellarClass = 'main';
        p.evoStage = 'main';
        p.evoAgeSec = 0;
        p.r = Math.max(p.r, 1.8);
        p.displayR = p.r;
        p.mass = particleMassFromRadius(p.r);
        p.life = 1;
        p.isEarth = true;
        p.capturedByBh = false;
      }

      function randomVelReturn() {
        const lo = Math.min(PARAM.bbFrictionMin, PARAM.bbFrictionMax);
        const hi = Math.max(PARAM.bbFrictionMin, PARAM.bbFrictionMax);
        return lo + Math.random() * (hi - lo);
      }

      function randomInRange(minV, maxV) {
        const lo = Math.min(minV, maxV);
        const hi = Math.max(minV, maxV);
        return lo + Math.random() * (hi - lo);
      }

      function sampleRadiusPowerLaw(minR, maxR, exponent) {
        const lo = Math.max(0.05, Math.min(minR, maxR));
        const hi = Math.max(lo + 1e-9, Math.max(minR, maxR));
        const p = Number.isFinite(exponent) ? exponent : 0;
        const u = Math.random();
        if (Math.abs(p - 1) < 1e-6) {
          // p=1: log-uniform
          return lo * Math.pow(hi / lo, u);
        }
        const a = 1 - p;
        const loA = Math.pow(lo, a);
        const hiA = Math.pow(hi, a);
        return Math.pow(loA + (hiA - loA) * u, 1 / a);
      }

      function sampleRadiusExponential(minR, maxR, scale) {
        const lo = Math.max(0.05, Math.min(minR, maxR));
        const hi = Math.max(lo + 1e-9, Math.max(minR, maxR));
        const s = Math.max(1e-6, Number.isFinite(scale) ? scale : 1.0);
        const span = hi - lo;
        const cap = 1 - Math.exp(-span / s);
        const u = Math.random();
        return lo - s * Math.log(1 - u * cap);
      }

      function sampleRadiusForLuminosityClass(lc) {
        if (lc === 'I') return randomInRange(9.2, 10.2);
        if (lc === 'II') return randomInRange(7.2, 8.8);
        if (lc === 'III') return randomInRange(5.2, 6.8);
        if (lc === 'IV') return randomInRange(4.25, 4.95);
        // V: internally scaled distribution (small stars dominate).
        const lo = 1.2;
        const hi = 2.4;
        const bins = 4;
        const step = Math.max(1.0, PARAM.vRadiusScaleStep || 1.0);
        const weights = [];
        let wSum = 0;
        for (let i = 0; i < bins; i += 1) {
          const w = Math.pow(step, -i);
          weights.push(w);
          wSum += w;
        }
        let u = Math.random() * wSum;
        let bi = 0;
        for (; bi < bins; bi += 1) {
          u -= weights[bi];
          if (u <= 0) break;
        }
        const idx = clamp(bi, 0, bins - 1);
        const bw = (hi - lo) / bins;
        const b0 = lo + bw * idx;
        const b1 = b0 + bw;
        return randomInRange(b0, b1);
      }

      function sampleInitialTempForLuminosityClass(lc, radiusR) {
        const u = Math.random();
        const r = Math.max(0, Number.isFinite(radiusR) ? radiusR : 0);
        let rn = 0;
        if (lc === 'I') rn = clamp((r - 9.2) / Math.max(0.1, 10.2 - 9.2), 0, 1);
        else if (lc === 'II') rn = clamp((r - 7.2) / Math.max(0.1, 8.8 - 7.2), 0, 1);
        else if (lc === 'III') rn = clamp((r - 5.2) / Math.max(0.1, 6.8 - 5.2), 0, 1);
        else if (lc === 'IV') rn = clamp((r - 4.25) / Math.max(0.1, 4.95 - 4.25), 0, 1);
        else if (lc === 'V') rn = clamp((r - 1.2) / Math.max(0.1, 2.4 - 1.2), 0, 1);
        if (lc === 'I') {
          // Broad spread: mostly warm giants with some hotter/yellow-white tail.
          const base = (u < 0.58) ? randomInRange(2900, 5400) : randomInRange(5400, 13000);
          return base + Math.pow(rn, 1.2) * 3200;
        }
        if (lc === 'II') {
          const base = (u < 0.68) ? randomInRange(2800, 5200) : randomInRange(5200, 10500);
          return base + Math.pow(rn, 1.15) * 2300;
        }
        if (lc === 'III') {
          const base = (u < 0.78) ? randomInRange(2700, 5000) : randomInRange(5000, 9000);
          return base + Math.pow(rn, 1.1) * 1700;
        }
        if (lc === 'IV') {
          const base = (u < 0.62) ? randomInRange(3400, 6500) : randomInRange(6500, 11200);
          return base + Math.pow(rn, 1.05) * 900;
        }
        if (lc === 'V') {
          // Main sequence: mostly cool-to-solar, with a visible hot tail.
          const base = (u < 0.80) ? randomInRange(2600, 6500) : randomInRange(6500, 15000);
          return base + Math.pow(rn, 1.1) * 700;
        }
        return null;
      }

      function buildPreBbLuminosityPlan(target) {
        const t = Math.max(0, Math.floor(target || 0));
        const quota = { I: 0, II: 0, III: 0, IV: 0, V: 0 };
        if (t <= 0) return [];
        // Fixed geometric seed from class I: I=1, II=3, III=9. Remainder goes to V.
        quota.I = Math.min(1, t);
        quota.II = (t >= 4) ? 3 : Math.max(0, t - quota.I);
        quota.III = (t >= 13) ? 9 : Math.max(0, t - quota.I - quota.II);
        quota.IV = 0;
        const used = quota.I + quota.II + quota.III;
        quota.V = Math.max(0, t - used);
        const plan = [];
        for (let i = 0; i < quota.I; i += 1) plan.push('I');
        for (let i = 0; i < quota.II; i += 1) plan.push('II');
        for (let i = 0; i < quota.III; i += 1) plan.push('III');
        for (let i = 0; i < quota.IV; i += 1) plan.push('IV');
        for (let i = 0; i < quota.V; i += 1) plan.push('V');
        for (let i = plan.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const tmp = plan[i];
          plan[i] = plan[j];
          plan[j] = tmp;
        }
        return plan;
      }

      function randomParticleRadius() {
        if (PARAM.preBbInitRadiusExpEnabled) {
          return sampleRadiusExponential(
            PARAM.particleRadiusMin,
            Math.max(PARAM.particleRadiusMin, PARAM.preBbInitRadiusMax || PARAM.particleRadiusMax),
            PARAM.preBbInitRadiusExpScale
          );
        }
        if (PARAM.preBbInitRadiusPowerLawEnabled) {
          return sampleRadiusPowerLaw(
            PARAM.particleRadiusMin,
            PARAM.particleRadiusMax,
            PARAM.preBbInitRadiusPowerLawExponent
          );
        }
        const uRaw = Math.random();
        const skewPow = Math.max(0.2, PARAM.particleInitRadiusSkewPower || 1);
        const uSkew = Math.pow(uRaw, skewPow); // >1 biases toward smaller radii.
        const mix = clamp(PARAM.particleInitRadiusSkewMix || 0, 0, 1);
        const u = lerp(uRaw, uSkew, mix);
        return lerp(PARAM.particleRadiusMin, PARAM.particleRadiusMax, u);
      }

      function randomBigBangParticleRadius() {
        const lo = Math.max(0.2, Math.min(PARAM.bbRadiusMin, PARAM.bbRadiusMax));
        // BB mode: generate minimum-size stars only.
        return lo;
      }

      function randomInitialHeat() {
        if (Math.random() >= PARAM.initialHotStarChance) return 0;
        return randomInRange(PARAM.initialHotStarHeatMin, PARAM.initialHotStarHeatMax);
      }

      function buildCompensationParticle() {
        const rLo = Math.max(0.25, Math.min(PARAM.bbRadiusMin, PARAM.bbRadiusMax));
        const r = rLo;
        const baseMass = particleMassFromRadius(r);
        const mmMin = Math.max(1, PARAM.bbCompMassMulMin || 1);
        const mmMax = Math.max(mmMin, PARAM.bbCompMassMulMax || 10);
        const mmPow = Math.max(0.05, PARAM.bbCompMassMulPow || 2.0);
        const mmU = Math.pow(Math.random(), mmPow); // biased toward lower multipliers
        const massMul = mmMin + (mmMax - mmMin) * mmU;
        const tempK = clamp(
          (Number.isFinite(lastFrameMeanTempK) ? lastFrameMeanTempK : PARAM.bbCleanTempCenterK),
          PARAM.tempMinK,
          PARAM.tempMaxK
        );
        const baseVx = (Math.random() * 0.42 + 0.12) * (Math.random() > 0.5 ? 1 : -1);
        const baseVy = (Math.random() * 0.2 - 0.1);
        let x = Math.random() * Math.max(1, w);
        let y = Math.random() * Math.max(1, h);
        for (let i = 0; i < 4 && isInsideClockSpawnBlockArea(x, y); i += 1) {
          x = Math.random() * Math.max(1, w);
          y = Math.random() * Math.max(1, h);
        }
        const p = {
          x,
          y,
          vx: baseVx + currentFlowX,
          vy: baseVy + currentFlowY,
          baseVx: baseVx + currentFlowX,
          baseVy: baseVy + currentFlowY,
          launchVxTarget: 0,
          launchVyTarget: 0,
          launchTime: -1,
          r,
          displayR: r,
          mass: baseMass * massMul,
          collisionCount: 0,
          flash: 0,
          heat: randomInitialHeat(),
          life: Math.random() * 0.7 + 0.3,
          stellarClass: 'main',
          evoStage: 'main',
          evoAgeSec: 0,
          tempK,
          color: '255,255,255',
          cr: 255,
          cg: 255,
          cb: 255,
          isEarth: false,
          capturedByBh: false
        };
        p.lumClass = null;
        assignInitialEvolutionState(p, 'bb');
        syncParticleColorFromTemperature(p);
        return p;
      }

      function sampleStellarClass() {
        const ms = clamp(PARAM.stellarMainProb, 0, 1);
        const gi = clamp(PARAM.stellarGiantProb, 0, 1);
        const wd = clamp(PARAM.stellarDwarfProb, 0, 1);
        const total = Math.max(1e-9, ms + gi + wd);
        const x = Math.random() * total;
        if (x < ms) return 'main';
        if (x < ms + gi) return 'giant';
        return 'dwarf';
      }

      function sampleStellarClassForBigBang() {
        const ms = clamp(PARAM.stellarMainProb, 0, 1);
        const gi = clamp(PARAM.stellarGiantProb * Math.max(0, PARAM.bbGiantProbScale), 0, 1);
        const wd = clamp(PARAM.stellarDwarfProb * Math.max(0, PARAM.bbDwarfProbScale), 0, 1);
        const total = Math.max(1e-9, ms + gi + wd);
        const x = Math.random() * total;
        if (x < ms) return 'main';
        if (x < ms + gi) return 'giant';
        return 'dwarf';
      }

      function bigBangClassRadiusScale(stellarClass) {
        const raw = stellarClassRadiusScale(stellarClass);
        const mix = clamp(PARAM.bbClassRadiusScaleMix, 0, 1);
        return lerp(1, raw, mix);
      }

      function stellarClassRadiusScale(stellarClass) {
        if (stellarClass === 'giant') return Math.max(1, PARAM.stellarGiantRadiusScale);
        if (stellarClass === 'dwarf') return clamp(PARAM.stellarDwarfRadiusScale, 0.2, 1);
        return 1;
      }

      function stellarClassTempScale(stellarClass) {
        if (stellarClass === 'giant') return clamp(PARAM.stellarGiantTempScale, 0.4, 1.5);
        if (stellarClass === 'dwarf') return clamp(PARAM.stellarDwarfTempScale, 0.4, 2.0);
        return 1;
      }

      function stellarClassAlphaScale(stellarClass) {
        if (stellarClass === 'giant') return Math.max(0.4, PARAM.stellarGiantAlphaScale);
        if (stellarClass === 'dwarf') return Math.max(0.2, PARAM.stellarDwarfAlphaScale);
        if (stellarClass === 'neutron') return 1.15;
        return 1;
      }

      function normalizedMassFromRadiusOrMass(r, massOverride) {
        const mMin = particleMassFromRadius(PARAM.particleRadiusMin);
        const mMax = particleMassFromRadius(PARAM.particleRadiusMax);
        const m = Math.max(
          0.0001,
          Number.isFinite(massOverride) ? massOverride : particleMassFromRadius(Math.max(0.2, r))
        );
        return clamp((m - mMin) / Math.max(1e-9, mMax - mMin), 0, 1);
      }

      function hrTemperatureTargetK(r, stellarClass = 'main', massOverride) {
        const mn = normalizedMassFromRadiusOrMass(r, massOverride);
        if (stellarClass === 'giant') {
          const t = Math.pow(mn, 0.36);
          return clamp(lerp(2600, 6200, t), PARAM.tempMinK, PARAM.tempMaxK);
        }
        if (stellarClass === 'dwarf') {
          const t = Math.pow(mn, 0.42);
          return clamp(lerp(7000, 13000, t), PARAM.tempMinK, PARAM.tempMaxK);
        }
        const t = Math.pow(mn, Math.max(0.2, PARAM.hrMainTempSkew || 1.35));
        return clamp(lerp(4500, 12000, t), PARAM.tempMinK, PARAM.tempMaxK);
      }

      function hrLuminosityAlphaScale(r, tempK) {
        const rRef = Math.max(0.2, PARAM.hrReferenceRadius || 2.0);
        const tRef = Math.max(1, PARAM.hrReferenceTempK || 5772);
        const lRel = Math.pow(Math.max(0.1, r) / rRef, 2) * Math.pow(Math.max(1, tempK) / tRef, 4);
        const g = Math.max(0.05, PARAM.hrLuminosityGamma || 0.2);
        const base = clamp(PARAM.hrLuminosityBase || 0, 0, 2);
        const scale = Math.max(0, PARAM.hrLuminosityScale || 0);
        let alpha = base + Math.pow(Math.max(1e-9, lRel), g) * scale;
        if (tempK >= 8500) {
          // Rare blue stars stay visually present even with reduced population.
          alpha *= 1.12;
        } else if (tempK < 4300) {
          // Keep a tiny floor boost only; avoid flattening size-dependent brightness.
          alpha *= 1.03;
        }
        return clamp(alpha, 0.1, 3.5);
      }

      function particleHasRenderableGlow(p) {
        if (!p) return false;
        const rNow = Math.max(
          0.2,
          Number.isFinite(p.displayR)
            ? p.displayR
            : (Number.isFinite(p.r) ? p.r : 0.2)
        );
        const lifeNow = clamp(
          Number.isFinite(p.life) ? p.life : PARAM.lifeMin,
          PARAM.lifeMin,
          PARAM.lifeMax
        );
        const heat = clamp(p.heat || 0, 0, 1);
        const renderTempK = clamp(
          (Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK) + (heat * PARAM.tempRenderBoostPerHeatK),
          PARAM.tempMinK,
          PARAM.tempMaxK
        );
        const tempNorm = clamp(renderTempK / Math.max(1, PARAM.tempMaxK), 0, 1);
        const tempLum = lerp(
          clamp(PARAM.tempBrightnessMin, 0, 1),
          1,
          Math.pow(tempNorm, Math.max(0.1, PARAM.tempBrightnessGamma))
        );
        let alpha = 1.02 * lifeNow + 0.07;
        alpha *= tempLum;
        alpha *= hrLuminosityAlphaScale(rNow, renderTempK);
        alpha *= stellarClassAlphaScale(p.stellarClass || 'main');
        alpha *= Math.max(0, PARAM.globalStarBrightnessMul || 1);
        alpha = clamp(alpha, 0.04, 2.4);
        const glowAlphaT = clamp(
          (alpha - PARAM.starGlowAlphaStart) / Math.max(0.0001, PARAM.starGlowAlphaEnd - PARAM.starGlowAlphaStart),
          0,
          1
        );
        const glowTempT = clamp(
          (renderTempK - PARAM.starGlowTempStartK) / Math.max(1, PARAM.starGlowTempEndK - PARAM.starGlowTempStartK),
          0,
          1
        );
        const glowStrength = Math.pow(glowAlphaT, 1.2) * (0.35 + 0.65 * glowTempT);
        const priorityGlow = rNow >= Math.max(0.5, PARAM.largeStarGlowPriorityRadius || 6.0);
        const glowStrengthEff = priorityGlow
          ? Math.max(glowStrength, Math.max(0, PARAM.largeStarGlowMinStrength || 0))
          : glowStrength;
        return glowStrengthEff >= Math.max(0, PARAM.starGlowStrengthMin || 0);
      }

      function classifyStellarClassFromState(r, tempK) {
        if (r > 5) return 'giant';
        if (r <= PARAM.particleRadiusMin * 0.8 && tempK >= 7800) return 'dwarf';
        return 'main';
      }

      function spectralDisplayClass(p) {
        if (!p) return 'M';
        if (p.isEarth) return 'Earth';
        const stage = stageFromParticleState(p);
        const tempK = Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK;
        if (stage === 'giant') return 'RG';
        if (stage === 'dwarf') return 'WD';
        if (tempK >= 8500) return 'B';
        if (tempK >= 5200) return 'G';
        return 'M';
      }

      function spectralTypeFromTemp(tempK) {
        const t = Number.isFinite(tempK) ? tempK : PARAM.tempMinK;
        // Harvard OBAFGKM classes by effective temperature.
        if (t >= 30000) return 'O';
        if (t >= 10000) return 'B';
        if (t >= 7500) return 'A';
        if (t >= 6000) return 'F';
        if (t >= 5200) return 'G';
        if (t >= 3700) return 'K';
        return 'M';
      }

      function luminosityClassFromParticle(p) {
        if (!p) return 'V';
        if (p.isEarth) return 'Earth';
        if (p.lumClass === 'IV') return 'IV';
        const stage = stageFromParticleState(p);
        if (stage === 'supernova') return 'SN';
        if (stage === 'neutron') return 'NS';
        const r = Math.max(0.1, Number.isFinite(p.r) ? p.r : 0.1);
        if (stage === 'giant') {
          const h = Math.max(0, PARAM.lumClassHysteresisR || 0);
          const prev = p.lumClass;
          let lc = 'III';
          if (prev === 'I') {
            lc = (r >= (9.0 - h)) ? 'I' : (r >= 7.0 ? 'II' : 'III');
          } else if (prev === 'II') {
            lc = (r >= (9.0 + h)) ? 'I' : (r >= (7.0 - h) ? 'II' : 'III');
          } else if (prev === 'III') {
            lc = (r >= (9.0 + h)) ? 'I' : (r >= (7.0 + h) ? 'II' : 'III');
          } else {
            lc = (r >= 9.0) ? 'I' : (r >= 7.0 ? 'II' : 'III');
          }
          p.lumClass = lc;
          return lc;
        }
        p.lumClass = null;
        if (r >= 4.2) return 'IV';
        return 'V';
      }

      function spectralLuminosityLabel(p) {
        if (!p) return '-';
        if (p.isEarth) return 'Earth';
        const lum = luminosityClassFromParticle(p);
        if (lum === 'SN') return 'SN';
        if (lum === 'NS') return 'NS';
        if (lum === 'WD') return 'WD';
        const sp = spectralTypeFromTemp(Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK);
        return sp + ' ' + lum;
      }

      function coolingHalfLifeMultiplierForLumClass(lc) {
        if (lc === 'I') return Math.max(0.05, PARAM.tempHalfLifeMulI || 0.55);
        if (lc === 'II') return Math.max(0.05, PARAM.tempHalfLifeMulII || 0.7);
        if (lc === 'III') return Math.max(0.05, PARAM.tempHalfLifeMulIII || 0.9);
        if (lc === 'IV') return Math.max(0.05, PARAM.tempHalfLifeMulIV || 1.05);
        if (lc === 'WD') return Math.max(0.05, PARAM.tempHalfLifeMulWD || 9.5);
        if (lc === 'NS') return Math.max(0.05, PARAM.tempHalfLifeMulNS || 4.5);
        return Math.max(0.05, PARAM.tempHalfLifeMulV || 1.2);
      }

      function formatAgeShort(sec) {
        const s = Math.max(0, Number.isFinite(sec) ? sec : 0);
        if (s < 60) return Math.round(s) + 's';
        if (s < 3600) return (s / 60).toFixed(1) + 'm';
        return (s / 3600).toFixed(2) + 'h';
      }

      function triggerSupernovaCollapse(p) {
        if (!p) return false;
        const massNow = Math.max(0.0001, Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r));
        const repulseBoost = Math.max(0.5, PARAM.evoSupernovaRepulseBoost || 2.1);
        emitCollapseRepulse(p.x, p.y, repulseBoost);
        if (massNow >= Math.max(0.0001, PARAM.evoBlackHoleFromSnMassMin || 18.0)) {
          if (!spawnBlackHoleFromParticle(p, massNow, Math.max(0, Math.floor(PARAM.collapseNoAbsorbFrames)))) {
            return false;
          }
          const b = blackHoles[blackHoles.length - 1];
          if (b) {
            b.tempK = clamp(Math.max(Number.isFinite(b.tempK) ? b.tempK : 0, PARAM.tempMaxK * 0.85), PARAM.tempMinK, PARAM.tempMaxK);
          }
          return true;
        }
        // Otherwise leave a neutron star remnant.
        p.evoStage = 'neutron';
        p.stellarClass = 'neutron';
        p.evoAgeSec = 0;
        p.r = Math.max(0.2, PARAM.evoNeutronRadius || 0.42);
        p.tempK = clamp(
          Math.max(Number.isFinite(p.tempK) ? p.tempK : 0, PARAM.evoNeutronTempInitK || 12000),
          PARAM.tempMinK,
          PARAM.tempMaxK
        );
        const kick = Math.max(0, PARAM.evoNeutronKickSpeed || 0);
        if (kick > 0) {
          const ang = Math.random() * Math.PI * 2;
          p.vx += Math.cos(ang) * kick;
          p.vy += Math.sin(ang) * kick;
        }
        return false;
      }

      function stageFromParticleState(p) {
        if (!p) return 'main';
        if (
          p.evoStage === 'main' ||
          p.evoStage === 'giant' ||
          p.evoStage === 'neutron' ||
          p.evoStage === 'supernova'
        ) return p.evoStage;
        const cls = p.stellarClass || 'main';
        if (cls === 'giant') return cls;
        return 'main';
      }

      function mainSequenceLifetimeSec(massNow) {
        const mRef = Math.max(0.0001, PARAM.evoMassRef || 4.0);
        const tRef = Math.max(1, PARAM.evoMainLifetimeAtMassRefSec || 240);
        const p = Math.max(0.01, PARAM.evoMainLifetimeMassPower || 2.3);
        const raw = tRef * Math.pow(Math.max(0.0001, massNow) / mRef, -p);
        return clamp(raw, Math.max(1, PARAM.evoMainLifetimeMinSec || 25), Math.max(2, PARAM.evoMainLifetimeMaxSec || 900));
      }

      function giantLifetimeSec(massNow) {
        const mRef = Math.max(0.0001, PARAM.evoMassRef || 4.0);
        const tRef = Math.max(1, PARAM.evoGiantLifetimeAtMassRefSec || 70);
        const p = Math.max(0.01, PARAM.evoGiantLifetimeMassPower || 1.1);
        const raw = tRef * Math.pow(Math.max(0.0001, massNow) / mRef, -p);
        return clamp(raw, Math.max(1, PARAM.evoGiantLifetimeMinSec || 8), Math.max(2, PARAM.evoGiantLifetimeMaxSec || 220));
      }

      function localYouthFactor(x, y) {
        // Cheap spatial pseudo-density proxy: denser regions trend younger/hotter.
        const sx = (x || 0) * 0.0127;
        const sy = (y || 0) * 0.0109;
        const n1 = Math.sin(sx * 1.9 + sy * 1.3 + 1.7);
        const n2 = Math.sin(sx * 3.7 - sy * 2.1 + 4.2);
        const n3 = Math.sin(-sx * 0.9 + sy * 2.9 + 0.6);
        return clamp(0.5 + (n1 * 0.45 + n2 * 0.33 + n3 * 0.22) * 0.5, 0, 1);
      }

      function assignInitialEvolutionState(p, mode = 'initial') {
        if (!p) return;
        const stage = stageFromParticleState(p);
        const m = Math.max(0.0001, Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r));
        const y = localYouthFactor(p.x, p.y);
        const modeYoungMul = mode === 'bb' ? 0.55 : 1.0;
        const modeAgeMul = mode === 'bb' ? 0.45 : 1.0;

        if (stage === 'main') {
          const life = mainSequenceLifetimeSec(m);
          const mn = normalizedMassFromRadiusOrMass(p.r, m);
          const maxFrac = lerp(0.96, 0.38, Math.pow(mn, 0.78));
          const fracRaw = randomInRange(0.01, maxFrac);
          const frac = clamp(fracRaw * lerp(1, 1 - PARAM.evoInitDenseYoungBias, y) * modeAgeMul, 0, 0.98);
          p.evoAgeSec = life * frac;
          p.evoStage = 'main';
          p.stellarClass = 'main';
          if (mode === 'initial' && Math.random() < Math.max(0, PARAM.evoInitVeryHotProb || 0)) {
            p.tempK = clamp(
              randomInRange(PARAM.evoInitVeryHotMinK || 20000, PARAM.evoInitVeryHotMaxK || 32000),
              PARAM.tempMinK,
              PARAM.tempMaxK
            );
            return;
          }
          if (mode !== 'bb') {
            const tEq = equilibriumTemperatureK(p.r, 'main', m);
            const ageFrac = clamp(p.evoAgeSec / Math.max(1e-9, life), 0, 1);
            const tempBias = (y - 0.5) * PARAM.evoInitAgeTempSpreadMain * modeYoungMul - ageFrac * 0.05;
            p.tempK = clamp(tEq * (1 + tempBias + randomInRange(-0.03, 0.03)), PARAM.tempMinK, PARAM.tempMaxK);
          }
          return;
        }

        if (stage === 'giant') {
          const life = giantLifetimeSec(m);
          const frac = clamp(randomInRange(0.1, 0.95) * modeAgeMul, 0, 0.99);
          p.evoAgeSec = life * frac;
          p.evoStage = 'giant';
          p.stellarClass = 'giant';
          if (mode !== 'bb') {
            const tEq = equilibriumTemperatureK(p.r, 'giant', m);
            const tempBias = (y - 0.5) * PARAM.evoInitAgeTempSpreadGiant * modeYoungMul - 0.05;
            p.tempK = clamp(tEq * (1 + tempBias + randomInRange(-0.025, 0.025)), PARAM.tempMinK, PARAM.tempMaxK);
          }
          return;
        }

        if (stage === 'dwarf') {
          // Dwarfs are old remnants in this simplified model.
          p.evoAgeSec = randomInRange(40, 420);
          p.evoStage = 'dwarf';
          p.stellarClass = 'dwarf';
          if (mode !== 'bb') {
            const tEq = equilibriumTemperatureK(p.r, 'dwarf', m);
            const coolBias = -randomInRange(0.0, PARAM.evoInitAgeTempSpreadDwarf);
            p.tempK = clamp(tEq * (1 + coolBias), PARAM.tempMinK, PARAM.tempMaxK);
          }
          return;
        }

        if (stage === 'neutron') {
          p.evoAgeSec = randomInRange(0, 80);
          p.evoStage = 'neutron';
          p.stellarClass = 'neutron';
          if (mode !== 'bb') {
            p.tempK = clamp(
              randomInRange(PARAM.evoNeutronTempFloorK, PARAM.evoNeutronTempInitK),
              PARAM.tempMinK,
              PARAM.tempMaxK
            );
          }
        }
      }

      function evolveParticleStageAndTemperature(p, dtSec) {
        if (!p || !PARAM.stellarEvolutionEnabled || !stellarAgingEnabled) return;
        const dt = Math.max(0, dtSec || 0);
        let stage = stageFromParticleState(p);
        const ageSec = Math.max(0, (p.evoAgeSec || 0) + dt);
        p.evoAgeSec = ageSec;
        const massNow = Math.max(0.0001, Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r));
        const tempNow = Number.isFinite(p.tempK) ? p.tempK : equilibriumTemperatureK(p.r, 'main');

        if (stage === 'main') {
          const lifeMain = mainSequenceLifetimeSec(massNow);
          if (ageSec >= lifeMain) {
            if (massNow >= PARAM.evoSupernovaMassMin) {
              stage = 'supernova';
              p.evoAgeSec = 0;
            } else if (massNow >= PARAM.evoMainToGiantMassMin) {
              stage = 'giant';
              p.evoAgeSec = 0;
            } else {
              stage = 'main';
              p.evoAgeSec = 0;
            }
          } else if (massNow >= PARAM.evoMainToGiantMassMin && ageSec >= Math.max(2, lifeMain * 0.6)) {
            stage = 'giant';
            p.evoAgeSec = 0;
          } else if (massNow <= PARAM.evoMainToDwarfMassMax && tempNow >= PARAM.evoMainToDwarfTempMinK) {
            stage = 'main';
            p.evoAgeSec = 0;
          }
        } else if (stage === 'giant') {
          const lifeGiant = giantLifetimeSec(massNow);
          if (ageSec >= lifeGiant) {
            if (massNow >= PARAM.evoSupernovaMassMin) {
              stage = 'supernova';
            } else {
              stage = 'main';
            }
            p.evoAgeSec = 0;
          } else if (massNow <= PARAM.evoGiantExitMassMin) {
            stage = 'main';
            p.evoAgeSec = 0;
          }
        } else if (stage === 'neutron') {
          // Neutron stars stay compact and very hot, then cool slowly.
          p.r = Math.max(0.2, PARAM.evoNeutronRadius || 0.42);
        } else if (stage === 'supernova') {
          // Keep a short visible supernova phase before remnant collapse.
          // Radius is still mass-driven; visual prominence is handled by temperature/flash.
          p.flash = Math.max(p.flash || 0, 0.8);
        }

        p.evoStage = stage;
        p.stellarClass = stage;
        if (stage !== 'main') {
          p.lumClass = null;
        }

        // Radius is mass-driven only (no class/stage radius jump).
        const coreR = Math.max(0.2, particleRadiusFromMass(massNow));
        const targetR = coreR;
        const rr = 1 - Math.exp(-Math.max(0, PARAM.evoRadiusRelaxPerSec) * dt);
        if (rr > 0) {
          p.r = Math.max(0.2, lerp(Math.max(0.2, p.r || coreR), targetR, rr));
        }

        const eqMain = equilibriumTemperatureK(p.r, 'main', massNow);
        let targetK = eqMain;
        if (stage === 'giant') {
          targetK = equilibriumTemperatureK(p.r, 'giant', massNow);
        } else if (stage === 'neutron') {
          targetK = Math.min(tempNow, Math.max(PARAM.evoNeutronTempFloorK, equilibriumTemperatureK(p.r, 'dwarf', massNow)));
        } else if (stage === 'supernova') {
          targetK = Math.max(tempNow, PARAM.tempMaxK * 0.92);
        }
        const relaxRate = stage === 'neutron'
          ? Math.max(0, PARAM.evoNeutronTempRelaxPerSec || 0.08)
          : stage === 'supernova'
            ? 3.5
            : Math.max(0, PARAM.evoTempRelaxPerSec);
        // Avoid spontaneous heating at rest: non-supernova stages should not
        // increase temperature unless external events already heated the star.
        if (stage !== 'supernova') {
          targetK = Math.min(targetK, tempNow);
        }
        const relax = 1 - Math.exp(-relaxRate * dt);
        if (relax > 0) {
          p.tempK = clamp(lerp(tempNow, targetK, relax), PARAM.tempMinK, PARAM.tempMaxK);
        }
      }

      function kelvinToRgb(tempK) {
        const k = clamp(tempK, PARAM.tempMinK, PARAM.tempMaxK);
        // Harvard O/B/A/F/G/K/M-like ramp mapped by effective temperature.
        const stops = [
          [2400, [255, 56, 56]],    // M (vivid red endpoint)
          [3100, [255, 132, 94]],   // M
          [3800, [255, 176, 122]],  // M
          [3900, [255, 192, 136]],  // K
          [4550, [255, 224, 178]],  // K
          [5200, [255, 236, 206]],  // K/G
          [5600, [255, 243, 224]],  // G
          [6000, [255, 249, 238]],  // G/F
          [6750, [245, 246, 255]],  // F
          [7500, [235, 240, 255]],  // F/A
          [8750, [220, 230, 255]],  // A
          [10000, [205, 220, 255]], // A/B
          [20000, [170, 195, 255]], // B
          [30000, [155, 180, 255]], // B/O
          [40000, [145, 170, 255]], // O
          [50000, [140, 165, 255]]  // O
        ];
        if (k <= stops[0][0]) {
          const c = stops[0][1];
          return { r: c[0], g: c[1], b: c[2] };
        }
        for (let i = 0; i < stops.length - 1; i += 1) {
          const a = stops[i];
          const b = stops[i + 1];
          if (k <= b[0]) {
            const u = (k - a[0]) / Math.max(1e-9, b[0] - a[0]);
            const highT = clamp((k - 8000) / Math.max(1, PARAM.tempMaxK - 8000), 0, 1);
            const pastelMix = PARAM.tempColorPastelMix * (1 - highT * 0.7);
            return {
              r: Math.round(lerp(lerp(a[1][0], b[1][0], u), 255, pastelMix)),
              g: Math.round(lerp(lerp(a[1][1], b[1][1], u), 255, pastelMix)),
              b: Math.round(lerp(lerp(a[1][2], b[1][2], u), 255, pastelMix))
            };
          }
        }
        const c = stops[stops.length - 1][1];
        return { r: c[0], g: c[1], b: c[2] };
      }

      function initialParticleTemperatureK(r, stellarClass = 'main') {
        let k = hrTemperatureTargetK(r, stellarClass);
        if (stellarClass === 'main' && Math.random() < clamp(PARAM.hrMainBlueMinorityProb || 0, 0, 1)) {
          // Keep a small but visible hot-blue minority in a mostly cool population.
          k *= 1 + Math.max(0, PARAM.hrMainBlueMinorityGain || 0.25);
        }
        return clamp(k * randomInRange(0.94, 1.06), PARAM.tempMinK, PARAM.tempMaxK);
      }

      function equilibriumTemperatureK(r, stellarClass = 'main', massOverride) {
        return hrTemperatureTargetK(r, stellarClass, massOverride);
      }

      function syncParticleColorFromTemperature(p) {
        const tempK = (p && Number.isFinite(p.tempK)) ? p.tempK : PARAM.tempMinK;
        const rgb = kelvinToRgb(tempK);
        p.cr = rgb.r;
        p.cg = rgb.g;
        p.cb = rgb.b;
        p.color = p.cr + ',' + p.cg + ',' + p.cb;
      }

      function setParticleColor(p, csv) {
        p.color = csv;
        const s = String(csv || '255,255,255').split(',');
        p.cr = Number(s[0]) || 255;
        p.cg = Number(s[1]) || 255;
        p.cb = Number(s[2]) || 255;
      }

      function particleColorFromRadius(r) {
        if (!PARAM.useRadiusBasedColor) return gradientColor(Math.random());
        const span = Math.max(0.0001, PARAM.particleRadiusMax - PARAM.particleRadiusMin);
        const t = clamp((r - PARAM.particleRadiusMin) / span, 0, 1);
        // Suppress warm/orange population to about one-third while keeping blue spread.
        const warmCut = 0.78;
        const tBlueBoost = t < 0.74 ? t * 0.72 : t;
        const tWarmSuppressed = tBlueBoost < warmCut
          ? tBlueBoost
          : warmCut + (tBlueBoost - warmCut) * 0.11;
        let tone = clamp(0.0 + tWarmSuppressed * 0.82, 0, 1);
        if (Math.random() < PARAM.vividBlueChance) {
          tone *= PARAM.vividBlueToneScale;
        } else if (Math.random() < PARAM.vividRedChance) {
          const redMin = clamp(PARAM.vividRedToneMin, 0, 0.999);
          tone = redMin + Math.random() * (1 - redMin);
        }
        return gradientColor(tone);
      }

      function applyGravityScale(scale) {
        const s = clamp(scale, PARAM.bbGravityScaleMin, PARAM.bbGravityScaleMax);
        const sign = s >= 0 ? 1 : -1;
        const absS = Math.abs(s);
        const over = Math.max(0, absS - 1);
        const strongMag = absS <= 1
          ? absS
          : 1 + Math.pow(over, PARAM.bbGravityCurvePower) * PARAM.bbGravityAmplify;
        const strongScale = strongMag * sign;
        const absMax = Math.max(1, Math.abs(PARAM.bbGravityScaleMin), Math.abs(PARAM.bbGravityScaleMax));
        const strongT = clamp((absS - 1) / Math.max(0.0001, absMax - 1), 0, 1);
        const softeningFactor = lerp(1, PARAM.bbSofteningMinFactor, strongT);
        currentGravityScale = strongScale;
        currentAttractStrength = PARAM.attractStrength * bbMousePullScale * strongScale;
        currentBhGlobalPull = gravityRandBhGlobalPull * bbBhPullScale * strongScale;
        currentBhPullMax = PARAM.bhPullMax * bbBhPullScale * (1 + over * PARAM.bbPullMaxAmplify);
        currentBhPullPerAbsorb = gravityRandBhPullPerAbsorb * strongScale;
        currentPpGravityStrength = PARAM.ppGravityStrength * (strongScale / Math.max(1e-9, PARAM.initialGravityScale));
        currentBhGlobalSoftening = gravityBhSofteningBase * softeningFactor;
      }

      function gravityInputScaleFromEffective(effectiveScale) {
        const sign = effectiveScale >= 0 ? 1 : -1;
        const absStrong = Math.abs(effectiveScale);
        if (absStrong <= 1) {
          return clamp(sign * absStrong, PARAM.bbGravityScaleMin, PARAM.bbGravityScaleMax);
        }
        const amp = Math.max(1e-9, PARAM.bbGravityAmplify);
        const pw = Math.max(1e-9, PARAM.bbGravityCurvePower);
        const over = Math.pow((absStrong - 1) / amp, 1 / pw);
        const absInput = 1 + over;
        return clamp(sign * absInput, PARAM.bbGravityScaleMin, PARAM.bbGravityScaleMax);
      }

      function particleBrightnessEnergy(p) {
        const v2 = (p.vx * p.vx) + (p.vy * p.vy);
        if (v2 <= 0) return 0;
        // Use a sub-quadratic speed metric to avoid BB spikes over-brightening the background.
        return Math.pow(v2, Math.max(0.01, PARAM.bgSpeedPower * 0.5));
      }

      function effectiveLinearDamping(nowMs) {
        const now = (nowMs == null) ? performance.now() : nowMs;
        let mul = 1;
        if (bbPostResBoostStartMs >= 0) {
          const elapsedMs = Math.max(0, now - bbPostResBoostStartMs);
          const halfLifeMs = Math.max(1, (PARAM.bbPostResBoostHalfLifeSec || 60) * 1000);
          const base = Math.max(1, bbPostResBoostRuntimeMultiplier || PARAM.bbPostResBoostMultiplier || 1);
          mul = 1 + (base - 1) * Math.pow(0.5, elapsedMs / halfLifeMs);
        }
        return clamp(currentPpLinearDamping * mul, 0, 0.5);
      }

        const isMobileLike = window.matchMedia('(max-width: 900px), (pointer: coarse)').matches;

      function computeParticleEnergy() {
        let total = 0;
        for (let i = 0; i < particles.length; i += 1) {

          total += particleBrightnessEnergy(p);
        }
        return total;
      }

      function computeAverageTemperature() {
        if (particles.length === 0) return PARAM.tempMinK;
        let sum = 0;
        let count = 0;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          if (!p) continue;
          const tk = Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK;
          sum += tk;
          count += 1;
        }
        if (count <= 0) return PARAM.tempMinK;
        return sum / count;
      }

      function csvEscape(value) {
        const s = String(value == null ? '' : value);
        return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      }

      function downloadStarCsv() {
        const header = [
          'id', 'x', 'y', 'vx', 'vy', 'r', 'mass', 'tempK',
          'stellarClass', 'evoStage', 'lumClass', 'evoAgeSec',
          'isEarth', 'capturedByBh'
        ];
        const lines = [header.join(',')];
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          if (!p) continue;
          const m = Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(Number(p.r) || 0.2);
          lines.push([
            i,
            Number(p.x || 0).toFixed(3),
            Number(p.y || 0).toFixed(3),
            Number(p.vx || 0).toFixed(5),
            Number(p.vy || 0).toFixed(5),
            Number(p.r || 0).toFixed(5),
            Number(m).toFixed(8),
            Number(Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK).toFixed(2),
            p.stellarClass || 'main',
            p.evoStage || '',
            p.lumClass || '',
            Number(Number.isFinite(p.evoAgeSec) ? p.evoAgeSec : 0).toFixed(3),
            p.isEarth ? 1 : 0,
            p.capturedByBh ? 1 : 0
          ].map(csvEscape).join(','));
        }
        const blob = new Blob([lines.join('\r\n')], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const stamp = new Date().toISOString().replace(/[:.]/g, '-');
        a.href = url;
        a.download = 'stars-test-' + stamp + '.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function computeParticleMassTotal() {
        let sum = 0;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          if (!p) continue;
          const m = Math.max(
            0.0001,
            Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r)
          );
          sum += m;
        }
        return sum;
      }

      function computeBlackHoleMassTotal() {
        let sum = 0;
        for (let i = 0; i < blackHoles.length; i += 1) {
          const b = blackHoles[i];
          if (!b) continue;
          sum += Math.max(0.0001, Number.isFinite(b.mass) ? b.mass : 0);
          sum += Math.max(0, Number.isFinite(b.diskMass) ? b.diskMass : 0);
        }
        return sum;
      }

      function syncParticleMassState(updateTarget) {
        currentParticleMassTotal = computeParticleMassTotal();
        if (updateTarget) {
          initialParticleMassTarget = currentParticleMassTotal;
          const targetDiamCm = Math.max(0, PARAM.bhTargetDiameterCmAtTotalMass || 0);
          if (targetDiamCm > 0 && initialParticleMassTarget > 0) {
            const targetDiamPx = (targetDiamCm * 96) / 2.54;
            const targetR = targetDiamPx * 0.5;
            bhR0Dynamic = targetR / Math.max(0.0001, initialParticleMassTarget);
          } else {
            bhR0Dynamic = PARAM.bhR0;
          }
        }
      }

      function maintainEntityCountCompensation() {
        if (!PARAM.entityCountCompensationEnabled) return;
        if (bigBangCount <= 0) return;
        if (!bbMassCompensationActive) return;
        const target = Math.max(0, Math.floor(currentParticleTarget || 0));
        if (target <= 0) return;
        const totalMassAllNow = currentParticleMassTotal + computeBlackHoleMassTotal();
        if (totalMassAllNow >= initialParticleMassTarget) {
          bbMassCompensationActive = false;
          return;
        }
        const present = particles.length + blackHoles.length;
        const deficit = target - present;
        if (deficit <= 0) return;
        const spawnMax = Math.max(1, Math.floor(PARAM.entityCompSpawnMaxPerFrame || target));
        const spawnN = Math.min(deficit, spawnMax);
        for (let i = 0; i < spawnN; i += 1) {
          particles.push(buildCompensationParticle());
        }
        syncParticleMassState(false);
        const totalMassAllAfter = currentParticleMassTotal + computeBlackHoleMassTotal();
        if (totalMassAllAfter >= initialParticleMassTarget) {
          bbMassCompensationActive = false;
        }
      }

      function backgroundLumaFromTemperature(meanTempK) {
        const tNorm = clamp(
          (meanTempK - PARAM.tempMinK) / Math.max(1, PARAM.tempMaxK - PARAM.tempMinK),
          0,
          1
        );
        const boosted = Math.pow(tNorm, 0.72);
        const baseLuma = PARAM.bgLumaMin + (PARAM.bgLumaMax - PARAM.bgLumaMin) * boosted;
        const flashT = clamp((bbWhiteBoost - 1) / Math.max(0.0001, PARAM.bbWhiteBoostStart - 1), 0, 1);
        const flash = Math.pow(flashT, 0.35) * PARAM.bbWhiteFlashMax;
        const luma = baseLuma + flash;
        return Math.round(clamp(luma, PARAM.bgLumaMin, 255));
      }

      function backgroundColorFromTemperature(meanTempK, time) {
        const luma = backgroundLumaFromTemperature(meanTempK);
        const tempRgb = kelvinToRgb(meanTempK);
        const warmT = clamp((7000 - meanTempK) / 7000, 0, 1);
        const coolT = clamp((meanTempK - 7000) / Math.max(1, PARAM.tempMaxK - 7000), 0, 1);
        const warmMix = 0.04 * warmT; // Soften reddish wash at low temperature.
        const coolMix = 0.14 * coolT; // Keep bluish tint visible after BB/high-temp phases.
        const tintMix = warmMix + coolMix;
        if (!PARAM.useCmbBackground) {
          const r0 = clamp(Math.round(lerp(luma, tempRgb.r, tintMix)), 0, 255);
          const g0 = clamp(Math.round(lerp(luma, tempRgb.g, tintMix)), 0, 255);
          const b0 = clamp(Math.round(lerp(luma, tempRgb.b, tintMix)), 0, 255);
          return 'rgb(' + r0 + ',' + g0 + ',' + b0 + ')';
        }

        // Subtle CMB-like fluctuations around the average-temperature tint.
        const fluct = (Math.sin(time * 0.63) + Math.sin(time * 0.27 + 1.7)) * 0.5;
        const d = fluct * PARAM.cmbAnisoAmplitude;
        const r = clamp(Math.round(PARAM.cmbBaseR + luma * 0.72 + tempRgb.r * tintMix + d), 0, 255);
        const g = clamp(Math.round(PARAM.cmbBaseG + luma * 0.72 + tempRgb.g * tintMix), 0, 255);
        const b = clamp(Math.round(PARAM.cmbBaseB + luma * 0.72 + tempRgb.b * tintMix - d), 0, 255);
        return 'rgb(' + r + ',' + g + ',' + b + ')';
      }

      function neutralizeGlobalDriftWhenFlowOff() {
        if (flowModeEnabled || particles.length === 0) return;
        const n = particles.length;
        const periodX = w + 40;
        const periodY = h + 20;
        let sumVx = 0;
        let sumVy = 0;
        let sumX = 0;
        let sumY = 0;
        for (let i = 0; i < n; i += 1) {
          const p = particles[i];
          // Use wrapped [0, period) coordinates to avoid edge discontinuity artifacts.
          const wx = (((p.x + 20) % periodX) + periodX) % periodX;
          const wy = (((p.y + 10) % periodY) + periodY) % periodY;
          sumX += wx;
          sumY += wy;
          sumVx += p.vx || 0;
          sumVy += p.vy || 0;
        }
        const meanX = sumX / n;
        const meanY = sumY / n;
        const meanVx = sumVx / n;
        const meanVy = sumVy / n;

        let covXX = 0;
        let covYY = 0;
        let covXY = 0;
        let covXVx = 0;
        let covYVx = 0;
        let covXVy = 0;
        let covYVy = 0;
        for (let i = 0; i < n; i += 1) {
          const p = particles[i];
          const wx = (((p.x + 20) % periodX) + periodX) % periodX;
          const wy = (((p.y + 10) % periodY) + periodY) % periodY;
          const x = shortestWrappedDelta(wx, meanX, periodX);
          const y = shortestWrappedDelta(wy, meanY, periodY);
          const vx = (p.vx || 0) - meanVx;
          const vy = (p.vy || 0) - meanVy;
          covXX += x * x;
          covYY += y * y;
          covXY += x * y;
          covXVx += x * vx;
          covYVx += y * vx;
          covXVy += x * vy;
          covYVy += y * vy;
        }
        const invN = 1 / Math.max(1, n);
        covXX *= invN;
        covYY *= invN;
        covXY *= invN;
        covXVx *= invN;
        covYVx *= invN;
        covXVy *= invN;
        covYVy *= invN;

        const det = covXX * covYY - covXY * covXY;
        let ax = 0;
        let ay = 0;
        let bx = 0;
        let by = 0;
        if (Math.abs(det) > 1e-9) {
          const inv00 = covYY / det;
          const inv01 = -covXY / det;
          const inv10 = -covXY / det;
          const inv11 = covXX / det;
          ax = inv00 * covXVx + inv01 * covYVx;
          ay = inv10 * covXVx + inv11 * covYVx;
          bx = inv00 * covXVy + inv01 * covYVy;
          by = inv10 * covXVy + inv11 * covYVy;
        }

        // Keep correction gentle to avoid edge sticking under strong local fields.
        const corrGain = 0.35;
        for (let i = 0; i < n; i += 1) {
          const p = particles[i];
          const wx = (((p.x + 20) % periodX) + periodX) % periodX;
          const wy = (((p.y + 10) % periodY) + periodY) % periodY;
          const x = shortestWrappedDelta(wx, meanX, periodX);
          const y = shortestWrappedDelta(wy, meanY, periodY);
          p.vx -= corrGain * (meanVx + ax * x + ay * y);
          p.vy -= corrGain * (meanVy + bx * x + by * y);
        }
      }
