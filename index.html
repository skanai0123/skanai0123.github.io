<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground Gate</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-118J91MG59"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-118J91MG59');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #070F1A;
      --bg-1: #070F1A;
      --line: #1f3857;
      --panel: #0a1d36;
      --panel-2: #102947;
      --text: #eaf1ff;
      --accent: #86c8ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans JP", system-ui, sans-serif;
      color: var(--text);
      background: #070F1A;
    }

    #heroFx {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 0;
      pointer-events: none;
      filter: saturate(1.1);
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(920px, 100% - 40px);
      margin: 34px auto;
      border: 1px solid var(--line);
      background: rgba(5, 18, 38, 0.82);
      box-shadow: 0 20px 42px rgba(0, 0, 0, 0.35);
      padding: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      min-height: 116px;
      display: grid;
      place-items: center;
      border: 1px solid #274a71;
      background: linear-gradient(145deg, var(--panel), var(--panel-2));
      color: var(--text);
      text-decoration: none;
      font-size: clamp(30px, 3.4vw, 42px);
      font-weight: 800;
      letter-spacing: 0.01em;
      text-align: center;
      padding: 10px;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    @media (max-width: 720px) {
      .wrap { width: calc(100% - 24px); margin-top: 20px; padding: 12px; }
      .card { min-height: 100px; font-size: clamp(24px, 9vw, 34px); }
    }
  </style>
</head>
<body>
  <canvas id="heroFx" aria-hidden="true"></canvas>

  <main class="wrap">
    <section class="cards">
      <a class="card" href="https://skanai0123.github.io/llg-playground/">LLG Playground</a>
      <a class="card" href="https://skanai0123.github.io/t2-playground/">T2 Playground</a>
    </section>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById('heroFx');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;
      let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      let w = 0;
      let h = 0;
      let raf = 0;
      let t = 0;
      const mouse = {
        x: 0,
        y: 0,
        active: false
      };

      const particles = [];

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function gradientColor(t) {
        const stops = [
          [170, 191, 255],  // O: blue
          [202, 215, 255],  // B: blue-white
          [248, 247, 255],  // A: white
          [255, 244, 234],  // F/G: warm white
          [255, 210, 161],  // K: orange
          [255, 167, 82]    // M: red-orange
        ];
        const n = stops.length - 1;
        const x = Math.max(0, Math.min(0.9999, t)) * n;
        const i = Math.floor(x);
        const u = x - i;
        const a = stops[i];
        const b = stops[i + 1];
        const r = Math.round(lerp(a[0], b[0], u));
        const g = Math.round(lerp(a[1], b[1], u));
        const bch = Math.round(lerp(a[2], b[2], u));
        return r + ',' + g + ',' + bch;
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        w = Math.max(1, Math.floor(rect.width));
        h = Math.max(1, Math.floor(rect.height));
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const target = 15000;
        particles.length = 0;
        for (let i = 0; i < target; i += 1) {
          const c = gradientColor(Math.random());
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() * 0.55 + 0.18) * (Math.random() > 0.5 ? 1 : -1),
            vy: (Math.random() * 0.24 - 0.12),
            baseVx: (Math.random() * 0.55 + 0.18) * (Math.random() > 0.5 ? 1 : -1),
            baseVy: (Math.random() * 0.24 - 0.12),
            r: Math.random() * 1.8 + 0.6,
            life: Math.random() * 0.7 + 0.3,
            color: c
          });
        }
      }

      function step() {
        t += 0.015;
        ctx.clearRect(0, 0, w, h);
        const attractR = 180;
        const attractR2 = attractR * attractR;

        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          p.vx += (p.baseVx - p.vx) * 0.014;
          p.vy += (p.baseVy - p.vy) * 0.014;

          if (mouse.active) {
            const dx = mouse.x - p.x;
            const dy = mouse.y - p.y;
            const d2 = dx * dx + dy * dy;
            if (d2 > 1 && d2 < attractR2) {
              const d = Math.sqrt(d2);
              const pull = (1 - d / attractR) * 0.06;
              p.vx += (dx / d) * pull;
              p.vy += (dy / d) * pull;
            }
          }

          const sp2 = p.vx * p.vx + p.vy * p.vy;
          const maxSp = 1.45;
          if (sp2 > maxSp * maxSp) {
            const s = maxSp / Math.sqrt(sp2);
            p.vx *= s;
            p.vy *= s;
          }

          const wave = Math.sin((p.x * 0.01) + t) * 0.18;
          p.x += p.vx;
          p.y += p.vy + wave;
          p.life += (Math.random() - 0.5) * 0.03;
          if (p.life < 0.15) p.life = 0.15;
          if (p.life > 1.0) p.life = 1.0;

          if (p.x < -20) p.x = w + 20;
          if (p.x > w + 20) p.x = -20;
          if (p.y < -10) p.y = h + 10;
          if (p.y > h + 10) p.y = -10;

          ctx.fillStyle = 'rgba(' + p.color + ',' + (0.72 * p.life).toFixed(3) + ')';
          ctx.fillRect(p.x, p.y, p.r, p.r);
        }

        raf = requestAnimationFrame(step);
      }

      function init() {
        resize();
        if (raf) cancelAnimationFrame(raf);
        step();
      }

      function explode(x, y) {
        const blastR = 260;
        const blastR2 = blastR * blastR;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const dx = p.x - x;
          const dy = p.y - y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 1 || d2 > blastR2) continue;
          const d = Math.sqrt(d2);
          const u = 1 - (d / blastR);
          const impulse = 5.2 * u;
          p.vx += (dx / d) * impulse;
          p.vy += (dy / d) * impulse;
          p.life = Math.min(1, p.life + 0.2);
        }
      }

      window.addEventListener('pointermove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        mouse.active = true;
      }, { passive: true });

      window.addEventListener('pointerleave', () => {
        mouse.active = false;
      }, { passive: true });

      window.addEventListener('pointerdown', (e) => {
        explode(e.clientX, e.clientY);
      }, { passive: true });

      window.addEventListener('resize', init, { passive: true });
      init();
    })();
  </script>
</body>
</html>
