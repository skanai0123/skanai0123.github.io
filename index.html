      function buildChamferDistance(mask, width, height, targetValue) {
        const dist = new Float32Array(width * height);
        const INF = 1e9;
        const DIAG = 1.41421356237;
        for (let i = 0; i < dist.length; i += 1) {
          dist[i] = mask[i] === targetValue ? 0 : INF;
        }
        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const idx = y * width + x;
            let d = dist[idx];
            if (x > 0) d = Math.min(d, dist[idx - 1] + 1);
            if (y > 0) d = Math.min(d, dist[idx - width] + 1);
            if (x > 0 && y > 0) d = Math.min(d, dist[idx - width - 1] + DIAG);
            if (x + 1 < width && y > 0) d = Math.min(d, dist[idx - width + 1] + DIAG);
            dist[idx] = d;
          }
        }
        for (let y = height - 1; y >= 0; y -= 1) {
          for (let x = width - 1; x >= 0; x -= 1) {
            const idx = y * width + x;
            let d = dist[idx];
            if (x + 1 < width) d = Math.min(d, dist[idx + 1] + 1);
            if (y + 1 < height) d = Math.min(d, dist[idx + width] + 1);
            if (x + 1 < width && y + 1 < height) d = Math.min(d, dist[idx + width + 1] + DIAG);
            if (x > 0 && y + 1 < height) d = Math.min(d, dist[idx + width - 1] + DIAG);
            dist[idx] = d;
          }
        }
        return dist;
      }

      function sampleClockSdf(fx, fy) {
        if (!clockSdfField || clockFieldWidth <= 1 || clockFieldHeight <= 1) return 0;
        const x = clamp(fx, 0, clockFieldWidth - 1);
        const y = clamp(fy, 0, clockFieldHeight - 1);
        const x0 = Math.floor(x);
        const y0 = Math.floor(y);
        const x1 = Math.min(clockFieldWidth - 1, x0 + 1);
        const y1 = Math.min(clockFieldHeight - 1, y0 + 1);
        const tx = x - x0;
        const ty = y - y0;
        const i00 = y0 * clockFieldWidth + x0;
        const i10 = y0 * clockFieldWidth + x1;
        const i01 = y1 * clockFieldWidth + x0;
        const i11 = y1 * clockFieldWidth + x1;
        const a = lerp(clockSdfField[i00], clockSdfField[i10], tx);
        const b = lerp(clockSdfField[i01], clockSdfField[i11], tx);
        return lerp(a, b, ty);
      }

      function sampleClockDateMask(fx, fy) {
        if (!clockDateMaskField || clockFieldWidth <= 1 || clockFieldHeight <= 1) return 0;
        const x = clamp(fx, 0, clockFieldWidth - 1);
        const y = clamp(fy, 0, clockFieldHeight - 1);
        const x0 = Math.floor(x);
        const y0 = Math.floor(y);
        const x1 = Math.min(clockFieldWidth - 1, x0 + 1);
        const y1 = Math.min(clockFieldHeight - 1, y0 + 1);
        const tx = x - x0;
        const ty = y - y0;
        const i00 = y0 * clockFieldWidth + x0;
        const i10 = y0 * clockFieldWidth + x1;
        const i01 = y1 * clockFieldWidth + x0;
        const i11 = y1 * clockFieldWidth + x1;
        const a = lerp(clockDateMaskField[i00], clockDateMaskField[i10], tx);
        const b = lerp(clockDateMaskField[i01], clockDateMaskField[i11], tx);
        return lerp(a, b, ty);
      }

      function rebuildClockGravityField(force) {
        if (!clockGravityCtx) return;
        if (!clockStarModeEnabled) {
          clearClockGravityField();
          return;
        }
        const signature =
          wallClockTimeText + '|' +
          Math.round(w) + 'x' + Math.round(h);
        if (!force && signature === clockGravityFieldSignature) return;
        clockGravityFieldSignature = signature;

        const scale = clamp(PARAM.clockGravityRenderScale, 0.1, 0.5);
        const rw = Math.max(64, Math.floor(w * scale));
        const rh = Math.max(64, Math.floor(h * scale));
        clockFieldScale = scale;
        clockFieldWidth = rw;
        clockFieldHeight = rh;
        clockGravityCanvas.width = rw;
        clockGravityCanvas.height = rh;
        clockGravityCtx.clearRect(0, 0, rw, rh);
        clockGravityCtx.textAlign = 'center';
        clockGravityCtx.textBaseline = 'middle';
        clockGravityCtx.fillStyle = '#fff';
        const timeFontPx = clamp(rw * 0.18, 28, 96);
        const cx = rw * 0.5;
        const cy = rh * 0.45;
        clockGravityCtx.font = '600 ' + timeFontPx.toFixed(1) + 'px "Noto Sans JP", sans-serif';
        clockGravityCtx.fillText(wallClockTimeText, cx, cy);

        const image = clockGravityCtx.getImageData(0, 0, rw, rh);
        const data = image.data;
        const mask = new Uint8Array(rw * rh);
        for (let i = 0; i < mask.length; i += 1) {
          mask[i] = data[(i * 4) + 3] >= 100 ? 1 : 0;
        }
        const distToInk = buildChamferDistance(mask, rw, rh, 1);
        const distToBg = buildChamferDistance(mask, rw, rh, 0);
        const sdf = new Float32Array(rw * rh);
        for (let i = 0; i < sdf.length; i += 1) {
          sdf[i] = distToInk[i] - distToBg[i];
        }
        clockSdfField = sdf;
        clockDateMaskField = null;
      }

      function applyClockGravity(p) {
        if (!clockStarModeEnabled) return;
        if (!clockSdfField || clockFieldWidth <= 1 || clockFieldHeight <= 1) return;
        const fx = p.x * clockFieldScale;
        const fy = p.y * clockFieldScale;
        const range = Math.max(8, PARAM.clockGravityRange);
        const dWorld = sampleClockSdf(fx, fy) / Math.max(0.0001, clockFieldScale);

        if (dWorld > 0 && dWorld < range) {
          const gx = sampleClockSdf(fx + 1, fy) - sampleClockSdf(fx - 1, fy);
          const gy = sampleClockSdf(fx, fy + 1) - sampleClockSdf(fx, fy - 1);
          const gn = Math.sqrt(gx * gx + gy * gy);
          if (gn > 0.000001) {
            const u = 1 - (dWorld / range);
            const pull = PARAM.clockGravityStrength * u;
            p.vx += (-gx / gn) * pull;
            p.vy += (-gy / gn) * pull;
          }
        }

        const edgeBand = Math.max(6, range * 0.35);
        const edgeProx = clamp(1 - (Math.abs(dWorld) / edgeBand), 0, 1);
        const insideMask = dWorld < 0 ? 1 : 0;
        if (edgeProx > 0 || insideMask > 0) {
          const regionProx = Math.max(insideMask, edgeProx);
          const dateMix = sampleClockDateMask(fx, fy);
          const dateResistance = lerp(1, PARAM.clockDateResistanceFactor, clamp(dateMix, 0, 1));
          const localDrag = PARAM.clockStickyDragNear * regionProx * dateResistance;
          const damp = clamp(1 - localDrag, 0.02, 1);
          p.vx *= damp;
          p.vy *= damp;
        }

        // Stronger flow inside the clock glyph area only.
        if (insideMask > 0) {
          const insideDepth = clamp((-dWorld) / Math.max(8, range), 0, 1);
          const v2 = p.vx * p.vx + p.vy * p.vy;
          if (v2 > 1e-8) {
            const invV = 1 / Math.sqrt(v2);
            const dateMix = sampleClockDateMask(fx, fy);
            const turbulenceFactor = lerp(1, PARAM.clockDateTurbulenceFactor, clamp(dateMix, 0, 1));
            const boost = PARAM.clockInsideFlowBoost * turbulenceFactor * (0.35 + insideDepth * 0.65);
            p.vx += (p.vx * invV) * boost;
            p.vy += (p.vy * invV) * boost;
          }
        }
      }

      function drawCleanHint(nowMs) {
        if (nowMs >= cleanHintUntilMs) return;
        const total = Math.max(1, PARAM.cleanHintShowMs);
        const fadeIn = clamp(PARAM.cleanHintFadeInMs, 0, total);
        const fadeOut = Math.max(700, Math.min(1600, total - fadeIn));
        const elapsed = clamp(nowMs - cleanHintStartMs, 0, total);
        const remain = total - elapsed;
        let alpha = 1;
        if (fadeIn > 0 && elapsed < fadeIn) {
          alpha = elapsed / fadeIn;
        } else if (remain < fadeOut) {
          alpha = remain / fadeOut;
        }
        alpha = clamp(alpha, 0, 1);
        const msg = PARAM.cleanHintText;
        const fontSize = Math.max(16, Math.round(Math.min(w, h) * 0.045));
        ctx.save();
        ctx.font = '700 ' + fontSize + 'px "Noto Sans JP", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(255,255,255,' + (0.85 * alpha).toFixed(3) + ')';
        ctx.fillText(msg, w * 0.5, h * 0.5);
        ctx.restore();
      }

      function triggerBigBang(cx, cy, source) {
        const src = source || 'unknown';
        const cleanMode = !!PARAM.bbCleanModeEnabled;
        bbCleanRuntimeActive = cleanMode;
        bigBangCount += 1;
        const isFirstBigBang = bigBangCount === 1;
        if (typeof gtag === 'function') {
          gtag('event', 'big_bang', {
            event_category: 'simulation',
            source: src,
            particles_before: particles.length,
            black_holes_before: blackHoles.length
          });
        }

        blackHoles.length = 0;
        bhSpawnCooldown = PARAM.spawnCooldownFrames;
        bhCreationLockFrames = cleanMode
          ? Math.max(PARAM.bbNoBhLockFrames, Math.floor(PARAM.bbCleanCollisionLockFrames))
          : PARAM.bbNoBhLockFrames;
        particles.length = 0;
        mergeFadeEffects.length = 0;
        bbWhiteBoost = Math.max(bbWhiteBoost, PARAM.bbWhiteBoostStart);
        universeAgeSec = 0;
        bbMousePullScale = 1;
        bbBhPullScale = 1;
        currentVelReturn = randomVelReturn();
        if (isFirstBigBang) {
          // Keep first BB dynamics aligned with initial universe defaults.
          currentPpLinearDamping = 0.001;
          const targetResAtBb = clamp(PARAM.bbPostResAtBigBang, 0, 0.5);
          bbPostResBoostRuntimeMultiplier = Math.max(
            1,
            targetResAtBb / Math.max(1e-9, currentPpLinearDamping)
          );
          bbPostResBoostStartMs = performance.now();
          gravityRandBhGlobalPull = PARAM.bhGlobalPull;
          gravityRandBhPullPerAbsorb = PARAM.bhPullPerAbsorb;
          gravityBhSofteningBase = PARAM.bhGlobalSoftening;
        } else {
          currentPpLinearDamping = randomInRange(0.001, 0.005);
          const targetResAtBb = clamp(PARAM.bbPostResAtBigBang, 0, 0.5);
          bbPostResBoostRuntimeMultiplier = Math.max(
            1,
            targetResAtBb / Math.max(1e-9, currentPpLinearDamping)
          );
          bbPostResBoostStartMs = performance.now();
          gravityRandBhGlobalPull = randomInRange(PARAM.bhGlobalPullMin, PARAM.bhGlobalPullMax);
          gravityRandBhPullPerAbsorb = randomInRange(PARAM.bhPullPerAbsorbMin, PARAM.bhPullPerAbsorbMax);
          gravityBhSofteningBase = randomInRange(PARAM.bhGlobalSofteningMin, PARAM.bhGlobalSofteningMax);
        }
        currentBhGlobalSoftening = gravityBhSofteningBase;
        if (isFirstBigBang) {
          applyGravityScale(gravityInputScaleFromEffective(PARAM.initialGravityScale));
          gravityRelaxEnabled = true;
        } else if (cleanMode) {
          const gDisp = randomInRange(PARAM.bbCleanGravityDisplayMin, PARAM.bbCleanGravityDisplayMax);
          const gEff = gDisp * PARAM.initialGravityScale;
          applyGravityScale(gravityInputScaleFromEffective(gEff));
          gravityRelaxEnabled = false;
        } else {
          applyGravityScale(randomInRange(PARAM.bbGravityScaleMin, PARAM.bbGravityScaleMax));
          gravityRelaxEnabled = true;
        }
        currentBigBangMaxSpeed = randomInRange(PARAM.bigBangMaxSpeedMin, PARAM.bigBangMaxSpeedMax);
        currentMaxSpeed = randomInRange(PARAM.maxSpeedMin, PARAM.maxSpeedMax);
        const flowS = flowModeEnabled
          ? randomInRange(PARAM.bigBangFlowSpeedMin, PARAM.bigBangFlowSpeedMax) * (cleanMode ? PARAM.bbCleanFlowScale : 1)
          : 0;
        currentFlowX = (Math.random() > 0.5 ? 1 : -1) * flowS;
        currentFlowY = (Math.random() * 0.24 - 0.12) * Math.min(1, flowS * 4);

        const maxR = Math.sqrt((w * w) + (h * h)) * 0.7;
        for (let i = 0; i < currentParticleTarget; i += 1) {
          const ang = Math.random() * Math.PI * 2;
          const rr = Math.pow(Math.random(), 0.72) * maxR;
          const nx = Math.cos(ang);
          const ny = Math.sin(ang);
          const rNorm = Math.min(1, rr / maxR);
          const u = 1 - rNorm;
          const a = Math.max(0.0001, PARAM.bigBangSpeedCurveA);
          const curve = (1 - Math.exp(-a * u)) / (1 - Math.exp(-a));
          const speedRaw = PARAM.bigBangMinSpeed + curve * (currentBigBangMaxSpeed - PARAM.bigBangMinSpeed);
          const speed = speedRaw * 10 * (cleanMode ? Math.max(0, PARAM.bbCleanSpeedScale) : 1);
          const vx = nx * speed;
          const vy = ny * speed;
          const driftScale = cleanMode ? Math.max(0, PARAM.bbCleanBaseDriftScale) : 1;
          const baseVx = ((Math.random() * 0.55 + 0.18) * (Math.random() > 0.5 ? 1 : -1)) * driftScale;
          const baseVy = (Math.random() * 0.24 - 0.12) * driftScale;
          const px = clamp(cx, 0, w);
          const py = clamp(cy, 0, h);
          const stellarClass = sampleStellarClassForBigBang();
          const rBase = randomBigBangParticleRadius();
          const r = rBase * bigBangClassRadiusScale(stellarClass);
          const heat0 = randomInitialHeat();
          const tempK = cleanMode
            ? clamp(
              PARAM.bbCleanTempCenterK + randomInRange(-PARAM.bbCleanTempSpreadK, PARAM.bbCleanTempSpreadK),
              PARAM.tempMinK,
              PARAM.tempMaxK
            )
            : PARAM.tempMaxK;
          const p = {
            x: px,
            y: py,
            vx: baseVx + currentFlowX,
            vy: baseVy + currentFlowY,
            baseVx: baseVx + currentFlowX,
            baseVy: baseVy + currentFlowY,
            launchVxTarget: vx,
            launchVyTarget: vy,
            launchTime: 0,
            r,
            displayR: r,
            mass: particleMassFromRadius(r),
            collisionCount: 0,
            flash: 0,
            heat: heat0,
            life: Math.random() * 0.7 + 0.3,
            stellarClass,
            evoStage: stellarClass,
            evoAgeSec: 0,
            tempK,
            color: '255,255,255',
            cr: 255,
            cg: 255,
            cb: 255,
            capturedByBh: false
          };
          p.lumClass = null;
          assignInitialEvolutionState(p, 'bb');
          syncParticleColorFromTemperature(p);
          particles.push(p);
        }
        markSinglePinkStar();
        syncParticleMassState(false);
        bbMassCompensationActive =
          (currentParticleMassTotal + computeBlackHoleMassTotal()) < Math.max(0, initialParticleMassTarget);
      }

      function isEarthAlive() {
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          if (p && p.isEarth) return true;
        }
        return false;
      }

      function updateUniverseHud(force) {
        const now = performance.now();
        if (!force && hudLastUpdateMs >= 0 && (now - hudLastUpdateMs) < 100) return;
        hudLastUpdateMs = now;
        hudVersionEl.textContent = 'ver: ' + HUB_VERSION;
        hudBbCountEl.textContent = 'BB: ' + bigBangCount;
        hudUniverseAgeEl.textContent = 'AgeU: ' + formatAgeShort(universeAgeSec);
        hudEarthAliveEl.textContent = 'Earth: ' + (isEarthAlive() ? 'alive' : 'lost');
        const totalMassAll = computeParticleMassTotal() + computeBlackHoleMassTotal();
        hudTotalMassEl.textContent = 'Mtot: ' + totalMassAll.toFixed(1);
        let classI = 0;
        let classII = 0;
        let classIII = 0;
        let classIV = 0;
        let classV = 0;
        let classWD = 0;
        let rSum = 0;
        let rCount = 0;
        let rSmall = 0;
        let rLarge = 0;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const lc = luminosityClassFromParticle(p);
          if (lc === 'I') classI += 1;
          else if (lc === 'II') classII += 1;
          else if (lc === 'III') classIII += 1;
          else if (lc === 'IV') classIV += 1;
          else if (lc === 'WD') classWD += 1;
          else if (lc !== 'Earth') classV += 1;
          if (p && Number.isFinite(p.r)) {
            const rr = Math.max(0, p.r);
            rSum += rr;
            rCount += 1;
            if (rr <= (PARAM.particleRadiusMin + 0.25)) rSmall += 1;
            if (rr >= (PARAM.particleRadiusMax - 0.25)) rLarge += 1;
          }
        }
        const rAvg = rCount > 0 ? (rSum / rCount) : 0;
        hudStellarClassesEl.textContent = 'Lum I/II/III/IV/V/WD/BH: '
          + classI.toLocaleString() + '/'
          + classII.toLocaleString() + '/'
          + classIII.toLocaleString() + '/'
          + classIV.toLocaleString() + '/'
          + classV.toLocaleString() + '/'
          + classWD.toLocaleString() + '/'
          + blackHoles.length.toLocaleString()
          + ' | Ravg: ' + rAvg.toFixed(2)
          + ' S/L: ' + rSmall.toLocaleString() + '/' + rLarge.toLocaleString();
        hudMeanTempEl.textContent = 'Tavg: ' + Math.round(lastFrameMeanTempK).toLocaleString() + 'K';
        if (!hoverInfoEnabled) {
          hudHoverStarEl.textContent = 'Hover: -';
        } else {
          const hoveredBh = dragBh.target || (mouse.active ? pickBlackHole(mouse.x, mouse.y) : null);
          if (hoveredBh) {
            const bhTempK = Math.round(clamp(
              Number.isFinite(hoveredBh.tempK) ? hoveredBh.tempK : PARAM.tempMinK,
              PARAM.tempMinK,
              PARAM.tempMaxK
            ));
            const bhMass = Math.max(0.0001, Number.isFinite(hoveredBh.mass) ? hoveredBh.mass : 0.0001);
            const bhSpeed = Math.sqrt(
              (hoveredBh.vx || 0) * (hoveredBh.vx || 0) + (hoveredBh.vy || 0) * (hoveredBh.vy || 0)
            );
            hudHoverStarEl.textContent =
              'Hover: BH'
              + ', T ' + bhTempK.toLocaleString() + 'K'
              + ', R ' + hoveredBh.R.toFixed(2)
              + ', M ' + bhMass.toFixed(2)
              + ', v ' + bhSpeed.toFixed(2);
          } else if (!mouse.active || particles.length === 0) {
            hudHoverStarEl.textContent = 'Hover: -';
          } else {
          let best = null;
          let bestD2 = Number.POSITIVE_INFINITY;
          for (let i = 0; i < particles.length; i += 1) {
            const p = particles[i];
            if (!p) continue;
            const dx = shortestWrappedDelta(p.x, mouse.x, Math.max(1, w));
            const dy = shortestWrappedDelta(p.y, mouse.y, Math.max(1, h));
            const d2 = dx * dx + dy * dy;
            const hitR = Math.max(6, p.r * 1.4);
            if (d2 <= hitR * hitR && d2 < bestD2) {
              best = p;
              bestD2 = d2;
            }
          }
          if (!best) {
            hudHoverStarEl.textContent = 'Hover: -';
          } else {
            if (best.isEarth) {
              hudHoverStarEl.textContent = 'Hover: Earth';
            } else {
              const cls = spectralLuminosityLabel(best);
              const tempK = Math.round(Number.isFinite(best.tempK) ? best.tempK : PARAM.tempMinK);
              const mass = Math.max(0.0001, Number.isFinite(best.mass) ? best.mass : particleMassFromRadius(best.r));
              const speed = Math.sqrt((best.vx || 0) * (best.vx || 0) + (best.vy || 0) * (best.vy || 0));
              const ageText = formatAgeShort(best.evoAgeSec || 0);
              hudHoverStarEl.textContent =
                'Hover: ' + cls
                + ', T ' + tempK.toLocaleString() + 'K'
                + ', R ' + best.r.toFixed(2)
                + ', M ' + mass.toFixed(2)
                + ', Age ' + ageText
                + ', v ' + speed.toFixed(2);
            }
          }
          }
        }
        const gRatio = PARAM.attractStrength !== 0 ? (currentAttractStrength / PARAM.attractStrength) : 0;
        const gDisplayBase = Math.max(0.0001, PARAM.initialGravityScale || 1);
        const gDisplayRatio = gRatio / gDisplayBase;
        // Keep Res as physical drag only so it stays comparable across flow on/off.
        const resValue = noFrictionModeEnabled ? 0 : effectiveLinearDamping(now);
        hudGravityGEl.textContent = 'G: ' + gDisplayRatio.toFixed(1) + ' G0';
        hudResistanceEl.textContent = 'Res: ' + resValue.toFixed(3);
        hudFpsEl.textContent = 'FPS: ' + Math.round(currentFps);
      }

      function maybeTriggerBigBang() {
        if (particles.length !== 0) return;

        let cx = blackHoles[0].x;

      function shortestWrappedDelta(a, b, period) {
        let d = a - b;
        if (d > period * 0.5) d -= period;
        if (d < -period * 0.5) d += period;
        return d;
      }

      function torusRelativePoint(x, y, cx, cy, periodX, periodY) {
        return {
          x: cx + shortestWrappedDelta(x, cx, periodX),
          y: cy + shortestWrappedDelta(y, cy, periodY)
        };
      }

      function segmentIntersectsCircle(x0, y0, x1, y1, cx, cy, r2) {
        const dx = x1 - x0;
        const dy = y1 - y0;
        const fx = x0 - cx;
        const fy = y0 - cy;
        const a = dx * dx + dy * dy;
        if (a <= 1e-9) return (fx * fx + fy * fy) <= r2;
        let t = -((fx * dx) + (fy * dy)) / a;
        if (t < 0) t = 0;
        if (t > 1) t = 1;
        const px = x0 + dx * t;
        const py = y0 + dy * t;
        const qx = px - cx;
        const qy = py - cy;
        return (qx * qx + qy * qy) <= r2;
      }

        const mass = PARAM.spawnMassBase + (bestRho - PARAM.rhoThreshold) * PARAM.spawnMassPerRho;
        const radius = calcRadius(mass);
        blackHoles.push({
          x: spawnX,
          y: spawnY,
          vx: 0,
          vy: 0,
          mass,
          R: radius,
          Rabs: calcAbsorbRadius(radius),
          absorbedCount: 0,
          absorbedStarMass: 0,
          diskMass: 0,
          accretionGlowVolumeR3: 0,
          accretionShellColorR: 0,
          accretionShellColorG: 0,
          accretionShellColorB: 0,
          accretionShellColorW: 0,
          recentAccretion: 0,
          absorbGlow: 0,
          absorbGlowR: 0,
          absorbGlowG: 0,
          absorbGlowB: 0,
          absorbLockFrames: Math.max(0, Math.floor(PARAM.collapseNoAbsorbFrames)),
          tempK: clamp(lastFrameMeanTempK || PARAM.tempMinK, PARAM.tempMinK, PARAM.tempMaxK),
          diskColorR: null,
          diskColorG: null,
          diskColorB: null,
          accretionRings: []
        });
        emitCollapseRepulse(spawnX, spawnY, PARAM.densitySpawnRepulseBoost);
        bhSpawnCooldown = PARAM.spawnCooldownFrames;
      }

      function updateBlackHoles(dtMs) {
        if (!bhEnabled) return;

        // Mutual BH gravity (pairwise, momentum-conserving).
        for (let i = 0; i < blackHoles.length; i += 1) {
          for (let j = i + 1; j < blackHoles.length; j += 1) {
            const a = blackHoles[i];
            const b = blackHoles[j];
            const ma = Math.max(0.0001, a.mass || 0);
            const mb = Math.max(0.0001, b.mass || 0);
            let dx = b.x - a.x;
            if (dx > w * 0.5) dx -= w;
            if (dx < -w * 0.5) dx += w;
            let dy = b.y - a.y;
            if (dy > h * 0.5) dy -= h;
            if (dy < -h * 0.5) dy += h;
            const d2 = dx * dx + dy * dy;
            if (d2 < 1) continue;
            const soften2 = PARAM.bhMutualSoftening * PARAM.bhMutualSoftening;
            const invR = 1 / Math.sqrt(d2 + soften2);
            const invR3 = invR * invR * invR;
            const ax = PARAM.bhMutualGravityStrength * dx * invR3;
            const ay = PARAM.bhMutualGravityStrength * dy * invR3;
            a.vx = (a.vx || 0) + ax * mb;
            a.vy = (a.vy || 0) + ay * mb;
            b.vx = (b.vx || 0) - ax * ma;
            b.vy = (b.vy || 0) - ay * ma;
          }
        }

        const halfLifeMs = Math.max(1, PARAM.bhAbsorbGlowHalfLifeMs);
        const absorbGlowDecay = Math.pow(0.5, dtMs / halfLifeMs);
        const accHalfLifeMs = Math.max(1, PARAM.bhAccretionHalfLifeMs);
        const accDecay = Math.pow(0.5, dtMs / accHalfLifeMs);
        const accretionGlowTauMs = Math.max(1, PARAM.bhAccretionGlowTauSec * 1000);
        const accretionGlowDecay = Math.exp(-dtMs / accretionGlowTauMs);
        const diskInfallHalfLifeMs = Math.max(1, PARAM.bhDiskInfallHalfLifeMs);
        const diskInfallFrac = 1 - Math.pow(0.5, dtMs / diskInfallHalfLifeMs);
        const bhTempHalfLifeMs = Math.max(1, PARAM.bhTempHalfLifeSec * 1000);
        const bhTempDecay = Math.pow(0.5, dtMs / bhTempHalfLifeMs);
        const diskHalfLifeMs = Math.max(1, PARAM.bhAccretionDiskHalfLifeMs);
        for (let i = 0; i < blackHoles.length; i += 1) {
          const b = blackHoles[i];
          if (mouse.active && mouseGravityEnabled && dragBh.target !== b) {
            let dx = mouse.x - b.x;
            if (dx > w * 0.5) dx -= w;
            if (dx < -w * 0.5) dx += w;
            let dy = mouse.y - b.y;
            if (dy > h * 0.5) dy -= h;
            if (dy < -h * 0.5) dy += h;
            const d2 = dx * dx + dy * dy;
            const ar = currentAttractR;
            if (d2 > 1 && d2 < ar * ar) {
              const d = Math.sqrt(d2);
              const pull = (1 - d / ar) * currentAttractStrength * PARAM.bhMouseAttractScale;
              b.vx = (b.vx || 0) + (dx / d) * pull;
              b.vy = (b.vy || 0) + (dy / d) * pull;
            }
          }
          b.x += b.vx || 0;
          b.y += b.vy || 0;
          if (!noFrictionModeEnabled) {
            b.vx = (b.vx || 0) * PARAM.bhVelocityDamping;
            b.vy = (b.vy || 0) * PARAM.bhVelocityDamping;
          }
          const sp2 = (b.vx || 0) * (b.vx || 0) + (b.vy || 0) * (b.vy || 0);
          if (sp2 > PARAM.bhMaxSpeed * PARAM.bhMaxSpeed) {
            const s = PARAM.bhMaxSpeed / Math.sqrt(sp2);
            b.vx *= s;
            b.vy *= s;
          }
          if (b.x < 0) b.x += w;
          if (b.x >= w) b.x -= w;
          if (b.y < 0) b.y += h;
          if (b.y >= h) b.y -= h;
          b.recentAccretion = (b.recentAccretion || 0) * accDecay;
          b.accretionGlowVolumeR3 = Math.max(0, (b.accretionGlowVolumeR3 || 0) * accretionGlowDecay);
          b.accretionShellColorR = Math.max(0, (b.accretionShellColorR || 0) * accretionGlowDecay);
          b.accretionShellColorG = Math.max(0, (b.accretionShellColorG || 0) * accretionGlowDecay);
          b.accretionShellColorB = Math.max(0, (b.accretionShellColorB || 0) * accretionGlowDecay);
          b.accretionShellColorW = Math.max(0, (b.accretionShellColorW || 0) * accretionGlowDecay);
          const diskMassNow = Math.max(0, b.diskMass || 0);
          if (diskMassNow > 1e-9) {
            const diskToBh = diskMassNow * diskInfallFrac;
            if (diskToBh > 0) {
              const nextDiskMass = Math.max(0, diskMassNow - diskToBh);
              b.diskMass = nextDiskMass;
              b.mass = Math.max(0.0001, (b.mass || 0) + diskToBh);
            }
          }
          b.absorbGlow = (b.absorbGlow || 0) * absorbGlowDecay;
          b.absorbGlowR = (b.absorbGlowR || 0) * absorbGlowDecay;
          b.absorbGlowG = (b.absorbGlowG || 0) * absorbGlowDecay;
          b.absorbGlowB = (b.absorbGlowB || 0) * absorbGlowDecay;
          b.tempK = clamp(
            (Number.isFinite(b.tempK) ? b.tempK : PARAM.tempMinK) * bhTempDecay,
            PARAM.tempMinK,
            PARAM.tempMaxK
          );
          if ((b.absorbLockFrames || 0) > 0) {
            b.absorbLockFrames -= 1;
          }
          if (PARAM.bhAccretionDiskEnabled) {
            const rings = b.accretionRings || (b.accretionRings = []);
            const absorbedMass = Math.max(0, b.diskMass || 0);
            const halfLifeScale = 1 + (absorbedMass * Math.max(0, PARAM.bhAccretionDiskMassHalfLifeGain));
            const ringDecay = Math.pow(0.5, dtMs / (diskHalfLifeMs * halfLifeScale));
            const removeOff = Math.max(1e-12, PARAM.bhAccretionDiskRemoveOff);
            const fadeStartOff = Math.max(removeOff * 1.01, PARAM.bhAccretionDiskFadeStartOff);
            for (let rIdx = rings.length - 1; rIdx >= 0; rIdx -= 1) {
              const ring = rings[rIdx];
              ring.off = (ring.off == null ? 0 : ring.off) * ringDecay;
              const fade = clamp((ring.off - removeOff) / (fadeStartOff - removeOff), 0, 1);
              ring.fade = fade;
              if (ring.off < removeOff) {
                rings.splice(rIdx, 1);
              }
            }
          }
          b.R = calcRadius(b.mass);
          b.Rabs = calcAbsorbRadius(b.R);
        }

        const mergeK2 = PARAM.bhMergeK * PARAM.bhMergeK;
        for (let i = 0; i < blackHoles.length; i += 1) {
          for (let j = i + 1; j < blackHoles.length; j += 1) {
            const a = blackHoles[i];
            const b = blackHoles[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const d2 = dx * dx + dy * dy;
            const mr = a.R + b.R;
            if (d2 > mr * mr * mergeK2) continue;

            const massA = Math.max(0.0001, a.mass);
            const massB = Math.max(0.0001, b.mass);
            const mass = massA + massB;
            a.x = (a.x * massA + b.x * massB) / mass;
            a.y = (a.y * massA + b.y * massB) / mass;
            a.vx = ((a.vx || 0) * massA + (b.vx || 0) * massB) / mass;
            a.vy = ((a.vy || 0) * massA + (b.vy || 0) * massB) / mass;
            a.mass = mass;
            a.R = calcRadius(mass);
            a.Rabs = calcAbsorbRadius(a.R);
            a.absorbedCount = (a.absorbedCount || 0) + (b.absorbedCount || 0);
            a.absorbedStarMass = (a.absorbedStarMass || 0) + (b.absorbedStarMass || 0);
            a.diskMass = (a.diskMass || 0) + (b.diskMass || 0);
            a.accretionGlowVolumeR3 = (a.accretionGlowVolumeR3 || 0) + (b.accretionGlowVolumeR3 || 0);
            a.accretionShellColorR = (a.accretionShellColorR || 0) + (b.accretionShellColorR || 0);
            a.accretionShellColorG = (a.accretionShellColorG || 0) + (b.accretionShellColorG || 0);
            a.accretionShellColorB = (a.accretionShellColorB || 0) + (b.accretionShellColorB || 0);
            a.accretionShellColorW = (a.accretionShellColorW || 0) + (b.accretionShellColorW || 0);
            a.recentAccretion = (a.recentAccretion || 0) + (b.recentAccretion || 0);
            a.absorbGlow = (a.absorbGlow || 0) + (b.absorbGlow || 0);
            a.absorbGlowR = (a.absorbGlowR || 0) + (b.absorbGlowR || 0);
            a.absorbGlowG = (a.absorbGlowG || 0) + (b.absorbGlowG || 0);
            a.absorbGlowB = (a.absorbGlowB || 0) + (b.absorbGlowB || 0);
            const aTemp = clamp(Number.isFinite(a.tempK) ? a.tempK : PARAM.tempMinK, PARAM.tempMinK, PARAM.tempMaxK);
            const bTemp = clamp(Number.isFinite(b.tempK) ? b.tempK : PARAM.tempMinK, PARAM.tempMinK, PARAM.tempMaxK);
            a.tempK = clamp(
              (aTemp * massA + bTemp * massB) / Math.max(1e-9, mass),
              PARAM.tempMinK,
              PARAM.tempMaxK
            );
            a.absorbLockFrames = Math.max(a.absorbLockFrames || 0, b.absorbLockFrames || 0);
            if (a.diskColorR == null || a.diskColorG == null || a.diskColorB == null) {
              a.diskColorR = b.diskColorR;
              a.diskColorG = b.diskColorG;
              a.diskColorB = b.diskColorB;
            } else if (b.diskColorR != null && b.diskColorG != null && b.diskColorB != null) {
              const wa = Math.max(1, a.absorbedCount || 1);
              const wb = Math.max(1, b.absorbedCount || 1);
              const den = wa + wb;
              a.diskColorR = (a.diskColorR * wa + b.diskColorR * wb) / den;
              a.diskColorG = (a.diskColorG * wa + b.diskColorG * wb) / den;
              a.diskColorB = (a.diskColorB * wa + b.diskColorB * wb) / den;
            }
            const ringsA = a.accretionRings || (a.accretionRings = []);
            const ringsB = b.accretionRings || [];
            if (ringsB.length > 0) {
              for (let k = 0; k < ringsB.length; k += 1) ringsA.push(ringsB[k]);
              const maxRings = Math.max(24, Math.floor(PARAM.bhAccretionDiskMaxRings));
              while (ringsA.length > maxRings) ringsA.shift();
            }
            blackHoles.splice(j, 1);
            j -= 1;
          }
        }
      }

      function drawBlackHoles() {
        if (!bhEnabled) return;
        for (let i = 0; i < blackHoles.length; i += 1) {
          const b = blackHoles[i];
          const glowE = Math.max(0, b.absorbGlow || 0);
          const bhMass = Math.max(0.0001, b.mass || 0);
          const activeAccretion = Math.max(0, b.recentAccretion || 0);
          const accWindowSec = Math.max(0.001, PARAM.bhAccretionHalfLifeMs * 0.001);
          const mdotProxy = activeAccretion / accWindowSec;
          const luminosityProxy = mdotProxy * bhMass;
          if (glowRenderingEnabled && (glowE > 1e-7 || luminosityProxy > 1e-7)) {
            const bhTempRgbBase = kelvinToRgb(Number.isFinite(b.tempK) ? b.tempK : PARAM.tempMinK);
            const invE = 1 / Math.max(1e-9, glowE);
            const srcR = glowE > 1e-7 ? clamp(Math.round((b.absorbGlowR || 0) * invE), 0, 255) : bhTempRgbBase.r;
            const srcG = glowE > 1e-7 ? clamp(Math.round((b.absorbGlowG || 0) * invE), 0, 255) : bhTempRgbBase.g;
            const srcB = glowE > 1e-7 ? clamp(Math.round((b.absorbGlowB || 0) * invE), 0, 255) : bhTempRgbBase.b;
            const accRateNorm = clamp(
              (mdotProxy / Math.max(1e-6, bhMass * bhMass)) * Math.max(0, PARAM.bhAccretionTempRateScale),
              0,
              1
            );
            const accTempK = lerp(3500, PARAM.tempMaxK, Math.pow(accRateNorm, 0.25));
            const accRgb = kelvinToRgb(accTempK);
            const colorMix = clamp(PARAM.bhAccretionColorMix, 0, 1);
            const gr = Math.round(lerp(srcR, accRgb.r, colorMix));
            const gg = Math.round(lerp(srcG, accRgb.g, colorMix));
            const gb = Math.round(lerp(srcB, accRgb.b, colorMix));
            const glowStrength = 1 - Math.exp(-luminosityProxy * Math.max(0, PARAM.bhAccretionLuminosityGain));
            const haloMassScale = 1 + Math.log1p(activeAccretion) * Math.max(0, PARAM.bhAbsorbHaloMassScale);
            const glowRadius = Math.max(
              b.R * 1.2,
              b.R * haloMassScale
            );
            const glowAlpha = clamp(
              glowStrength * Math.max(0, PARAM.bhAbsorbGlowAlphaMax),
              0,
              1
            );
            if (glowAlpha > 0.002) {
              const g0 = ctx.createRadialGradient(b.x, b.y, b.R * 0.35, b.x, b.y, glowRadius);
              g0.addColorStop(0, 'rgba(' + gr + ',' + gg + ',' + gb + ',' + glowAlpha.toFixed(3) + ')');
              g0.addColorStop(1, 'rgba(' + gr + ',' + gg + ',' + gb + ',0)');
              ctx.save();
              ctx.globalCompositeOperation = 'lighter';
              ctx.fillStyle = g0;
              ctx.beginPath();
              ctx.arc(b.x, b.y, glowRadius, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
          }
          const bhTempRgb = kelvinToRgb(Number.isFinite(b.tempK) ? b.tempK : PARAM.tempMinK);
          const tempTint = clamp(PARAM.bhAccretionDiskTempTint, 0, 1);
          const shellVolumeR3 = Math.max(0, b.accretionGlowVolumeR3 || 0);
          if (shellVolumeR3 > 1e-7) {
            const shellW = Math.max(0, b.accretionShellColorW || 0);
            const invShellW = 1 / Math.max(1e-9, shellW);
            const srcR = shellW > 1e-7
              ? clamp(Math.round((b.accretionShellColorR || 0) * invShellW), 0, 255)
              : (b.diskColorR == null ? bhTempRgb.r : b.diskColorR);
            const srcG = shellW > 1e-7
              ? clamp(Math.round((b.accretionShellColorG || 0) * invShellW), 0, 255)
              : (b.diskColorG == null ? bhTempRgb.g : b.diskColorG);
            const srcB = shellW > 1e-7
              ? clamp(Math.round((b.accretionShellColorB || 0) * invShellW), 0, 255)
              : (b.diskColorB == null ? bhTempRgb.b : b.diskColorB);
            const tr = Math.round(srcR);
            const tg = Math.round(srcG);
            const tb = Math.round(srcB);
            const shellOuter = Math.cbrt((b.R * b.R * b.R) + shellVolumeR3);
            const shellThickness = Math.max(0, shellOuter - b.R);
            const glowAlpha = clamp(
              Math.max(0, PARAM.bhAccretionGlowAlphaMax) * (1 - Math.exp(-shellThickness * 2.0)),
              0,
              1
            );
            if (glowAlpha > 0.002) {
              const g1 = ctx.createRadialGradient(b.x, b.y, b.R * 0.92, b.x, b.y, shellOuter);
              g1.addColorStop(0, 'rgba(' + tr + ',' + tg + ',' + tb + ',' + glowAlpha.toFixed(3) + ')');
              g1.addColorStop(1, 'rgba(' + tr + ',' + tg + ',' + tb + ',0)');
              ctx.save();
              ctx.globalCompositeOperation = 'lighter';
              ctx.fillStyle = g1;
              ctx.beginPath();
              ctx.arc(b.x, b.y, shellOuter, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
          }
          const rings = b.accretionRings || [];
          const diskVolumeR3 = PARAM.bhAccretionDiskEnabled ? Math.max(0, b.accretionGlowVolumeR3 || 0) : 0;
          if (diskVolumeR3 > 1e-7) {
            const baseA = clamp(PARAM.bhAccretionDiskAlpha, 0.02, 0.98);
            const innerR = b.R;
            const outerR = Math.cbrt((innerR * innerR * innerR) + diskVolumeR3);
            const thick = Math.max(0.35, outerR - innerR);
            const rr = innerR + (thick * 0.5);
            const ring = rings.length > 0 ? rings[rings.length - 1] : null;
            const srcR = ring ? ring.r : (b.diskColorR == null ? bhTempRgb.r : b.diskColorR);
            const srcG = ring ? ring.g : (b.diskColorG == null ? bhTempRgb.g : b.diskColorG);
            const srcB = ring ? ring.bl : (b.diskColorB == null ? bhTempRgb.b : b.diskColorB);
            const tr = Math.round(lerp(srcR, bhTempRgb.r, tempTint));
            const tg = Math.round(lerp(srcG, bhTempRgb.g, tempTint));
            const tb = Math.round(lerp(srcB, bhTempRgb.b, tempTint));
            const a = clamp(baseA * (0.6 + 0.4 * clamp(thick / Math.max(1, b.R), 0, 1.5)), 0.02, 0.98);
            ctx.save();
            ctx.lineWidth = thick;
            ctx.globalCompositeOperation = 'lighter';
            ctx.strokeStyle = 'rgba(' + tr + ',' + tg + ',' + tb + ',' + a.toFixed(3) + ')';
            ctx.beginPath();
            ctx.arc(b.x, b.y, rr, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
          ctx.beginPath();
          ctx.fillStyle = 'rgba(0,0,0,1)';
          ctx.arc(b.x, b.y, b.R, 0, Math.PI * 2);
          ctx.fill();

          if (bhArrowEnabled) {
            drawUpArrow(b.x, b.y, b.R, 'rgba(255, 120, 210, 0.95)');
          }
        }
      }


      function resize() {
        syncGlowRenderingMode();
        const oldW = w;
        const oldH = h;
        const rect = canvas.getBoundingClientRect();
        w = Math.max(1, Math.floor(rect.width));
        h = Math.max(1, Math.floor(rect.height));
        scaleCustomTextPosition(oldW, oldH, w, h);
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const baseArea = Math.max(1, PARAM.baseViewWidth * PARAM.baseViewHeight);
        const areaScale = (w * h) / baseArea;
        const particleAreaScale = Math.min(1, (w * h) / Math.max(1, PARAM.particleReferenceArea));
        currentParticleTarget = Math.max(
          PARAM.minParticleCount,
          Math.round(PARAM.particleReferenceCount * particleAreaScale)
        );
        const lenScale = Math.sqrt(Math.max(0.0001, areaScale));
        currentAttractR = PARAM.attractR * lenScale;
        currentBlastR = PARAM.blastR * lenScale;
        clearClockGravityField();
        updateWallClock();
        syncCustomTextBoxWidth();
        syncCustomTextVisibility();
        const target = currentParticleTarget;
        particles.length = 0;
        mergeFadeEffects.length = 0;
        blackHoles.length = 0;
        universeAgeSec = 0;
        bhSpawnCooldown = 0;
        const lumPlan = PARAM.preBbInitLumQuotaEnabled ? buildPreBbLuminosityPlan(target) : null;
        const superIdx = (
          (!PARAM.preBbInitLumQuotaEnabled && PARAM.preBbInitOneSuperEnabled && target > 0)
        ) ? Math.floor(Math.random() * target) : -1;
        for (let i = 0; i < target; i += 1) {
          const desiredLum = lumPlan ? (lumPlan[i] || 'V') : null;
          const isSuperSeed = (!desiredLum && i === superIdx);
          const stellarClass = desiredLum
            ? ((desiredLum === 'I' || desiredLum === 'II' || desiredLum === 'III') ? 'giant' : 'main')
            : (isSuperSeed ? 'giant' : sampleStellarClass());
          let rBase = randomParticleRadius();
          if (desiredLum) {
            const rTarget = sampleRadiusForLuminosityClass(desiredLum);
            const clsScale = Math.max(0.0001, stellarClassRadiusScale(stellarClass));
            rBase = Math.max(PARAM.particleRadiusMin, rTarget / clsScale);
          } else if (isSuperSeed) {
            const base = Math.max(
              PARAM.particleRadiusMin,
              (PARAM.preBbInitOneSuperRadius || 10.0) / Math.max(1, PARAM.stellarGiantRadiusScale || 1)
            );
            const jitter = Math.max(0, PARAM.preBbInitOneSuperJitter || 0);
            rBase = Math.max(PARAM.particleRadiusMin, base + randomInRange(-jitter, jitter));
          }
          const r = rBase * stellarClassRadiusScale(stellarClass);
          const heat0 = randomInitialHeat();
          const tempK = initialParticleTemperatureK(r, stellarClass);
          const p = {
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() * 0.55 + 0.18) * (Math.random() > 0.5 ? 1 : -1),
            vy: (Math.random() * 0.24 - 0.12),
            baseVx: (Math.random() * 0.55 + 0.18) * (Math.random() > 0.5 ? 1 : -1),
            baseVy: (Math.random() * 0.24 - 0.12),
            launchVxTarget: 0,
            launchVyTarget: 0,
            launchTime: -1,
            r,
            displayR: r,
            mass: particleMassFromRadius(r),
            collisionCount: 0,
            flash: 0,
            heat: heat0,
            life: Math.random() * 0.7 + 0.3,
            stellarClass,
            evoStage: stellarClass,
            evoAgeSec: 0,
            tempK,
            color: '255,255,255',
            cr: 255,
            cg: 255,
            cb: 255,
            capturedByBh: false
          };
          p.lumClass = null;
          assignInitialEvolutionState(p, 'initial');
          if (desiredLum) {
            const tInit = sampleInitialTempForLuminosityClass(desiredLum, p.r);
            if (Number.isFinite(tInit)) {
              p.tempK = clamp(tInit, PARAM.tempMinK, PARAM.tempMaxK);
            }
          }
          syncParticleColorFromTemperature(p);
          particles.push(p);
        }
        markSinglePinkStar();
        lastFrameMeanTempK = computeAverageTemperature();
        syncParticleMassState(true);
        bbMassCompensationActive = false;
        gravityRelaxEnabled = true;
        bbCleanRuntimeActive = false;
      }

      function resetLayout() {
        syncGlowRenderingMode();
        const oldW = w;
        const oldH = h;
        const rect = canvas.getBoundingClientRect();
        w = Math.max(1, Math.floor(rect.width));
        h = Math.max(1, Math.floor(rect.height));
        scaleCustomTextPosition(oldW, oldH, w, h);
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const baseArea = Math.max(1, PARAM.baseViewWidth * PARAM.baseViewHeight);
        const areaScale = (w * h) / baseArea;
        const particleAreaScale = Math.min(1, (w * h) / Math.max(1, PARAM.particleReferenceArea));
        currentParticleTarget = Math.max(
          PARAM.minParticleCount,
          Math.round(PARAM.particleReferenceCount * particleAreaScale)
        );
        const lenScale = Math.sqrt(Math.max(0.0001, areaScale));
        currentAttractR = PARAM.attractR * lenScale;
        currentBlastR = PARAM.blastR * lenScale;
        clearClockGravityField();
        updateWallClock();
        syncCustomTextBoxWidth();
        syncCustomTextVisibility();

        // Keep current universe state; randomize positions for a visible relayout.
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          if (!p) continue;
          p.x = Math.random() * w;
          p.y = Math.random() * h;
        }
        for (let i = 0; i < blackHoles.length; i += 1) {
          const b = blackHoles[i];
          if (!b) continue;
          b.x = Math.random() * w;
          b.y = Math.random() * h;
        }
        syncParticleMassState(false);
      }

      function step() {
        if (isPaused) {
          updateUniverseHud(false);
          raf = requestAnimationFrame(step);
          return;
        }

        const nowMs = performance.now();
        const dtMs = lastStepMs > 0 ? clamp(nowMs - lastStepMs, 0, 250) : (1000 / 60);
        const dtSec = dtMs * 0.001;
        universeAgeSec += dtSec;
        lastStepMs = nowMs;
        const instantFps = dtMs > 0 ? (1000 / dtMs) : 60;
        currentFps = lerp(currentFps, instantFps, 0.12);
        t += 0.015;
        frameTick += 1;
        ctx.fillStyle = backgroundColorFromTemperature(lastFrameMeanTempK, t);
        ctx.fillRect(0, 0, w, h);
        const attractR2 = currentAttractR * currentAttractR;
        const bhSoft2 = PARAM.bhMutualSoftening * PARAM.bhMutualSoftening;
        const wrapW = w;
        const wrapH = h;
        let totalEnergy = 0;
        let totalTempK = 0;
        const preMassThreshold = Math.max(0.0001, PARAM.collapseMassThreshold) * Math.max(0.05, PARAM.preCollapseMassRatio);
        const preCollThreshold = Math.max(
          0,
          PARAM.collapseCollisionThreshold - Math.max(0, PARAM.preCollapseCollisionLead)
        );
        const canPreCollapseGlow =
          bhCreationLockFrames <= 0 && (!PARAM.collapseRequireCollisionMode || collisionModeEnabled);
        const suppressNegativeAmbientGravity = currentGravityScale < 0 && pointerHoldActive;
        const flowOscY = flowModeEnabled ? Math.sin(t * PARAM.flowOscFreq) * PARAM.flowOscAmp : 0;
        syncParticleMassState(false);
        if (bbMassCompensationActive && (currentParticleMassTotal + computeBlackHoleMassTotal()) >= initialParticleMassTarget) {
          bbMassCompensationActive = false;
        }
        const desktopGlowMax = Math.max(0, Math.floor(PARAM.starGlowMaxPerFrame || 0));
        const mobileGlowMax = Math.max(0, Math.floor(PARAM.mobileStarGlowMaxPerFrame || desktopGlowMax));
        const glowMaxPerFrame = forceCircleRendering ? mobileGlowMax : desktopGlowMax;
        let glowDrawCount = 0;
        const frameLinearDamping = effectiveLinearDamping(nowMs);
        const maxSpeed2 = currentMaxSpeed * currentMaxSpeed;
        if (gravityRelaxEnabled) {
          const gravityTargetScale = PARAM.initialGravityScale;
          const gravityHalfLifeMs = Math.max(1, PARAM.gravityRelaxHalfLifeSec * 1000);
          const gravityDecay = Math.pow(0.5, dtMs / gravityHalfLifeMs);
          if (Math.abs(currentGravityScale - gravityTargetScale) > 1e-4) {
            const relaxedScale = gravityTargetScale + (currentGravityScale - gravityTargetScale) * gravityDecay;
            const relaxedInputScale = gravityInputScaleFromEffective(relaxedScale);
            applyGravityScale(relaxedInputScale);
          }
        }
        const hasBhGravity = !suppressNegativeAmbientGravity && bhEnabled && blackHoles.length > 0;
        const hasBhAbsorbCheck = bhEnabled && blackHoles.length > 0;
        const waveAmp = PARAM.waveAmp;
        if (suppressNegativeAmbientGravity) {
          // Hold-click in negative gravity: disable ambient negative gravity and apply click gravity only.
          gravitateClick(pointerHoldX, pointerHoldY, PARAM.holdGravityImpulseScale);
        }
        const pairGravityEnabled = particleGravityEnabled;
        if (pairGravityEnabled || collisionModeEnabled) {
          buildParticleGravityGrid(wrapW, wrapH);
        }
        if (pairGravityEnabled || (collisionModeEnabled && bhCreationLockFrames <= 0)) {
          const merged = applyParticleGravitySymmetric(
            wrapW,
            wrapH,
            pairGravityEnabled,
            collisionModeEnabled && bhCreationLockFrames <= 0
          );
          if (merged && collisionModeEnabled) {
            buildParticleGravityGrid(wrapW, wrapH);
          }
        }
        if (bhSpawnCooldown > 0) bhSpawnCooldown -= 1;
        if (bhCreationLockFrames > 0) bhCreationLockFrames -= 1;
        if (
          bhEnabled &&
          blackHoles.length < PARAM.maxBlackHoles &&
          bhSpawnCooldown === 0 &&
          (frameTick % PARAM.spawnCheckEveryNFrames === 0)
        ) {
          buildSpatialGrid();
          trySpawnBlackHole();
        }

        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const prevX = p.x;
          const prevY = p.y;
          let frictionHeatDeltaK = 0;
          if (!noFrictionModeEnabled) {
            if (!particleGravityEnabled && (!hasBhGravity || flowModeEnabled)) {
              const targetVx = flowModeEnabled ? p.baseVx : 0;
              const targetVy = (flowModeEnabled ? p.baseVy : 0) + flowOscY;
              const rvx0 = p.vx - targetVx;
              const rvy0 = p.vy - targetVy;
              p.vx += (targetVx - p.vx) * currentVelReturn;
              p.vy += (targetVy - p.vy) * currentVelReturn;
              const rvx1 = p.vx - targetVx;
              const rvy1 = p.vy - targetVy;
              const relLoss = (rvx0 * rvx0 + rvy0 * rvy0) - (rvx1 * rvx1 + rvy1 * rvy1);
              if (relLoss > 0) frictionHeatDeltaK += relLoss * PARAM.frictionHeatGainK;
            } else {
              const drag = frameLinearDamping;
              const v20 = p.vx * p.vx + p.vy * p.vy;
              p.vx *= (1 - drag);
              p.vy *= (1 - drag);
              const v21 = p.vx * p.vx + p.vy * p.vy;
              const loss = v20 - v21;
              if (loss > 0) frictionHeatDeltaK += loss * PARAM.frictionHeatGainK;
            }
            if (frictionHeatDeltaK > 0) {
              const tempNow = Number.isFinite(p.tempK)
                ? p.tempK
                : equilibriumTemperatureK(p.r, p.stellarClass || 'main');
              p.tempK = clamp(tempNow + frictionHeatDeltaK, PARAM.tempMinK, PARAM.tempMaxK);
            }
          }

          // Acceleration-based heating (|a| proxy from per-frame force delta-v).
          const vxPreForce = p.vx;
          const vyPreForce = p.vy;

          if (p.launchTime >= 0) {
            const a = Math.max(0.000001, PARAM.bigBangLaunchA);
            const prevPhase = 1 - Math.exp(-a * p.launchTime);
            p.launchTime += 1;
            const nextPhase = 1 - Math.exp(-a * p.launchTime);
            const dPhase = nextPhase - prevPhase;
            if (dPhase > 0.000001) {
              p.vx += p.launchVxTarget * dPhase;
              p.vy += p.launchVyTarget * dPhase;
            } else {
              p.launchTime = -1;
            }
          }

          if (mouse.active && mouseGravityEnabled && !suppressNegativeAmbientGravity) {
            const dx = shortestWrappedDelta(mouse.x, p.x, wrapW);
            const dy = shortestWrappedDelta(mouse.y, p.y, wrapH);
            const d2 = dx * dx + dy * dy;
            if (d2 > 1 && d2 < attractR2) {
              const d = Math.sqrt(d2);
              const pull = (1 - d / currentAttractR) * currentAttractStrength;
              p.vx += (dx / d) * pull;
              p.vy += (dy / d) * pull;
            }
          }
          applyClockGravity(p);
          if (p.capturedByBh) {
            lockCapturedParticleToNearestBh(p);
          }

          let absorbed = false;
          if (hasBhGravity) {
            for (let bIdx = 0; bIdx < blackHoles.length; bIdx += 1) {
              const b = blackHoles[bIdx];
              if ((b.absorbLockFrames || 0) > 0) continue;
              const dx = shortestWrappedDelta(b.x, p.x, wrapW);
              const dy = shortestWrappedDelta(b.y, p.y, wrapH);
              const d2 = dx * dx + dy * dy;
              if (d2 > 1) {
                const mb = Math.max(0.0001, b.mass || 0);
                const g = PARAM.bhMutualGravityStrength * mb;
                const invR = 1 / Math.sqrt(d2 + bhSoft2);
                const invR3 = invR * invR * invR;
                const ax = g * dx * invR3;
                const ay = g * dy * invR3;
                p.vx += ax;
                p.vy += ay;
              }
            }
          }

          if (PARAM.accelHeatEnabled) {
            const dvx = p.vx - vxPreForce;
            const dvy = p.vy - vyPreForce;
            const dv = Math.sqrt(dvx * dvx + dvy * dvy);
            const dvThr = Math.max(0, PARAM.accelHeatDvThreshold || 0);
            if (dv > dvThr) {
              const gain = Math.max(0, PARAM.accelHeatGainK || 0);
              const pw = Math.max(0.2, PARAM.accelHeatPower || 1);
              const frameHeat = gain * Math.pow(dv - dvThr, pw);
              const addK = Math.min(Math.max(0, PARAM.accelHeatMaxDeltaKPerFrame || 0), frameHeat);
              if (addK > 0) {
                const tempNow = Number.isFinite(p.tempK)
                  ? p.tempK
                  : equilibriumTemperatureK(p.r, p.stellarClass || 'main');
                p.tempK = clamp(tempNow + addK, PARAM.tempMinK, PARAM.tempMaxK);
              }
            }
          }
          if (hasBhAbsorbCheck && PARAM.bhTidalStripEnabled) {
            for (let bIdx = 0; bIdx < blackHoles.length; bIdx += 1) {
              const b = blackHoles[bIdx];
              if ((b.absorbLockFrames || 0) > 0) continue;
              const dx = shortestWrappedDelta(b.x, p.x, wrapW);
              const dy = shortestWrappedDelta(b.y, p.y, wrapH);
              const d2 = dx * dx + dy * dy;
              if (d2 <= 1) continue;
              const d = Math.sqrt(d2);
              if (stripParticleMassIntoBlackHole(b, p, d, dtMs)) {
                removeParticleAt(i);
                absorbed = true;
                break;
              }
            }
          }
          if (absorbed) {
            i -= 1;
            continue;
          }

          const sp2 = p.vx * p.vx + p.vy * p.vy;
          if (sp2 > maxSpeed2) {
            const s = currentMaxSpeed / Math.sqrt(sp2);
            p.vx *= s;
            p.vy *= s;
          }

          const wave = Math.sin((p.x * 0.01) + t) * waveAmp;
          p.x += p.vx;
          p.y += p.vy + wave;

          // Robust horizon check (endpoint + segment-crossing) to prevent tunneling leaks.
          if (hasBhAbsorbCheck && PARAM.bhDirectCaptureEnabled) {
            for (let bIdx = 0; bIdx < blackHoles.length; bIdx += 1) {
              const b = blackHoles[bIdx];
              if ((b.absorbLockFrames || 0) > 0) continue;
              const r2 = b.Rabs * b.Rabs;
              const dx = shortestWrappedDelta(b.x, p.x, wrapW);
              const dy = shortestWrappedDelta(b.y, p.y, wrapH);
              const insideNow = (dx * dx + dy * dy) < r2;
              const prevNear = torusRelativePoint(prevX, prevY, b.x, b.y, wrapW, wrapH);
              const currNear = torusRelativePoint(p.x, p.y, b.x, b.y, wrapW, wrapH);
              const crossed = segmentIntersectsCircle(prevNear.x, prevNear.y, currNear.x, currNear.y, b.x, b.y, r2);
              if (insideNow || crossed) {
                absorbParticleIntoBlackHole(b, p);
                removeParticleAt(i);
                absorbed = true;
                break;
              }
            }
          }
          if (absorbed) {
            i -= 1;
            continue;
          }

          p.life += (Math.random() - 0.5) * PARAM.lifeJitter;
          if (p.life < PARAM.lifeMin) p.life = PARAM.lifeMin;
          if (p.life > PARAM.lifeMax) p.life = PARAM.lifeMax;
          p.flash = (p.flash || 0) * PARAM.collisionFlashDecay;
          p.heat = (p.heat || 0) * PARAM.collisionHeatDecay;
          const tempNow = Number.isFinite(p.tempK)
            ? p.tempK
            : equilibriumTemperatureK(p.r, p.stellarClass || 'main');
          const coolRefR = Math.max(0.1, PARAM.tempCoolingRadiusRef || 2.0);
          const coolPow = Math.max(0.05, PARAM.tempCoolingRadiusPower || 1.0);
          const rScale = Math.pow(Math.max(0.1, p.r) / coolRefR, coolPow);
          const lumClass = luminosityClassFromParticle(p);
          const classScale = coolingHalfLifeMultiplierForLumClass(lumClass);
          let bbPostCoolingMul = 1;
          if (bbPostResBoostStartMs >= 0) {
            const elapsedMs = Math.max(0, nowMs - bbPostResBoostStartMs);
            const halfLifeMsRes = Math.max(1, (PARAM.bbPostResBoostHalfLifeSec || 5) * 1000);
            const minMul = clamp(PARAM.bbPostCoolingHalfLifeMulMin || 1, 0.05, 1);
            const fastSec = Math.max(0, PARAM.bbPostCoolingFastSec || 0);
            const fastMul = clamp(PARAM.bbPostCoolingFastMul || 1, 0.05, 1);
            // BB直後は冷却半減期を短くし、時間経過で通常値(1)へ戻す。
            bbPostCoolingMul = 1 - ((1 - minMul) * Math.pow(0.5, elapsedMs / halfLifeMsRes));
            if (elapsedMs < (fastSec * 1000)) {
              bbPostCoolingMul = Math.min(bbPostCoolingMul, fastMul);
            }
          }
          const halfLifeMs = Math.max(1, PARAM.tempHalfLifeSec * 1000 * rScale * classScale * bbPostCoolingMul);
          const decay = Math.pow(0.5, dtMs / halfLifeMs);
          p.tempK = clamp(tempNow * decay, PARAM.tempMinK, PARAM.tempMaxK);
          evolveParticleStageAndTemperature(p, dtSec);
          if (PARAM.forceAllMinTempForCalibration) {
            // Temporary calibration mode: force every star to the current minimum temperature.
            p.tempK = PARAM.tempMinK;
          }
          if (p.evoStage === 'supernova') {
            const holdSec = Math.max(0, PARAM.evoSupernovaHoldSec || 0);
            if ((p.evoAgeSec || 0) >= holdSec) {
              if (triggerSupernovaCollapse(p)) {
                removeParticleAt(i);
                i -= 1;
                continue;
              }
              // If collapse is temporarily blocked (e.g. spawn guard), keep SN visible and retry.
              p.evoAgeSec = Math.max(0, holdSec - 0.12);
            }
          }
          totalTempK += p.tempK;
          if (canPreCollapseGlow && (p.collisionCount || 0) >= preCollThreshold) {
            // Expensive mass check only for near-threshold particles.
            const m = Math.max(0.0001, Number.isFinite(p.mass) ? p.mass : particleMassFromRadius(p.r));
            if (m >= preMassThreshold) {
              p.flash = Math.min(
                PARAM.preCollapseFlashMax,
                (p.flash || 0) + PARAM.preCollapseFlashGain
              );
              p.heat = Math.min(1, (p.heat || 0) + PARAM.preCollapseHeatGain);
            }
          }
          if (!p.capturedByBh) {
            totalEnergy += particleBrightnessEnergy(p);
          }

          if (p.x < 0) p.x += w;
          if (p.x >= w) p.x -= w;
          if (p.y < 0) p.y += h;
          if (p.y >= h) p.y -= h;

          if (p.capturedByBh) {
            continue;
          }

          // Twinkle suspended: keep brightness behavior identical to non-collision mode.
          let alpha = 1.02 * p.life + 0.07;
          const heat = clamp(p.heat || 0, 0, 1);
          const renderTempK = clamp(
            (Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK) + (heat * PARAM.tempRenderBoostPerHeatK),
            PARAM.tempMinK,
            PARAM.tempMaxK
          );
          const renderRgb = kelvinToRgb(renderTempK);
          let dr = renderRgb.r;
          let dg = renderRgb.g;
          let db = renderRgb.b;
          const blueT = clamp(
            (renderTempK - PARAM.tempBlueShiftStartK) / Math.max(1, PARAM.tempMaxK - PARAM.tempBlueShiftStartK),
            0,
            1
          ) * clamp(PARAM.tempBlueShiftStrength, 0, 1);
          if (blueT > 0) {
            dr = Math.round(lerp(dr, dr * 0.34, blueT));
            dg = Math.round(lerp(dg, dg * 0.48, blueT));
            db = Math.round(lerp(db, 255, blueT));
            alpha = Math.min(1.45, alpha * (1 + blueT * Math.max(0, PARAM.tempBlueLuminanceBoost)));
          }
          // Continuous warm/cool grading so the population transitions smoothly between red-orange and blue.
          const warmT = clamp((6000 - renderTempK) / Math.max(1, 6000 - PARAM.tempMinK), 0, 1);
          const coolT = clamp((renderTempK - 8000) / Math.max(1, PARAM.tempMaxK - 8000), 0, 1);
          if (warmT > 0) {
            const t = warmT * 0.72;
            dr = Math.round(lerp(dr, 255, t));
            dg = Math.round(lerp(dg, 84, t));
            db = Math.round(lerp(db, 66, t));
            alpha = Math.min(1.45, alpha * (1 + warmT * 0.14));
          }
          if (coolT > 0) {
            const t = coolT * 0.4;
            dr = Math.round(lerp(dr, 86, t));
            dg = Math.round(lerp(dg, 156, t));
            db = Math.round(lerp(db, 255, t));
            alpha = Math.min(1.35, alpha * (1 + coolT * 0.28));
          }
          const tempNorm = clamp(renderTempK / Math.max(1, PARAM.tempMaxK), 0, 1);
          const tempLum = lerp(
            clamp(PARAM.tempBrightnessMin, 0, 1),
            1,
            Math.pow(tempNorm, Math.max(0.1, PARAM.tempBrightnessGamma))
          );
          alpha *= tempLum;
          alpha *= hrLuminosityAlphaScale(p.r, renderTempK);
          alpha *= stellarClassAlphaScale(p.stellarClass || 'main');
          alpha *= Math.max(0, PARAM.globalStarBrightnessMul || 1);
          alpha = clamp(alpha, 0.04, 2.4);
          if (p.isEarth) {
            dr = 0;
            dg = 255;
            db = 0;
          }
          p.cr = dr;
          p.cg = dg;
          p.cb = db;
          p.color = dr + ',' + dg + ',' + db;
          ctx.fillStyle = 'rgba(' + dr + ',' + dg + ',' + db + ',' + alpha.toFixed(3) + ')';
          const relaxPerSec = Math.max(0, PARAM.displayRadiusRelaxPerSec || 0);
          const rPhys = Math.max(0.2, Number.isFinite(p.r) ? p.r : 0.2);
          const prevDisplayR = Math.max(0.2, Number.isFinite(p.displayR) ? p.displayR : rPhys);
          const rt = 1 - Math.exp(-relaxPerSec * dtSec);
          const drawR = Math.max(0.2, lerp(prevDisplayR, rPhys, rt));
          p.displayR = drawR;
          const cx = p.x + p.r * 0.5;
          const cy = p.y + p.r * 0.5;
          const glowAlphaT = clamp(
            (alpha - PARAM.starGlowAlphaStart) / Math.max(0.0001, PARAM.starGlowAlphaEnd - PARAM.starGlowAlphaStart),
            0,
            1
          );
          const glowTempT = clamp(
            (renderTempK - PARAM.starGlowTempStartK) / Math.max(1, PARAM.starGlowTempEndK - PARAM.starGlowTempStartK),
            0,
            1
          );
          const glowStrength = Math.pow(glowAlphaT, 1.2) * (0.35 + 0.65 * glowTempT);
          const flashNorm = clamp(
            (p.flash || 0) / Math.max(1e-9, PARAM.collisionFlashMax || 1),
            0,
            1
          );
          const collisionGlowLocked = !!p.collisionGlowLocked;
          const collisionGlowStrength = collisionGlowLocked
            ? Math.max(0, PARAM.collisionGlowLockedStrength || 0)
            : flashNorm * Math.max(0, PARAM.collisionGlowMinStrength || 0);
          const lumClassForGlow = luminosityClassFromParticle(p);
          const giantLumGlow = (lumClassForGlow === 'I' || lumClassForGlow === 'II' || lumClassForGlow === 'III');
          const lumIIIWarmGlow =
            lumClassForGlow === 'III' &&
            renderTempK < 7000;
          const priorityGlow =
            drawR >= Math.max(0.5, PARAM.largeStarGlowPriorityRadius || 6.0) ||
            giantLumGlow ||
            collisionGlowLocked ||
            flashNorm >= clamp(PARAM.collisionGlowPriorityFlash || 0, 0, 1);
          const glowStrengthEff = priorityGlow
            ? Math.max(
              glowStrength,
              collisionGlowStrength,
              giantLumGlow ? Math.max(0, PARAM.lumGiantGlowMinStrength || 0) : 0,
              lumIIIWarmGlow ? Math.max(0, PARAM.lumIIIWarmGlowStrengthBoost || 0) : 0,
              Math.max(0, PARAM.largeStarGlowMinStrength || 0)
            )
            : Math.max(glowStrength, collisionGlowStrength);
          const wrapOffsets = [[0, 0]];
          if (drawR >= 6.5) {
            const edgePad = drawR;
            const drawX = cx - drawR * 0.5;
            const drawY = cy - drawR * 0.5;
            const xNearL = drawX < edgePad;
            const xNearR = (drawX + drawR) > (w - edgePad);
            const yNearT = drawY < edgePad;
            const yNearB = (drawY + drawR) > (h - edgePad);
            if (xNearL) wrapOffsets.push([w, 0]);
            if (xNearR) wrapOffsets.push([-w, 0]);
            if (yNearT) wrapOffsets.push([0, h]);
            if (yNearB) wrapOffsets.push([0, -h]);
            if (xNearL && yNearT) wrapOffsets.push([w, h]);
            if (xNearL && yNearB) wrapOffsets.push([w, -h]);
            if (xNearR && yNearT) wrapOffsets.push([-w, h]);
            if (xNearR && yNearB) wrapOffsets.push([-w, -h]);
          }

          for (let oi = 0; oi < wrapOffsets.length; oi += 1) {
            const ox = wrapOffsets[oi][0];
            const oy = wrapOffsets[oi][1];
            const dcx = cx + ox;
            const dcy = cy + oy;
            const giantGlowBypass = giantLumGlow;
            if (
              glowRenderingEnabled &&
              !p.isEarth &&
              (
                giantGlowBypass ||
                (
                  glowStrengthEff >= PARAM.starGlowStrengthMin &&
                  (priorityGlow || glowMaxPerFrame <= 0 || glowDrawCount < glowMaxPerFrame)
                )
              )
            ) {
              const glowScale = lerp(1.25, PARAM.giantStarGlowRadiusScale, glowStrengthEff);
              const glowScaleTrimmed = 1 + ((glowScale - 1) * 0.5);
              const glowR = Math.max(1.2, drawR * glowScaleTrimmed);
              const coreR = Math.max(0.45, drawR * 0.46);
              const coolScale = renderTempK < 5200
                ? clamp(PARAM.starGlowCoolAlphaScale, 0.1, 1)
                : 1;
              let glowAlpha = clamp(PARAM.giantStarGlowAlpha * alpha * glowStrengthEff * coolScale, 0, 1);
              if (priorityGlow) {
                glowAlpha = Math.max(glowAlpha, clamp(PARAM.largeStarGlowMinAlpha || 0, 0, 1));
              }
              if (giantLumGlow) {
                glowAlpha = Math.max(glowAlpha, clamp(PARAM.lumGiantGlowMinAlpha || 0, 0, 1));
              }
              if (lumIIIWarmGlow) {
                glowAlpha = clamp(glowAlpha + Math.max(0, PARAM.lumIIIWarmGlowAlphaBoost || 0), 0, 1);
              }
              const grad = ctx.createRadialGradient(dcx, dcy, coreR * 0.35, dcx, dcy, glowR);
              grad.addColorStop(0, 'rgba(' + dr + ',' + dg + ',' + db + ',' + glowAlpha.toFixed(3) + ')');
              grad.addColorStop(1, 'rgba(' + dr + ',' + dg + ',' + db + ',0)');
              ctx.fillStyle = grad;
              ctx.beginPath();
              ctx.arc(dcx, dcy, glowR, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = 'rgba(' + dr + ',' + dg + ',' + db + ',' + alpha.toFixed(3) + ')';
              glowDrawCount += 1;
            }
            if (drawR > 3) {
              ctx.beginPath();
              ctx.arc(dcx, dcy, drawR * 0.52, 0, Math.PI * 2);
              ctx.fill();
            } else {
              const drawX = (dcx - drawR * 0.5);
              const drawY = (dcy - drawR * 0.5);
              ctx.fillRect(drawX, drawY, drawR, drawR);
            }
            if (oi === 0) {
              if (bhArrowEnabled && p.isEarth) {

        updateBlackHoles(dtMs);

            cleanHintStartMs = nowMs;

        } else {

      function explode(x, y) {
        const blastR2 = currentBlastR * currentBlastR;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const dx = shortestWrappedDelta(p.x, x, w);
          const dy = shortestWrappedDelta(p.y, y, h);
          const d2 = dx * dx + dy * dy;
          if (d2 < 1 || d2 > blastR2) continue;
          const d = Math.sqrt(d2);
          const u = 1 - (d / currentBlastR);
          const impulse = PARAM.blastImpulse * u;
          p.vx += (dx / d) * impulse;
          p.vy += (dy / d) * impulse;
          const tempNow = Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK;
          p.tempK = clamp(tempNow + (PARAM.mouseRepulseHeatGainK * u), PARAM.tempMinK, PARAM.tempMaxK);
          p.life = Math.min(1, p.life + 0.2);
        }
      }

      function gravitateClick(x, y, impulseScale) {
        const scale = impulseScale == null ? 1 : impulseScale;
        const blastR2 = currentBlastR * currentBlastR;
        for (let i = 0; i < particles.length; i += 1) {
          const p = particles[i];
          const dx = shortestWrappedDelta(x, p.x, w);
          const dy = shortestWrappedDelta(y, p.y, h);
          const d2 = dx * dx + dy * dy;
          if (d2 < 1 || d2 > blastR2) continue;
          const d = Math.sqrt(d2);
          const u = 1 - (d / currentBlastR);
          const impulse = PARAM.blastImpulse * u * scale;
          p.vx += (dx / d) * impulse;
          p.vy += (dy / d) * impulse;
          const tempNow = Number.isFinite(p.tempK) ? p.tempK : PARAM.tempMinK;
          p.tempK = clamp(tempNow + (PARAM.mouseRepulseHeatGainK * u * scale), PARAM.tempMinK, PARAM.tempMaxK);
          p.life = Math.min(1, p.life + 0.2);
        }
      }

      function currentFullscreenElement() {
        return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement || null;
      }

      async function requestDocumentFullscreen(targetEl) {
        const el = targetEl || document.documentElement;
        if (el.requestFullscreen) {
          await el.requestFullscreen();
          return true;
        }
        if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
          return true;
        }
        if (el.msRequestFullscreen) {
          el.msRequestFullscreen();
          return true;
        }
        return false;
      }

      async function exitDocumentFullscreen() {
        if (document.exitFullscreen) {
          await document.exitFullscreen();
          return true;
        }
        if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
          return true;
        }
        if (document.msExitFullscreen) {
          document.msExitFullscreen();
          return true;
        }
        return false;
      }

      function syncFullscreenButton() {

        fullscreenToggleBtn.setAttribute('aria-label', active ? 'Exit fullscreen' : 'Enter fullscreen');
      }

      async function ensureFullscreenOff() {
        if (pseudoFullscreenActive) {
          setPseudoFullscreen(false);

        if (!currentFullscreenElement()) return;
        try {
          await exitDocumentFullscreen();
        } catch (_err) {
          // Ignore fullscreen errors from browser policy/user gesture constraints.
        }
      }

      async function applyPreset(id) {
        if (id === 1) {
          // Preset 1 baseline.
          collisionModeEnabled = false;      // c
          particleGravityEnabled = false;    // g
          setFlowMode(true);                 // H
          hudVisible = false;                // i
          linksHidden = true;                // l
          mouseGravityEnabled = true;        // M
          noFrictionModeEnabled = false;     // n
          bhArrowEnabled = false;            // b
          rightPanelHidden = false;          // P
          clockStarModeEnabled = false;      // k
          setPauseState(false);              // ||
          await ensureFullscreenOff();       // f
        } else if (id === 4) {
          // Preset 4: based on preset 3 with no gravity, h on, k on, and clock/date hidden.
          collisionModeEnabled = false;      // c
          particleGravityEnabled = false;    // g
          setFlowMode(true);                 // H
          hudVisible = false;                // i
          linksHidden = true;                // l
          mouseGravityEnabled = false;       // m
          noFrictionModeEnabled = false;     // n
          bhArrowEnabled = false;            // b
          clockVisible = false;              // t
          clockDateVisible = false;          // d
          rightPanelHidden = true;           // p
          clockStarModeEnabled = true;       // K
        } else if (id === 2) {
          collisionModeEnabled = true;       // C
          particleGravityEnabled = true;     // G
          setFlowMode(false);                // h
          hudVisible = true;                 // I
          linksHidden = false;               // L
          mouseGravityEnabled = false;       // m
          noFrictionModeEnabled = false;     // n
          bhArrowEnabled = true;             // B
          clockVisible = false;              // t
          clockDateVisible = false;          // d
          rightPanelHidden = false;          // P
          clockStarModeEnabled = false;      // k
          setPauseState(false);              // ||
          await ensureFullscreenOff();       // f
        } else if (id === 3) {
          collisionModeEnabled = false;      // c
          particleGravityEnabled = true;     // G
          setFlowMode(false);                // h
          hudVisible = false;                // i
          linksHidden = true;                // l
          mouseGravityEnabled = false;       // m
          noFrictionModeEnabled = false;     // n
          bhArrowEnabled = false;            // b
          clockVisible = true;               // T
          clockDateVisible = true;           // D
          rightPanelHidden = true;           // p
          clockStarModeEnabled = false;      // k
        } else if (id === 5) {
          // Preset 5: preset 3 + collision on.
          collisionModeEnabled = true;       // C
          particleGravityEnabled = true;     // G
          setFlowMode(false);                // h
          hudVisible = false;                // i
          linksHidden = true;                // l
          mouseGravityEnabled = false;       // m
          noFrictionModeEnabled = false;     // n
          bhArrowEnabled = false;            // b
          clockVisible = true;               // T
          clockDateVisible = true;           // D
          rightPanelHidden = true;           // p
          clockStarModeEnabled = false;      // k
        } else {
          return;
        }
        syncCollisionToggle();
        syncParticleGravityToggle();
        syncMouseGravityToggle();
        syncFrictionToggle();
        syncBhArrowToggle();
        syncUniverseHudVisibility();
        syncLinksVisibility();
        syncClockVisibility();
        syncClockDateVisibility();
        syncClockStarToggleButton();
        syncRightPanelVisibility();
      }

      async function toggleFullscreen() {
        try {
          if (!currentFullscreenElement() && !pseudoFullscreenActive) {
            const ok = await requestDocumentFullscreen(document.documentElement);
            if (!ok || !currentFullscreenElement()) {
              setPseudoFullscreen(true);
            }
          } else {
            setPseudoFullscreen(false);
            if (currentFullscreenElement()) {
              await exitDocumentFullscreen();
            }
          }
        } catch (_err) {
          // Fallback for browsers/policies that block Fullscreen API.
          setPseudoFullscreen(!pseudoFullscreenActive);
        }
        syncFullscreenButton();
      }

      panelToggleBtn.addEventListener('click', () => {
        rightPanelHidden = !rightPanelHidden;
        syncRightPanelVisibility();
      });
      panelToggleBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      resetLayoutBtn.addEventListener('click', () => {
        resize();
      });
      resetLayoutBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      starExportBtn.addEventListener('click', () => {
        downloadStarCsv();
      });
      starExportBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      relayoutBtn.addEventListener('click', () => {
        resetLayout();
      });
      relayoutBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      fullscreenToggleBtn.addEventListener('click', async () => {
        await toggleFullscreen();
      });
      fullscreenToggleBtn.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      document.addEventListener('fullscreenchange', syncFullscreenButton);
      document.addEventListener('webkitfullscreenchange', syncFullscreenButton);
      document.addEventListener('msfullscreenchange', syncFullscreenButton);
      window.addEventListener('orientationchange', () => {
        setTimeout(() => {
          if (pseudoFullscreenActive) window.scrollTo(0, 1);
        }, 80);
      }, { passive: true });

      window.addEventListener('resize', resetLayout, { passive: true });
      syncLinksVisibility();
      syncParticleGravityToggle();
      syncMouseGravityToggle();
      syncCollisionToggle();
      syncFlowToggle();
      syncAgingToggle();
      syncFrictionToggle();
      syncHoverInfoToggle();
      syncBhArrowToggle();
      syncUniverseHudVisibility();
      syncClockVisibility();
      syncClockDateVisibility();
      syncClockStarToggleButton();
      syncCustomTextFontSize();
      syncCustomTextBoxWidth();
      syncCustomTextVisibility();
      setCustomTextEditing(false);
      syncCustomTextPlaceholder();
      syncCustomTextAutoHeight();
      syncCustomTextToggleButton();
      syncFullscreenButton();
      updateUniverseHud(true);
      updateWallClock();
      setInterval(updateWallClock, 1000);
      syncRightPanelVisibility();
      const presetParam = Number(new URLSearchParams(window.location.search).get('preset'));
      if (Number.isInteger(presetParam) && presetParam >= 1 && presetParam <= 5) {
        void applyPreset(presetParam);
      }
      init();
    })();
  </script>
</body>
</html>
