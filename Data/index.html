<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Utilities</title>
  <link rel="icon" href="../shared/icons/computer science.svg" type="image/svg+xml">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-118J91MG59"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-118J91MG59');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/back-to-hub.css">
  <script defer src="../shared/back-to-hub.js"></script>
  <style>
    :root {
      --bg-1: #f2f7fb;
      --bg-2: #d9e8f4;
      --panel: rgba(255, 255, 255, 0.84);
      --panel-strong: rgba(251, 253, 255, 0.96);
      --line: rgba(41, 86, 127, 0.16);
      --line-strong: rgba(41, 86, 127, 0.32);
      --text: #16314b;
      --muted: #5d7388;
      --accent: #1574b6;
      --accent-soft: rgba(21, 116, 182, 0.12);
      --danger: #b94d58;
      --shadow: 0 14px 34px rgba(31, 62, 97, 0.12);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--text);
      font-family: "Noto Sans JP", system-ui, sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(89, 165, 225, 0.24), transparent 28%),
        radial-gradient(circle at 100% 10%, rgba(91, 201, 188, 0.2), transparent 22%),
        linear-gradient(155deg, var(--bg-1) 0%, var(--bg-2) 100%);
      padding: 18px 14px 24px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .hero,
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .hero {
      overflow: hidden;
    }

    .hero-band {
      height: 8px;
      background: linear-gradient(90deg, #0e67a2 0%, #49ace2 48%, #77d2c1 100%);
    }

    .hero-body {
      padding: 14px 18px;
      display: grid;
      gap: 4px;
    }

    .eyebrow,
    .section-title {
      margin: 0;
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 42px);
      line-height: 1;
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .helper,
    .panel-text,
    .note-list li,
    .mode-help {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .panel {
      padding: 14px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(320px, 0.95fr);
      gap: 10px;
      align-items: start;
    }

    .pane {
      min-width: 0;
    }

    .panel-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn,
    .icon-btn,
    .delimiter-select,
    .field input,
    .field select {
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      min-height: 34px;
      box-shadow: 0 3px 10px rgba(37, 72, 110, 0.05);
    }

    .btn,
    .icon-btn {
      cursor: pointer;
      font-weight: 700;
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    .btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.01);
      box-shadow: 0 6px 16px rgba(37, 72, 110, 0.09);
    }

    .btn {
      padding: 0 12px;
      background: linear-gradient(180deg, #ffffff, #edf6fd);
    }

    .btn-primary {
      border-color: rgba(21, 116, 182, 0.28);
      background: linear-gradient(180deg, #eff8ff, #dff0fd);
      color: #0d5d95;
    }

    .btn-secondary {
      background: linear-gradient(180deg, #f1fffb, #e2faf2);
      color: #14775d;
    }

    .btn-output {
      background: linear-gradient(180deg, #f1fffb, #dff7ee);
      color: #14684f;
      border-color: rgba(20, 119, 93, 0.24);
    }

    .btn-fit {
      background: linear-gradient(180deg, #eff8ff, #deeffd);
      color: #0d5d95;
      border-color: rgba(21, 116, 182, 0.24);
    }

    .btn-peak {
      background: linear-gradient(180deg, #fff8ee, #ffefd8);
      color: #9a5b0f;
      border-color: rgba(188, 132, 43, 0.26);
    }

    .select-stack {
      display: grid;
      gap: 4px;
      min-width: 132px;
    }

    .select-stack label,
    .field label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .delimiter-select,
    .field select,
    .field input {
      width: 100%;
      padding: 0 10px;
    }

    .variable-list {
      display: grid;
      gap: 8px;
    }

    .variable-row {
      display: grid;
      grid-template-columns: 28px 56px minmax(76px, 0.78fr) minmax(76px, 0.78fr) 84px minmax(84px, 0.86fr) minmax(84px, 0.86fr) 42px;
      gap: 8px;
      align-items: end;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--panel-strong);
      transition: border-color 120ms ease, background-color 120ms ease, opacity 120ms ease;
    }

    .variable-row.dragging {
      opacity: 0.55;
    }

    .variable-row.drop-target {
      border-color: rgba(21, 116, 182, 0.5);
      background: rgba(21, 116, 182, 0.06);
    }

    .drag-handle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: linear-gradient(180deg, #f8fbfe, #eef5fb);
      color: var(--muted);
      cursor: grab;
      user-select: none;
      box-shadow: 0 3px 10px rgba(37, 72, 110, 0.05);
      font-size: 14px;
      font-weight: 800;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .var-name-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: linear-gradient(180deg, #f8fbfe, #eef5fb);
      color: var(--accent);
      font-weight: 800;
      box-shadow: 0 3px 10px rgba(37, 72, 110, 0.05);
    }

    .field {
      display: grid;
      gap: 4px;
    }

    .field input:focus,
    .field select:focus,
    .delimiter-select:focus,
    .output-box:focus {
      outline: 2px solid rgba(21, 116, 182, 0.25);
      outline-offset: 0;
      border-color: rgba(21, 116, 182, 0.44);
    }

    .field.hidden {
      display: none;
    }

    .icon-btn {
      width: 42px;
      padding: 0;
      color: var(--danger);
      background: linear-gradient(180deg, #fff8f8, #ffeef0);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .output-box {
      width: 100%;
      min-height: 190px;
      padding: 10px 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-md);
      background: #fbfdff;
      color: #0f2740;
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.45;
      resize: vertical;
      white-space: pre;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .mini-panel {
      display: grid;
      gap: 8px;
    }

    .compact-note {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .quick-fit-box {
      display: grid;
      gap: 8px;
    }

    .quick-fit-layout {
      display: grid;
      grid-template-columns: minmax(210px, 0.72fr) minmax(180px, 0.62fr) minmax(300px, 1.1fr) minmax(180px, 0.72fr);
      gap: 10px;
      align-items: start;
    }

    .quick-fit-pane {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .quick-fit-right {
      display: grid;
      grid-template-columns: minmax(360px, 1.72fr) minmax(190px, 0.82fr);
      gap: 8px;
      align-items: start;
      padding-left: 72px;
    }

    .quick-fit-right-side {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .quick-fit-output-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .quick-fit-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .quick-fit-file {
      max-width: 260px;
      font-size: 12px;
    }

    .quick-fit-degree {
      width: 68px;
      text-align: center;
    }

    .quick-fit-degree-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .quick-fit-degree-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .quick-fit-stepper {
      width: 32px;
      min-width: 32px;
      padding: 0;
    }

    .quick-fit-input {
      width: 100%;
      min-height: 110px;
      padding: 10px 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-md);
      background: #fbfdff;
      color: #0f2740;
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.45;
      resize: vertical;
      white-space: pre;
    }

    .quick-fit-input:focus {
      outline: 2px solid rgba(21, 116, 182, 0.25);
      outline-offset: 0;
      border-color: rgba(21, 116, 182, 0.44);
    }

    .quick-fit-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-items: end;
    }

    .quick-fit-range {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .quick-fit-stat {
      padding: 2px 0 4px;
      border: 0;
      border-bottom: 1px solid rgba(41, 86, 127, 0.14);
      border-radius: 0;
      background: transparent;
    }

    .quick-fit-stat-label {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .quick-fit-stat-value {
      margin: 4px 0 0;
      color: var(--text);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 12px;
      font-weight: 700;
    }

    .quick-fit-mask {
      display: grid;
      gap: 6px;
    }

    .quick-fit-mask-row {
      display: grid;
      grid-template-columns: 40px 68px minmax(87px, 1.4fr) minmax(72px, 1.1fr);
      gap: 6px;
      align-items: center;
    }

    .quick-fit-mask-name {
      color: var(--muted);
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 11px;
      font-weight: 700;
    }

    .quick-fit-mask-mode,
    .quick-fit-mask-value,
    .quick-fit-mask-error {
      min-height: 30px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      padding: 0 8px;
      font-size: 11px;
    }

    .quick-fit-mask-value[readonly] {
      background: linear-gradient(180deg, #f8fbfe, #eef5fb);
      color: #1b4f78;
      border-color: rgba(21, 116, 182, 0.22);
      font-weight: 700;
      cursor: default;
    }

    .quick-fit-mask-error {
      background: linear-gradient(180deg, #fffaf3, #fff3df);
      color: #8a5a17;
      border-color: rgba(188, 132, 43, 0.26);
      font-weight: 700;
    }

    .quick-fit-plot {
      min-height: 280px;
      border: 1px solid rgba(41, 86, 127, 0.08);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
    }

    .quick-fit-plot svg {
      display: block;
      width: 100%;
      height: 280px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(239, 247, 253, 0.52));
    }

    .quick-fit-curve-output {
      width: 100%;
      min-height: 150px;
      padding: 10px 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-md);
      background: #fbfdff;
      color: #0f2740;
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 11px;
      line-height: 1.4;
      resize: vertical;
      white-space: pre;
    }

    .quick-fit-curve-output:focus {
      outline: 2px solid rgba(21, 116, 182, 0.25);
      outline-offset: 0;
      border-color: rgba(21, 116, 182, 0.44);
    }

    .quick-fit-empty {
      display: grid;
      place-items: center;
      min-height: 280px;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }

    .note-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    .status-ok {
      color: #167859;
    }

    .status-error {
      color: var(--danger);
    }

    @media (max-width: 980px) {
      body {
        padding: 68px 10px 18px;
      }

      .hero-body,
      .panel {
        padding: 12px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .quick-fit-layout {
        grid-template-columns: 1fr;
      }

      .quick-fit-right {
        grid-template-columns: 1fr;
      }

      .variable-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .icon-btn {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .panel-head,
      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .variable-row {
        grid-template-columns: 1fr;
      }

      .output-box {
        min-height: 170px;
      }

      .quick-fit-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body data-page-version="0.2.0" data-page-updated="2026-03-11">
  <main class="shell">
    <section class="hero">
      <div class="hero-band" aria-hidden="true"></div>
      <div class="hero-body">
        <h1>Data Utilities</h1>
      </div>
    </section>

    <section class="panel">
      <section class="workspace">
        <section class="pane">
        <div class="panel-head">
          <div>
            <h2 class="section-title">Variables</h2>
          </div>
          <div class="controls">
            <div class="select-stack">
              <label for="delimiterSelect">Delimiter</label>
              <select id="delimiterSelect" class="delimiter-select">

        </section>

        <section class="pane">

          </div>
          <textarea id="outputBox" class="output-box" spellcheck="false" placeholder="Generated output appears here."></textarea>
        </section>
      </section>
    </section>

    <section class="panel mini-panel">
      <div class="panel-head">
        <div>
          <h2 class="section-title">Quick Fit</h2>
        </div>
      </div>
      <div class="quick-fit-box">
        <div class="quick-fit-layout">
          <section class="quick-fit-pane">
            <div class="quick-fit-controls">
              <input id="quickFitFile" class="quick-fit-file" type="file" accept=".txt,.csv,.dat,.tsv,text/plain">
              <button id="quickFitClearBtn" class="btn" type="button">Clear</button>
            </div>
            <span id="quickFitStatus" class="compact-note">Load two-column data</span>
            <textarea id="quickFitInput" class="quick-fit-input" spellcheck="false" placeholder="x y&#10;0 1.1&#10;1 2.9&#10;2 5.2">0 1.1
1 2.9
2 5.2
3 7.0
4 8.9
5 11.2</textarea>
          </section>

              <div class="quick-fit-degree-wrap">

              </div>
            </div>
          </section>
        </div>
      </div>
    </section>

    <section class="panel mini-panel">

      </div>

            </div>

            <textarea id="quickPeakInput" class="quick-fit-input" spellcheck="false" placeholder="x y&#10;-3 0.3&#10;-2 0.5&#10;-1 1.2">-5 0.25

-3 0.36
-2 0.58

          </section>
          <section class="quick-fit-pane">
            <div class="quick-fit-controls">

            <div class="quick-fit-summary">

                <p id="quickPeakCount" class="quick-fit-stat-value">0</p>
              </div>

  <template id="variableRowTemplate">
    <section class="variable-row">
      <div class="field">
        <label>Move</label>
        <div class="drag-handle" draggable="true" title="Drag to reorder">::</div>
      </div>

        <label>Variable</label>
        <div class="var-name-chip name-chip">x1</div>
      </div>
      <div class="field">
        <label>Start</label>

  <script>
    (function () {
      const variableList = document.getElementById("variableList");
      const rowTemplate = document.getElementById("variableRowTemplate");
      const addVariableBtn = document.getElementById("addVariableBtn");
      const generateBtn = document.getElementById("generateBtn");
      const delimiterSelect = document.getElementById("delimiterSelect");
      const outputBox = document.getElementById("outputBox");
      const copyBtn = document.getElementById("copyBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const statusText = document.getElementById("statusText");
      const columnCountText = document.getElementById("columnCountText");
      const rowCountText = document.getElementById("rowCountText");
      const quickFitFile = document.getElementById("quickFitFile");
      const quickFitDegree = document.getElementById("quickFitDegree");
      const quickFitDegreeDownBtn = document.getElementById("quickFitDegreeDownBtn");
      const quickFitDegreeUpBtn = document.getElementById("quickFitDegreeUpBtn");
      const quickFitRunBtn = document.getElementById("quickFitRunBtn");
      const quickFitClearBtn = document.getElementById("quickFitClearBtn");
      const quickFitInput = document.getElementById("quickFitInput");
      const quickFitStatus = document.getElementById("quickFitStatus");
      const quickFitCount = document.getElementById("quickFitCount");
      const quickFitR2 = document.getElementById("quickFitR2");
      const quickFitCurveMin = document.getElementById("quickFitCurveMin");
      const quickFitCurveMax = document.getElementById("quickFitCurveMax");
      const quickFitCurveCount = document.getElementById("quickFitCurveCount");
      const quickFitCurveCopyBtn = document.getElementById("quickFitCurveCopyBtn");
      const quickFitCurveSaveBtn = document.getElementById("quickFitCurveSaveBtn");
      const quickFitMask = document.getElementById("quickFitMask");
      const quickFitPlot = document.getElementById("quickFitPlot");
      const quickFitCurveOutput = document.getElementById("quickFitCurveOutput");
      const quickPeakFile = document.getElementById("quickPeakFile");
      const quickPeakClearBtn = document.getElementById("quickPeakClearBtn");
      const quickPeakInput = document.getElementById("quickPeakInput");
      const quickPeakStatus = document.getElementById("quickPeakStatus");
      const quickPeakModel = document.getElementById("quickPeakModel");
      const quickPeakRunBtn = document.getElementById("quickPeakRunBtn");
      const quickPeakCount = document.getElementById("quickPeakCount");
      const quickPeakR2 = document.getElementById("quickPeakR2");
      const quickPeakCurveMin = document.getElementById("quickPeakCurveMin");
      const quickPeakCurveMax = document.getElementById("quickPeakCurveMax");
      const quickPeakCurveCount = document.getElementById("quickPeakCurveCount");
      const quickPeakCurveCopyBtn = document.getElementById("quickPeakCurveCopyBtn");
      const quickPeakCurveSaveBtn = document.getElementById("quickPeakCurveSaveBtn");
      const quickPeakMask = document.getElementById("quickPeakMask");
      const quickPeakPlot = document.getElementById("quickPeakPlot");
      const quickPeakCurveOutput = document.getElementById("quickPeakCurveOutput");
      let draggedRow = null;

      const defaults = [
        { start: "0", end: "10", scale: "linear", mode: "step", step: "1", count: "" },
        { start: "1", end: "1000", scale: "log", mode: "count", step: "", count: "4" },
        { start: "5", end: "-5", scale: "linear", mode: "step", step: "-2.5", count: "" }
      ];

      function normalizeNumber(value) {
        return Number.parseFloat(Number(value).toPrecision(15));
      }

      function formatNumber(value) {
        if (!Number.isFinite(value)) return "";
        return formatScientific(value);
      }

      function formatMetric(value) {
        if (!Number.isFinite(value)) {
          return "-";
        }
        return formatScientific(value);
      }

      function formatScientific(value) {
        if (!Number.isFinite(value)) {
          return "-";
        }
        if (Object.is(value, -0) || Math.abs(value) < 1e-300) {
          return "0.00000e+0";
        }
        const normalized = normalizeNumber(value);
        return normalized.toExponential(5).replace(/e([+-])0*(\d+)/, "e$1$2");
      }

      function formatTick(value) {
        if (!Number.isFinite(value)) {
          return "-";
        }
        return Number(value).toPrecision(4).replace(/(?:\.0+|(\.\d+?)0+)$/, "$1");
      }

      function clampQuickFitDegree(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
          return 0;
        }
        return Math.min(8, Math.max(0, Math.round(numeric)));
      }

      function updateMaskRowState(row) {
        const mode = row.querySelector(".quick-fit-mask-mode").value;
        const input = row.querySelector(".quick-fit-mask-value");
        input.readOnly = mode !== "fixed";
      }

      function renderQuickFitMask() {
        const degree = clampQuickFitDegree(quickFitDegree.value);
        quickFitDegree.value = String(degree);
        const previous = {};

        Array.from(quickFitMask.querySelectorAll(".quick-fit-mask-row")).forEach(function (row) {
          const index = row.getAttribute("data-index");
          previous[index] = {
            mode: row.querySelector(".quick-fit-mask-mode").value,
            value: row.querySelector(".quick-fit-mask-value").value
          };
        });

        quickFitMask.innerHTML = "";

        for (let i = 0; i <= degree; i += 1) {
          const row = document.createElement("div");
          row.className = "quick-fit-mask-row";
          row.setAttribute("data-index", String(i));
          const saved = previous[String(i)];
          row.innerHTML =
            '<div class="quick-fit-mask-name">c' + i + "</div>"
            + '<select class="quick-fit-mask-mode">'
            + '<option value="free">fit</option>'
            + '<option value="fixed">fix</option>'
            + "</select>"
            + '<input class="quick-fit-mask-value" type="number" step="any" value="0">'
            + '<input class="quick-fit-mask-error" type="text" value="-" readonly>';

          const modeSelect = row.querySelector(".quick-fit-mask-mode");
          const valueInput = row.querySelector(".quick-fit-mask-value");
          modeSelect.value = saved ? saved.mode : "free";
          valueInput.value = saved ? saved.value : "0";
          modeSelect.addEventListener("change", function () {
            updateMaskRowState(row);
          });
          updateMaskRowState(row);
          quickFitMask.appendChild(row);
        }
      }

      function getQuickFitConstraints() {
        return Array.from(quickFitMask.querySelectorAll(".quick-fit-mask-row")).map(function (row, index) {
          const mode = row.querySelector(".quick-fit-mask-mode").value;
          const rawValue = row.querySelector(".quick-fit-mask-value").value;
          const value = Number(rawValue);
          if (mode === "fixed" && !Number.isFinite(value)) {
            throw new Error("Invalid fixed value for c" + index + ".");
          }
          return {
            mode: mode,
            value: mode === "fixed" ? value : 0
          };
        });
      }

      function getQuickPeakParamKeys() {
        const keys = ["center", "amplitude", "width", "offset"];
        if (quickPeakModel.value === "pseudo_voigt") {
          keys.push("eta");
        }
        return keys;
      }

      function updatePeakMaskRowState(row) {
        const mode = row.querySelector(".quick-fit-mask-mode").value;
        const input = row.querySelector(".quick-fit-mask-value");
        input.readOnly = mode !== "fixed";
      }

      function renderQuickPeakMask() {
        const previous = {};
        Array.from(quickPeakMask.querySelectorAll(".quick-fit-mask-row")).forEach(function (row) {
          const key = row.getAttribute("data-key");
          previous[key] = {
            mode: row.querySelector(".quick-fit-mask-mode").value,
            value: row.querySelector(".quick-fit-mask-value").value
          };
        });

        quickPeakMask.innerHTML = "";
        getQuickPeakParamKeys().forEach(function (key) {
          const row = document.createElement("div");
          row.className = "quick-fit-mask-row";
          row.setAttribute("data-key", key);
          const saved = previous[key];
          row.innerHTML =
            '<div class="quick-fit-mask-name">' + key + "</div>"
            + '<select class="quick-fit-mask-mode">'
            + '<option value="free">fit</option>'
            + '<option value="fixed">fix</option>'
            + "</select>"
            + '<input class="quick-fit-mask-value" type="number" step="any" value="0">'
            + '<input class="quick-fit-mask-error" type="text" value="-" readonly>';

          const modeSelect = row.querySelector(".quick-fit-mask-mode");
          const valueInput = row.querySelector(".quick-fit-mask-value");
          modeSelect.value = saved ? saved.mode : "free";
          valueInput.value = saved ? saved.value : "0";
          modeSelect.addEventListener("change", function () {
            updatePeakMaskRowState(row);
          });
          updatePeakMaskRowState(row);
          quickPeakMask.appendChild(row);
        });
      }

      function getQuickPeakConstraints() {
        const constraints = {};
        Array.from(quickPeakMask.querySelectorAll(".quick-fit-mask-row")).forEach(function (row) {
          const key = row.getAttribute("data-key");
          const mode = row.querySelector(".quick-fit-mask-mode").value;
          const rawValue = row.querySelector(".quick-fit-mask-value").value;
          const value = Number(rawValue);
          if (mode === "fixed" && !Number.isFinite(value)) {
            throw new Error("Invalid fixed value for " + key + ".");
          }
          constraints[key] = {
            mode: mode,
            value: mode === "fixed" ? value : 0
          };
        });
        return constraints;
      }

      function getDelimiter() {
        const value = delimiterSelect.value;
        if (value === "comma") return ",";
        if (value === "space") return " ";
        return "\t";
      }

      function applyRowMode(row) {
        const mode = row.querySelector(".mode-select").value;
        const stepField = row.querySelector(".step-field");
        const countField = row.querySelector(".count-field");
        stepField.classList.toggle("hidden", mode !== "step");
        countField.classList.toggle("hidden", mode !== "count");
      }

      function refreshVariableNames() {
        const rows = Array.from(variableList.querySelectorAll(".variable-row"));
        rows.forEach(function (row, index) {
          row.querySelector(".name-chip").textContent = "x" + (index + 1);
        });
      }

      function regenerateIfNeeded() {
        if (!outputBox.value.trim()) {
          return;
        }
        try {
          generateOutput();
        } catch (error) {
          statusText.textContent = error instanceof Error ? error.message : "Regeneration failed.";
          statusText.className = "status-error";
        }
      }

      function clearDropTargets() {
        Array.from(variableList.querySelectorAll(".variable-row")).forEach(function (row) {
          row.classList.remove("drop-target");
        });
      }

      function attachRowDragEvents(row) {
        const handle = row.querySelector(".drag-handle");

        handle.addEventListener("dragstart", function (event) {
          draggedRow = row;
          row.classList.add("dragging");
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", "drag-row");
          }
        });

        handle.addEventListener("dragend", function () {
          row.classList.remove("dragging");
          clearDropTargets();
          draggedRow = null;
        });

        row.addEventListener("dragover", function (event) {
          if (!draggedRow || draggedRow === row) {
            return;
          }
          event.preventDefault();
          clearDropTargets();
          row.classList.add("drop-target");
          if (event.dataTransfer) {
            event.dataTransfer.dropEffect = "move";
          }
        });

        row.addEventListener("dragleave", function (event) {
          if (!row.contains(event.relatedTarget)) {
            row.classList.remove("drop-target");
          }
        });

        row.addEventListener("drop", function (event) {
          if (!draggedRow || draggedRow === row) {
            return;
          }
          event.preventDefault();
          row.classList.remove("drop-target");

          const rect = row.getBoundingClientRect();
          const shouldInsertAfter = event.clientY > rect.top + rect.height / 2;

          if (shouldInsertAfter) {
            row.insertAdjacentElement("afterend", draggedRow);
          } else {
            row.insertAdjacentElement("beforebegin", draggedRow);
          }

          refreshVariableNames();
          updateMeta();
          regenerateIfNeeded();
        });
      }

      function addVariableRow(values) {
        const fragment = rowTemplate.content.cloneNode(true);
        const row = fragment.querySelector(".variable-row");
        const modeSelect = row.querySelector(".mode-select");
        const scaleSelect = row.querySelector(".scale-select");

        row.querySelector(".start-input").value = values && values.start ? values.start : "";
        row.querySelector(".end-input").value = values && values.end ? values.end : "";
        row.querySelector(".step-input").value = values && values.step ? values.step : "";
        row.querySelector(".count-input").value = values && values.count ? values.count : "";
        modeSelect.value = values && values.mode ? values.mode : "step";
        scaleSelect.value = values && values.scale ? values.scale : "linear";

        modeSelect.addEventListener("change", function () {
          applyRowMode(row);
        });

        row.querySelector(".remove-btn").addEventListener("click", function () {
          row.remove();
          refreshVariableNames();
          updateMeta();
          regenerateIfNeeded();
        });

        variableList.appendChild(fragment);
        attachRowDragEvents(variableList.lastElementChild);
        applyRowMode(variableList.lastElementChild);
        refreshVariableNames();
        updateMeta();
      }

      function getLastRowValues() {
        const rows = Array.from(variableList.querySelectorAll(".variable-row"));
        const lastRow = rows[rows.length - 1];
        if (!lastRow) {
          return null;
        }

        return {
          start: lastRow.querySelector(".start-input").value,
          end: lastRow.querySelector(".end-input").value,
          scale: lastRow.querySelector(".scale-select").value,
          mode: lastRow.querySelector(".mode-select").value,
          step: lastRow.querySelector(".step-input").value,
          count: lastRow.querySelector(".count-input").value
        };
      }

      function buildVectorByStepLinear(start, end, stepInput) {
        const step = Math.abs(stepInput);

        if (step === 0) {
          throw new Error("Step cannot be 0.");
        }

        const vector = [];
        const direction = start <= end ? 1 : -1;
        const signedStep = step * direction;
        const epsilon = Math.max(step * 1e-9, 1e-12);
        let current = start;
        let guard = 0;
        const limit = 100000;

        if (start === end) {
          return [formatNumber(start)];
        }

        while (guard < limit) {
          if (direction > 0 && current > end + epsilon) break;
          if (direction < 0 && current < end - epsilon) break;
          vector.push(formatNumber(current));
          current = normalizeNumber(current + signedStep);
          guard += 1;
        }

        if (guard >= limit) {
          throw new Error("Too many data points. Adjust step.");
        }

        return vector;
      }

      function buildVectorByStepLog(start, end, stepInput) {
        const step = Math.abs(stepInput);

        if (start <= 0 || end <= 0) {
          throw new Error("Start and end must be positive in geometric mode.");
        }
        if (step <= 0 || step === 1) {
          throw new Error("Geometric step must be greater than 0 and not equal to 1.");
        }

        const vector = [];
        const ratio = start <= end ? step : 1 / step;
        let current = start;
        let guard = 0;
        const limit = 100000;
        const epsilon = 1e-12;

        if (start === end) {
          return [formatNumber(start)];
        }

        while (guard < limit) {
          if (ratio > 1 && current > end * (1 + epsilon)) break;
          if (ratio < 1 && current < end * (1 - epsilon)) break;
          vector.push(formatNumber(current));
          current = normalizeNumber(current * ratio);
          guard += 1;
        }

        if (guard >= limit) {
          throw new Error("Too many data points. Adjust geometric step.");
        }

        return vector;
      }

      function buildVectorByCountLinear(start, end, count) {
        if (!Number.isInteger(count) || count < 1) {
          throw new Error("Count must be an integer greater than or equal to 1.");
        }
        if (count === 1) {
          return [formatNumber(start)];
        }

        const vector = [];
        const step = (end - start) / (count - 1);

        for (let i = 0; i < count; i += 1) {
          const value = normalizeNumber(start + step * i);
          vector.push(formatNumber(value));
        }

        return vector;
      }

      function buildVectorByCountLog(start, end, count) {
        if (!Number.isInteger(count) || count < 1) {
          throw new Error("Count must be an integer greater than or equal to 1.");
        }
        if (start <= 0 || end <= 0) {
          throw new Error("Start and end must be positive in geometric mode.");
        }
        if (count === 1) {
          return [formatNumber(start)];
        }

        const vector = [];
        const logStart = Math.log(start);
        const logEnd = Math.log(end);
        const step = (logEnd - logStart) / (count - 1);

        for (let i = 0; i < count; i += 1) {
          vector.push(formatNumber(Math.exp(logStart + step * i)));
        }

        return vector;
      }

      function collectVariables() {
        const rows = Array.from(variableList.querySelectorAll(".variable-row"));
        return rows.map(function (row, index) {
          const name = "x" + (index + 1);
          const startRaw = row.querySelector(".start-input").value.trim();
          const endRaw = row.querySelector(".end-input").value.trim();
          const scale = row.querySelector(".scale-select").value;
          const mode = row.querySelector(".mode-select").value;

          if (startRaw === "" || endRaw === "") {
            throw new Error("Enter start and end on row " + (index + 1) + ".");
          }

          const start = Number(startRaw);
          const end = Number(endRaw);

          if (!Number.isFinite(start) || !Number.isFinite(end)) {
            throw new Error("Non-numeric value found on row " + (index + 1) + ".");
          }

          let vector;
          if (mode === "count") {
            const countRaw = row.querySelector(".count-input").value.trim();
            if (countRaw === "") {
              throw new Error("Enter count on row " + (index + 1) + ".");
            }
            const count = Number(countRaw);
            if (!Number.isFinite(count)) {
              throw new Error("Invalid count on row " + (index + 1) + ".");
            }
            vector = scale === "log"
              ? buildVectorByCountLog(start, end, count)
              : buildVectorByCountLinear(start, end, count);
          } else {
            const stepRaw = row.querySelector(".step-input").value.trim();
            if (stepRaw === "") {
              throw new Error("Enter step on row " + (index + 1) + ".");
            }
            const step = Number(stepRaw);
            if (!Number.isFinite(step)) {
              throw new Error("Invalid step on row " + (index + 1) + ".");
            }
            vector = scale === "log"
              ? buildVectorByStepLog(start, end, step)
              : buildVectorByStepLinear(start, end, step);
          }

          return { name: name, vector: vector };
        });
      }

      function buildCartesianRows(variables) {
        let rows = [[]];

        variables.forEach(function (item) {
          const nextRows = [];
          rows.forEach(function (baseRow) {
            item.vector.forEach(function (value) {
              nextRows.push(baseRow.concat(value));
            });
          });
          rows = nextRows;
        });

        return rows;
      }

      function generateOutput() {
        const variables = collectVariables();
        const delimiter = getDelimiter();
        const rows = buildCartesianRows(variables);
        const lines = [];

        lines.push(variables.map(function (item) { return item.name; }).join(delimiter));
        rows.forEach(function (row) {
          lines.push(row.join(delimiter));
        });

        outputBox.value = lines.join("\n");
        statusText.textContent = "Generated";
        statusText.className = "status-ok";
        columnCountText.textContent = "Columns: " + variables.length;
        rowCountText.textContent = "Rows: " + rows.length;
      }

      function updateMeta() {
        const count = variableList.querySelectorAll(".variable-row").length;
        columnCountText.textContent = "Columns: " + count;
        if (!outputBox.value.trim()) {
          rowCountText.textContent = "Rows: 0";
        }
      }

      async function copyOutput() {
        const text = outputBox.value;
        if (!text) {
          statusText.textContent = "No output to copy.";
          statusText.className = "status-error";
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          statusText.textContent = "Copied";
          statusText.className = "status-ok";
        } catch (error) {
          statusText.textContent = "Copy failed.";
          statusText.className = "status-error";
        }
      }

      function downloadOutput() {
        const text = outputBox.value;
        if (!text) {
          statusText.textContent = "No output to save.";
          statusText.className = "status-error";
          return;
        }
        const extension = delimiterSelect.value === "comma" ? "csv" : "txt";
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "data-columns." + extension;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        statusText.textContent = "Save started";
        statusText.className = "status-ok";
      }

      async function copyTextValue(text, onSuccess, onError) {
        if (!text) {
          onError();
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          onSuccess();
        } catch (error) {
          onError();
        }
      }

      function downloadTextValue(text, filename, onSuccess, onError) {
        if (!text) {
          onError();
          return;
        }
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        onSuccess();
      }

      function setQuickFitStatus(message, isError) {
        quickFitStatus.textContent = message;
        quickFitStatus.style.color = isError ? "var(--danger)" : "var(--muted)";
      }

      function resetQuickFitSummary() {
        quickFitCount.textContent = "0";
        quickFitR2.textContent = "-";
      }

      function updateQuickFitMaskDisplay(coeffs) {
        Array.from(quickFitMask.querySelectorAll(".quick-fit-mask-row")).forEach(function (row, index) {
          if (!coeffs || coeffs[index] === undefined) {
            return;
          }
          if (row.querySelector(".quick-fit-mask-mode").value === "free") {
            row.querySelector(".quick-fit-mask-value").value = formatMetric(coeffs[index]);
          }
        });
      }

      function updateQuickFitMaskErrors(errors) {
        Array.from(quickFitMask.querySelectorAll(".quick-fit-mask-row")).forEach(function (row, index) {
          const errorInput = row.querySelector(".quick-fit-mask-error");
          if (row.querySelector(".quick-fit-mask-mode").value === "free" && errors && errors[index] !== undefined && errors[index] !== null) {
            errorInput.value = formatMetric(errors[index]);
          } else {
            errorInput.value = "-";
          }
        });
      }

      function updateQuickPeakMaskDisplay(params) {
        if (!params) {
          return;
        }
        Array.from(quickPeakMask.querySelectorAll(".quick-fit-mask-row")).forEach(function (row) {
          const key = row.getAttribute("data-key");
          if (!(key in params)) {
            return;
          }
          if (row.querySelector(".quick-fit-mask-mode").value === "free") {
            row.querySelector(".quick-fit-mask-value").value = formatMetric(params[key]);
          }
        });
      }

      function updateQuickPeakMaskErrors(errors) {
        Array.from(quickPeakMask.querySelectorAll(".quick-fit-mask-row")).forEach(function (row) {
          const key = row.getAttribute("data-key");
          const errorInput = row.querySelector(".quick-fit-mask-error");
          if (row.querySelector(".quick-fit-mask-mode").value === "free" && errors && errors[key] !== undefined && errors[key] !== null) {
            errorInput.value = formatMetric(errors[key]);
          } else {
            errorInput.value = "-";
          }
        });
      }

      function renderQuickFitEmpty(message) {
        quickFitPlot.innerHTML = '<div class="quick-fit-empty">' + message + "</div>";
        quickFitCurveOutput.value = "";
      }

      function parseQuickFitText(text) {
        const lines = text.split(/\r?\n/);
        const points = [];

        lines.forEach(function (line) {
          const trimmed = line.trim();
          if (!trimmed || trimmed.startsWith("#")) {
            return;
          }

          const cols = trimmed.split(/[\s,\t]+/).filter(Boolean);
          if (cols.length < 2) {
            return;
          }

          const x = Number(cols[0]);
          const y = Number(cols[1]);
          if (!Number.isFinite(x) || !Number.isFinite(y)) {
            return;
          }

          points.push({ x: x, y: y });
        });

        return points;
      }

      function solveLinearSystem(matrix, vector) {
        const n = matrix.length;
        const a = matrix.map(function (row, i) { return row.slice().concat(vector[i]); });

        for (let col = 0; col < n; col += 1) {
          let pivotRow = col;
          for (let row = col + 1; row < n; row += 1) {
            if (Math.abs(a[row][col]) > Math.abs(a[pivotRow][col])) {
              pivotRow = row;
            }
          }

          if (Math.abs(a[pivotRow][col]) < 1e-12) {
            throw new Error("Fit matrix is singular. Lower the degree.");
          }

          if (pivotRow !== col) {
            const tmp = a[col];
            a[col] = a[pivotRow];
            a[pivotRow] = tmp;
          }

          const pivot = a[col][col];
          for (let j = col; j <= n; j += 1) {
            a[col][j] /= pivot;
          }

          for (let row = 0; row < n; row += 1) {
            if (row === col) {
              continue;
            }
            const factor = a[row][col];
            for (let j = col; j <= n; j += 1) {
              a[row][j] -= factor * a[col][j];
            }
          }
        }

        return a.map(function (row) { return row[n]; });
      }

      function invertMatrix(matrix) {
        const n = matrix.length;
        const a = matrix.map(function (row, i) {
          const identity = new Array(n).fill(0);
          identity[i] = 1;
          return row.slice().concat(identity);
        });

        for (let col = 0; col < n; col += 1) {
          let pivotRow = col;
          for (let row = col + 1; row < n; row += 1) {
            if (Math.abs(a[row][col]) > Math.abs(a[pivotRow][col])) {
              pivotRow = row;
            }
          }

          if (Math.abs(a[pivotRow][col]) < 1e-12) {
            throw new Error("Matrix inversion failed.");
          }

          if (pivotRow !== col) {
            const tmp = a[col];
            a[col] = a[pivotRow];
            a[pivotRow] = tmp;
          }

          const pivot = a[col][col];
          for (let j = 0; j < 2 * n; j += 1) {
            a[col][j] /= pivot;
          }

          for (let row = 0; row < n; row += 1) {
            if (row === col) {
              continue;
            }
            const factor = a[row][col];
            for (let j = 0; j < 2 * n; j += 1) {
              a[row][j] -= factor * a[col][j];
            }
          }
        }

        return a.map(function (row) { return row.slice(n); });
      }

      function evaluatePolynomial(coeffs, x) {
        let y = 0;
        for (let i = coeffs.length - 1; i >= 0; i -= 1) {
          y = y * x + coeffs[i];
        }
        return y;
      }

      function formatPolynomial(coeffs) {
        return coeffs.map(function (coeff, index) {
          return "c" + index + " = " + formatMetric(coeff);
        }).join("\n");
      }

      function fitPolynomial(points, degree, constraints) {
        if (points.length < 2) {
          throw new Error("At least two points are required.");
        }
        if (!Number.isInteger(degree) || degree < 0) {
          throw new Error("Degree must be an integer greater than or equal to 0.");
        }
        if (degree >= points.length) {
          throw new Error("Degree must be smaller than the number of points.");
        }

        const size = degree + 1;
        const normalizedConstraints = new Array(size).fill(null).map(function (_, index) {
          return constraints && constraints[index] ? constraints[index] : { mode: "free", value: 0 };
        });
        const freeIndices = [];
        const coeffs = new Array(size).fill(0);

        normalizedConstraints.forEach(function (constraint, index) {
          if (constraint.mode === "fixed") {
            coeffs[index] = constraint.value;
          } else {
            freeIndices.push(index);
          }
        });

        if (freeIndices.length === 0) {
          throw new Error("At least one coefficient must be set to fit.");
        }

        const matrix = freeIndices.map(function () {
          return freeIndices.map(function () { return 0; });
        });
        const rhs = freeIndices.map(function () { return 0; });

        points.forEach(function (point) {
          let adjustedY = point.y;
          normalizedConstraints.forEach(function (constraint, index) {
            if (constraint.mode === "fixed") {
              adjustedY -= constraint.value * Math.pow(point.x, index);
            }
          });

          freeIndices.forEach(function (powerI, rowIndex) {
            rhs[rowIndex] += adjustedY * Math.pow(point.x, powerI);
            freeIndices.forEach(function (powerJ, colIndex) {
              matrix[rowIndex][colIndex] += Math.pow(point.x, powerI + powerJ);
            });
          });
        });

        const solved = solveLinearSystem(matrix, rhs);
        const covariance = invertMatrix(matrix);
        freeIndices.forEach(function (power, index) {
          coeffs[power] = solved[index];
        });

        const meanY = points.reduce(function (sum, point) { return sum + point.y; }, 0) / points.length;
        let ssRes = 0;
        let ssTot = 0;

        points.forEach(function (point) {
          const fitted = evaluatePolynomial(coeffs, point.x);
          ssRes += (point.y - fitted) * (point.y - fitted);
          ssTot += (point.y - meanY) * (point.y - meanY);
        });

        const dof = Math.max(1, points.length - freeIndices.length);
        const sigma2 = ssRes / dof;
        const errors = new Array(size).fill(null);
        freeIndices.forEach(function (power, index) {
          errors[power] = Math.sqrt(Math.max(0, covariance[index][index] * sigma2));
        });

        return {
          degree: degree,
          coeffs: coeffs,
          r2: ssTot < 1e-12 ? 1 : 1 - ssRes / ssTot,
          rmse: Math.sqrt(ssRes / points.length),
          errors: errors
        };
      }

      function renderQuickFitPlot(points, fit) {
        const width = Math.max(320, Math.round(quickFitPlot.clientWidth || 640));
        const height = 280;
        const padLeft = 44;
        const padRight = 16;
        const padTop = 2;
        const padBottom = 30;

        let minX = Math.min.apply(null, points.map(function (point) { return point.x; }));
        let maxX = Math.max.apply(null, points.map(function (point) { return point.x; }));
        let minY = Math.min.apply(null, points.map(function (point) { return point.y; }));
        let maxY = Math.max.apply(null, points.map(function (point) { return point.y; }));
        const fitY1 = evaluatePolynomial(fit.coeffs, minX);
        const fitY2 = evaluatePolynomial(fit.coeffs, maxX);

        minY = Math.min(minY, fitY1, fitY2);
        maxY = Math.max(maxY, fitY1, fitY2);

        if (Math.abs(maxX - minX) < 1e-12) {
          minX -= 1;
          maxX += 1;
        }
        if (Math.abs(maxY - minY) < 1e-12) {
          minY -= 1;
          maxY += 1;
        }

        const xPad = (maxX - minX) * 0.08;
        const yPadBottom = (maxY - minY) * 0.06;
        const yPadTop = (maxY - minY) * 0.001;
        const x0 = minX - xPad;
        const x1 = maxX + xPad;
        const y0 = minY - yPadBottom;
        const y1 = maxY + yPadTop;

        function sx(x) {
          return padLeft + (x - x0) / (x1 - x0) * (width - padLeft - padRight);
        }

        function sy(y) {
          return height - padBottom - (y - y0) / (y1 - y0) * (height - padTop - padBottom);
        }

        const circles = points.map(function (point) {
          return '<circle cx="' + sx(point.x).toFixed(2) + '" cy="' + sy(point.y).toFixed(2) + '" r="3.2" fill="#1574b6" />';
        }).join("");

        const curveSettings = getCurveSettings(points, quickFitCurveMin, quickFitCurveMax, quickFitCurveCount);
        const curvePoints = [];
        const curveData = [];
        for (let i = 0; i < curveSettings.count; i += 1) {
          const x = curveSettings.xMin + (curveSettings.xMax - curveSettings.xMin) * i / (curveSettings.count - 1);
          const y = evaluatePolynomial(fit.coeffs, x);
          curvePoints.push(sx(x).toFixed(2) + "," + sy(y).toFixed(2));
          curveData.push({ x: x, y: y });
        }
        const fitLine = '<polyline fill="none" points="' + curvePoints.join(" ") + '" stroke="#d65959" stroke-width="2" />';

        const xTicks = [x0, (x0 + x1) / 2, x1].map(function (value) {
          const x = sx(value).toFixed(2);
          return '<g><line x1="' + x + '" y1="' + (height - padBottom) + '" x2="' + x + '" y2="' + (height - padBottom + 5)
            + '" stroke="#6d89a5" /><text x="' + x + '" y="' + (height - 10) + '" text-anchor="middle" font-size="10" fill="#5d7388">'
            + formatTick(value) + '</text></g>';
        }).join("");

        const yTicks = [y0, (y0 + y1) / 2, y1].map(function (value) {
          const y = sy(value).toFixed(2);
          return '<g><line x1="' + (padLeft - 5) + '" y1="' + y + '" x2="' + padLeft + '" y2="' + y
            + '" stroke="#6d89a5" /><text x="' + (padLeft - 8) + '" y="' + (Number(y) + 3)
            + '" text-anchor="end" font-size="10" fill="#5d7388">' + formatTick(value) + '</text></g>';
        }).join("");

        quickFitPlot.innerHTML =
          '<svg viewBox="0 0 ' + width + ' ' + height + '" aria-label="Quick fit plot">'
          + '<line x1="' + padLeft + '" y1="' + padTop + '" x2="' + padLeft + '" y2="' + (height - padBottom) + '" stroke="#9bb2c7" />'
          + '<line x1="' + padLeft + '" y1="' + (height - padBottom) + '" x2="' + (width - padRight) + '" y2="' + (height - padBottom) + '" stroke="#9bb2c7" />'
          + yTicks + xTicks + fitLine + circles
          + '</svg>';
        quickFitCurveOutput.value = formatCurveData(curveData);
      }

      function runQuickFit() {
        const points = parseQuickFitText(quickFitInput.value);
        const degree = Number(quickFitDegree.value);
        const constraints = getQuickFitConstraints();
        if (points.length < 2) {
          resetQuickFitSummary();
          renderQuickFitEmpty("Enter at least two rows of two-column data");
          setQuickFitStatus("Not enough data", true);
          return;
        }

        const fit = fitPolynomial(points, degree, constraints);
        quickFitCount.textContent = String(points.length);
        quickFitR2.textContent = formatMetric(fit.r2);
        updateQuickFitMaskDisplay(fit.coeffs);
        updateQuickFitMaskErrors(fit.errors);
        renderQuickFitPlot(points, fit);
        setQuickFitStatus("Polynomial fit complete", false);
      }

      function setQuickPeakStatus(message, isError) {
        quickPeakStatus.textContent = message;
        quickPeakStatus.style.color = isError ? "var(--danger)" : "var(--muted)";
      }

      function resetQuickPeakSummary() {
        quickPeakCount.textContent = "0";
        quickPeakR2.textContent = "-";
      }

      function renderQuickPeakEmpty(message) {
        quickPeakPlot.innerHTML = '<div class="quick-fit-empty">' + message + "</div>";
        quickPeakCurveOutput.value = "";
      }

      function formatCurveData(points) {
        return points.map(function (point) {
          return formatMetric(point.x) + "\t" + formatMetric(point.y);
        }).join("\n");
      }

      function getCurveSettings(points, minInput, maxInput, countInput) {
        const xs = points.map(function (point) { return point.x; });
        const dataMin = Math.min.apply(null, xs);
        const dataMax = Math.max.apply(null, xs);
        const dataSpan = Math.abs(dataMax - dataMin) < 1e-12 ? 1 : (dataMax - dataMin);
        const defaultMin = dataMin - dataSpan * 0.2;
        const defaultMax = dataMax + dataSpan * 0.2;

        if (minInput.value === "") {
          minInput.value = formatMetric(defaultMin);
        }
        if (maxInput.value === "") {
          maxInput.value = formatMetric(defaultMax);
        }

        const xMin = Number(minInput.value);
        const xMax = Number(maxInput.value);
        const count = Math.max(2, Math.round(Number(countInput.value || 161)));

        if (!Number.isFinite(xMin) || !Number.isFinite(xMax) || xMin === xMax) {
          throw new Error("Invalid x range for curve output.");
        }

        countInput.value = String(count);
        return { xMin: xMin, xMax: xMax, count: count };
      }

      function peakModelValue(model, x, params) {
        const dx = x - params.center;
        const width = Math.max(Math.abs(params.width), 1e-9);
        const offset = params.offset;
        const amplitude = params.amplitude;
        const lorentz = amplitude / (1 + Math.pow(dx / width, 2));
        const gauss = amplitude * Math.exp(-0.5 * Math.pow(dx / width, 2));

        if (model === "gaussian") {
          return offset + gauss;
        }
        if (model === "pseudo_voigt") {
          const eta = Math.min(1, Math.max(0, params.eta));
          return offset + eta * lorentz + (1 - eta) * gauss;
        }
        return offset + lorentz;
      }

      function estimatePeakParams(points, model) {
        let minY = points[0].y;
        let maxY = points[0].y;
        let minX = points[0].x;
        let maxX = points[0].x;
        let maxPoint = points[0];

        points.forEach(function (point) {
          if (point.y < minY) minY = point.y;
          if (point.y > maxY) {
            maxY = point.y;
            maxPoint = point;
          }
          if (point.x < minX) minX = point.x;
          if (point.x > maxX) maxX = point.x;
        });

        return {
          center: maxPoint.x,
          amplitude: Math.max(maxY - minY, 1e-6),
          width: Math.max((maxX - minX) / 8, 1e-6),
          offset: minY,
          eta: model === "pseudo_voigt" ? 0.5 : 1
        };
      }

      function sumPeakSquaredError(points, model, params) {
        let sum = 0;
        points.forEach(function (point) {
          const diff = point.y - peakModelValue(model, point.x, params);
          sum += diff * diff;
        });
        return sum;
      }

      function optimizePeakFit(points, model, initialParams, constraints) {
        const xValues = points.map(function (point) { return point.x; });
        const xMin = Math.min.apply(null, xValues);
        const xMax = Math.max.apply(null, xValues);
        const xSpan = Math.max(xMax - xMin, 1e-6);
        const params = {
          center: initialParams.center,
          amplitude: initialParams.amplitude,
          width: initialParams.width,
          offset: initialParams.offset,
          eta: initialParams.eta
        };
        Object.keys(constraints || {}).forEach(function (key) {
          if (constraints[key] && constraints[key].mode === "fixed") {
            params[key] = constraints[key].value;
          }
        });
        const step = {
          center: xSpan * 0.12,
          amplitude: Math.max(Math.abs(initialParams.amplitude) * 0.25, 0.05),
          width: Math.max(Math.abs(initialParams.width) * 0.25, xSpan * 0.03, 1e-4),
          offset: Math.max(Math.abs(initialParams.offset) * 0.2, 0.02),
          eta: 0.15
        };
        const keys = (model === "pseudo_voigt"
          ? ["center", "amplitude", "width", "offset", "eta"]
          : ["center", "amplitude", "width", "offset"]).filter(function (key) {
            return !constraints || !constraints[key] || constraints[key].mode !== "fixed";
          });
        if (keys.length === 0) {
          return params;
        }
        let bestError = sumPeakSquaredError(points, model, params);

        for (let iter = 0; iter < 80; iter += 1) {
          let improved = false;

          keys.forEach(function (key) {
            const deltas = [step[key], -step[key]];
            deltas.forEach(function (delta) {
              const candidate = Object.assign({}, params);
              candidate[key] += delta;
              if (key === "width") {
                candidate.width = Math.max(candidate.width, 1e-6);
              }
              if (key === "eta") {
                candidate.eta = Math.min(1, Math.max(0, candidate.eta));
              }
              const error = sumPeakSquaredError(points, model, candidate);
              if (error < bestError) {
                Object.assign(params, candidate);
                bestError = error;
                improved = true;
              }
            });
          });

          if (!improved) {
            keys.forEach(function (key) {
              step[key] *= 0.6;
            });
          }
        }

        return params;
      }

      function fitPeakModel(points, model, constraints) {
        if (points.length < 3) {
          throw new Error("Peak fitting requires at least three points.");
        }

        const params = optimizePeakFit(points, model, estimatePeakParams(points, model), constraints);
        const meanY = points.reduce(function (sum, point) { return sum + point.y; }, 0) / points.length;
        let ssRes = 0;
        let ssTot = 0;
        const keys = (model === "pseudo_voigt"
          ? ["center", "amplitude", "width", "offset", "eta"]
          : ["center", "amplitude", "width", "offset"]).filter(function (key) {
            return !constraints || !constraints[key] || constraints[key].mode !== "fixed";
          });

        points.forEach(function (point) {
          const fitted = peakModelValue(model, point.x, params);
          ssRes += Math.pow(point.y - fitted, 2);
          ssTot += Math.pow(point.y - meanY, 2);
        });

        const errors = {
          center: null,
          amplitude: null,
          width: null,
          offset: null,
          eta: null
        };

        if (keys.length > 0) {
          const jtj = keys.map(function () { return keys.map(function () { return 0; }); });

          points.forEach(function (point) {
            const grads = keys.map(function (key) {
              const deltaBase = Math.max(Math.abs(params[key]) * 1e-5, 1e-6);
              const plus = Object.assign({}, params);
              const minus = Object.assign({}, params);
              plus[key] += deltaBase;
              minus[key] -= deltaBase;
              if (key === "width") {
                plus.width = Math.max(plus.width, 1e-6);
                minus.width = Math.max(minus.width, 1e-6);
              }
              if (key === "eta") {
                plus.eta = Math.min(1, Math.max(0, plus.eta));
                minus.eta = Math.min(1, Math.max(0, minus.eta));
              }
              const fPlus = peakModelValue(model, point.x, plus);
              const fMinus = peakModelValue(model, point.x, minus);
              return (fPlus - fMinus) / Math.max(1e-12, plus[key] - minus[key]);
            });

            for (let i = 0; i < keys.length; i += 1) {
              for (let j = 0; j < keys.length; j += 1) {
                jtj[i][j] += grads[i] * grads[j];
              }
            }
          });

          const covariance = invertMatrix(jtj);
          const dof = Math.max(1, points.length - keys.length);
          const sigma2 = ssRes / dof;
          keys.forEach(function (key, index) {
            errors[key] = Math.sqrt(Math.max(0, covariance[index][index] * sigma2));
          });
        }

        return {
          model: model,
          params: params,
          r2: ssTot < 1e-12 ? 1 : 1 - ssRes / ssTot,
          rmse: Math.sqrt(ssRes / points.length),
          errors: errors
        };
      }

      function formatPeakParams(model, params) {
        const lines = [
          "model = " + model,
          "center = " + formatMetric(params.center),
          "amplitude = " + formatMetric(params.amplitude),
          "width = " + formatMetric(params.width),
          "offset = " + formatMetric(params.offset)
        ];
        if (model === "pseudo_voigt") {
          lines.push("eta = " + formatMetric(params.eta));
        }
        return lines.join("\n");
      }

      function renderQuickPeakPlot(points, fit) {
        const width = Math.max(320, Math.round(quickPeakPlot.clientWidth || 640));
        const height = 280;
        const padLeft = 44;
        const padRight = 16;
        const padTop = 2;
        const padBottom = 30;
        let minX = Math.min.apply(null, points.map(function (point) { return point.x; }));
        let maxX = Math.max.apply(null, points.map(function (point) { return point.x; }));
        let minY = Math.min.apply(null, points.map(function (point) { return point.y; }));
        let maxY = Math.max.apply(null, points.map(function (point) { return point.y; }));

        if (Math.abs(maxX - minX) < 1e-12) {
          minX -= 1;
          maxX += 1;
        }
        const xPad = (maxX - minX) * 0.08;
        const x0 = minX - xPad;
        const x1 = maxX + xPad;

        const curveSettings = getCurveSettings(points, quickPeakCurveMin, quickPeakCurveMax, quickPeakCurveCount);
        const curveYs = [];
        for (let i = 0; i < curveSettings.count; i += 1) {
          const x = curveSettings.xMin + (curveSettings.xMax - curveSettings.xMin) * i / (curveSettings.count - 1);
          curveYs.push(peakModelValue(fit.model, x, fit.params));
        }
        minY = Math.min(minY, Math.min.apply(null, curveYs));
        maxY = Math.max(maxY, Math.max.apply(null, curveYs));
        if (Math.abs(maxY - minY) < 1e-12) {
          minY -= 1;
          maxY += 1;
        }
        const yPadBottom = (maxY - minY) * 0.06;
        const yPadTop = (maxY - minY) * 0.001;
        const y0 = minY - yPadBottom;
        const y1 = maxY + yPadTop;

        function sx(x) {
          return padLeft + (x - x0) / (x1 - x0) * (width - padLeft - padRight);
        }

        function sy(y) {
          return height - padBottom - (y - y0) / (y1 - y0) * (height - padTop - padBottom);
        }

        const circles = points.map(function (point) {
          return '<circle cx="' + sx(point.x).toFixed(2) + '" cy="' + sy(point.y).toFixed(2) + '" r="3.2" fill="#1574b6" />';
        }).join("");

        const curvePoints = [];
        const curveData = [];
        for (let i = 0; i < curveSettings.count; i += 1) {
          const x = curveSettings.xMin + (curveSettings.xMax - curveSettings.xMin) * i / (curveSettings.count - 1);
          const y = peakModelValue(fit.model, x, fit.params);
          curvePoints.push(sx(x).toFixed(2) + "," + sy(y).toFixed(2));
          curveData.push({ x: x, y: y });
        }

        const xTicks = [x0, (x0 + x1) / 2, x1].map(function (value) {
          const x = sx(value).toFixed(2);
          return '<g><line x1="' + x + '" y1="' + (height - padBottom) + '" x2="' + x + '" y2="' + (height - padBottom + 5)
            + '" stroke="#6d89a5" /><text x="' + x + '" y="' + (height - 10) + '" text-anchor="middle" font-size="10" fill="#5d7388">'
            + formatTick(value) + '</text></g>';
        }).join("");

        const yTicks = [y0, (y0 + y1) / 2, y1].map(function (value) {
          const y = sy(value).toFixed(2);
          return '<g><line x1="' + (padLeft - 5) + '" y1="' + y + '" x2="' + padLeft + '" y2="' + y
            + '" stroke="#6d89a5" /><text x="' + (padLeft - 8) + '" y="' + (Number(y) + 3)
            + '" text-anchor="end" font-size="10" fill="#5d7388">' + formatTick(value) + '</text></g>';
        }).join("");

        quickPeakPlot.innerHTML =
          '<svg viewBox="0 0 ' + width + ' ' + height + '" aria-label="Quick peak fit plot">'
          + '<line x1="' + padLeft + '" y1="' + padTop + '" x2="' + padLeft + '" y2="' + (height - padBottom) + '" stroke="#9bb2c7" />'
          + '<line x1="' + padLeft + '" y1="' + (height - padBottom) + '" x2="' + (width - padRight) + '" y2="' + (height - padBottom) + '" stroke="#9bb2c7" />'
          + yTicks + xTicks
          + '<polyline fill="none" points="' + curvePoints.join(" ") + '" stroke="#d65959" stroke-width="2" />'
          + circles
          + '</svg>';
        quickPeakCurveOutput.value = formatCurveData(curveData);
      }

      function runQuickPeakFit() {
        const points = parseQuickFitText(quickPeakInput.value);
        const constraints = getQuickPeakConstraints();
        if (points.length < 3) {
          resetQuickPeakSummary();
          renderQuickPeakEmpty("Enter at least three rows of two-column data");
          setQuickPeakStatus("Not enough data", true);
          return;
        }

        const fit = fitPeakModel(points, quickPeakModel.value, constraints);
        quickPeakCount.textContent = String(points.length);
        quickPeakR2.textContent = formatMetric(fit.r2);
        updateQuickPeakMaskDisplay(fit.params);
        updateQuickPeakMaskErrors(fit.errors);
        renderQuickPeakPlot(points, fit);
        setQuickPeakStatus("Peak fit complete", false);
      }

      function tryRunQuickFit() {
        try {
          quickFitDegree.value = String(clampQuickFitDegree(quickFitDegree.value));
          runQuickFit();
        } catch (error) {
          resetQuickFitSummary();
          renderQuickFitEmpty("Fit failed");
          setQuickFitStatus(error instanceof Error ? error.message : "Fit failed", true);
        }
      }

      function tryRunQuickPeakFit() {
        try {
          runQuickPeakFit();
        } catch (error) {
          resetQuickPeakSummary();
          renderQuickPeakEmpty("Peak fit failed");
          setQuickPeakStatus(error instanceof Error ? error.message : "Fit failed", true);
        }
      }

      addVariableBtn.addEventListener("click", function () {
        addVariableRow(getLastRowValues());
      });

      generateBtn.addEventListener("click", function () {
        try {
          generateOutput();
        } catch (error) {
          outputBox.value = "";
          rowCountText.textContent = "Rows: 0";
          statusText.textContent = error instanceof Error ? error.message : "Generation failed.";
          statusText.className = "status-error";
        }
      });

      copyBtn.addEventListener("click", function () {
        copyOutput();
      });

      downloadBtn.addEventListener("click", function () {
        downloadOutput();
      });

      quickFitFile.addEventListener("change", function () {
        const file = quickFitFile.files && quickFitFile.files[0];
        if (!file) {
          return;
        }
        file.text().then(function (text) {
          quickFitInput.value = text;
          setQuickFitStatus("File loaded", false);
          runQuickFit();
        }).catch(function () {
          setQuickFitStatus("File load failed", true);
        });
      });

      quickFitRunBtn.addEventListener("click", function () {
        tryRunQuickFit();
      });

      quickFitDegreeDownBtn.addEventListener("click", function () {
        quickFitDegree.value = String(clampQuickFitDegree(Number(quickFitDegree.value || 1) - 1));
        renderQuickFitMask();
        tryRunQuickFit();
      });

      quickFitDegreeUpBtn.addEventListener("click", function () {
        quickFitDegree.value = String(clampQuickFitDegree(Number(quickFitDegree.value || 1) + 1));
        renderQuickFitMask();
        tryRunQuickFit();
      });

      quickFitDegree.addEventListener("change", function () {
        quickFitDegree.value = String(clampQuickFitDegree(quickFitDegree.value));
        renderQuickFitMask();
        tryRunQuickFit();
      });

      quickFitClearBtn.addEventListener("click", function () {
        quickFitInput.value = "";
        quickFitFile.value = "";
        resetQuickFitSummary();
        renderQuickFitEmpty("Quick Fit plot");
        setQuickFitStatus("Input cleared", false);
      });

      quickPeakFile.addEventListener("change", function () {
        const file = quickPeakFile.files && quickPeakFile.files[0];
        if (!file) {
          return;
        }
        file.text().then(function (text) {
          quickPeakInput.value = text;
          setQuickPeakStatus("File loaded", false);
          runQuickPeakFit();
        }).catch(function () {
          setQuickPeakStatus("File load failed", true);
        });
      });

      quickPeakRunBtn.addEventListener("click", function () {
        tryRunQuickPeakFit();
      });

      quickPeakClearBtn.addEventListener("click", function () {
        quickPeakInput.value = "";
        quickPeakFile.value = "";
        resetQuickPeakSummary();
        renderQuickPeakEmpty("Quick Peak Fit plot");
        setQuickPeakStatus("Input cleared", false);
      });

      quickPeakModel.addEventListener("change", function () {
        renderQuickPeakMask();
        if (!quickPeakInput.value.trim()) {
          return;
        }
        tryRunQuickPeakFit();
      });

      quickFitInput.addEventListener("input", function () {
        if (!quickFitInput.value.trim()) {
          resetQuickFitSummary();
          renderQuickFitEmpty("Quick Fit plot");
          return;
        }
        tryRunQuickFit();
      });

      quickPeakInput.addEventListener("input", function () {
        if (!quickPeakInput.value.trim()) {
          resetQuickPeakSummary();
          renderQuickPeakEmpty("Quick Peak Fit plot");
          return;
        }
        tryRunQuickPeakFit();
      });

      [quickFitCurveMin, quickFitCurveMax, quickFitCurveCount].forEach(function (input) {
        input.addEventListener("input", function () {
          if (quickFitInput.value.trim()) {
            tryRunQuickFit();
          }
        });
      });

      [quickPeakCurveMin, quickPeakCurveMax, quickPeakCurveCount].forEach(function (input) {
        input.addEventListener("input", function () {
          if (quickPeakInput.value.trim()) {
            tryRunQuickPeakFit();
          }
        });
      });

      quickFitMask.addEventListener("input", function () {
        if (quickFitInput.value.trim()) {
          tryRunQuickFit();
        }
      });

      quickFitMask.addEventListener("change", function () {
        if (quickFitInput.value.trim()) {
          tryRunQuickFit();
        }
      });

      quickPeakMask.addEventListener("input", function () {
        if (quickPeakInput.value.trim()) {
          tryRunQuickPeakFit();
        }
      });

      quickPeakMask.addEventListener("change", function () {
        if (quickPeakInput.value.trim()) {
          tryRunQuickPeakFit();
        }
      });

      quickFitCurveCopyBtn.addEventListener("click", function () {
        copyTextValue(
          quickFitCurveOutput.value,
          function () { setQuickFitStatus("Curve data copied", false); },
          function () { setQuickFitStatus("No curve data to copy", true); }
        );
      });

      quickFitCurveSaveBtn.addEventListener("click", function () {
        downloadTextValue(
          quickFitCurveOutput.value,
          "quick-fit-curve.txt",
          function () { setQuickFitStatus("Curve data saved", false); },
          function () { setQuickFitStatus("No curve data to save", true); }
        );
      });

      quickPeakCurveCopyBtn.addEventListener("click", function () {
        copyTextValue(
          quickPeakCurveOutput.value,
          function () { setQuickPeakStatus("Curve data copied", false); },
          function () { setQuickPeakStatus("No curve data to copy", true); }
        );
      });

      quickPeakCurveSaveBtn.addEventListener("click", function () {
        downloadTextValue(
          quickPeakCurveOutput.value,
          "quick-peak-fit-curve.txt",
          function () { setQuickPeakStatus("Curve data saved", false); },
          function () { setQuickPeakStatus("No curve data to save", true); }
        );
      });

      delimiterSelect.addEventListener("change", function () {
        if (outputBox.value.trim()) {
          try {
            generateOutput();
          } catch (error) {
            statusText.textContent = error instanceof Error ? error.message : "Regeneration failed.";
            statusText.className = "status-error";
          }
        }
      });

      defaults.forEach(function (item) {
        addVariableRow(item);
      });

      renderQuickFitMask();
      resetQuickFitSummary();
      runQuickFit();
      renderQuickPeakMask();
      resetQuickPeakSummary();
      runQuickPeakFit();
      generateOutput();
    })();
  </script>
</body>
</html>
